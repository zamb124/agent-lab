name: agentlab-prod

# Production Docker Compose с YAML anchors для DRY
# Использование: docker-compose -f docker-compose-prod.yaml up -d

# ============================================
# Общие переменные окружения
# ============================================
x-common-env: &common-env
  DATABASE__SHARED_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_shared
  DATABASE__FLOWS_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_agents
  DATABASE__CRM_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_crm
  DATABASE__SYNC_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_sync
  DATABASE__RAG_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_rag
  DATABASE__OFFICE_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_office
  DATABASE__TRACING_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_tracing
  DATABASE__REDIS_URL: redis://redis:6379/0
  DATABASE__AUTO_MIGRATE: "false"
  TASKS__BROKER_URL: redis://redis:6379/1
  SERVER__DEBUG: "false"
  SERVER__DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION:-}
  SERVER__FLOWS_SERVICE_URL: http://agents:8001
  SERVER__FRONTEND_SERVICE_URL: http://frontend:8002
  SERVER__CRM_SERVICE_URL: http://crm:8003
  SERVER__RAG_SERVICE_URL: http://rag:8004
  SERVER__SYNC_SERVICE_URL: http://sync:8005
  SERVER__OFFICE_SERVICE_URL: http://office:8008
  SERVER__SCHEDULER_SERVICE_URL: http://scheduler-api:8006
  AUTH__JWT_SECRET: ${AUTH__JWT_SECRET:-change-me-in-production}
  AUTH__PROVIDERS__YANDEX__CLIENT_ID: ${AUTH_YANDEX_CLIENT_ID}
  AUTH__PROVIDERS__YANDEX__CLIENT_SECRET: ${AUTH_YANDEX_CLIENT_SECRET}
  AUTH__PROVIDERS__GOOGLE__CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
  AUTH__PROVIDERS__GOOGLE__CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET}
  AUTH__PROVIDERS__GITHUB__CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID}
  AUTH__PROVIDERS__GITHUB__CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET}
  # AmoCRM OAuth (CRM): client_id/secret из GitHub Secrets деплоя; enabled и URL — в conf.json (см. auth.providers.amocrm).
  AUTH__PROVIDERS__AMOCRM__CLIENT_ID: ${AUTH_AMOCRM_CLIENT_ID:-}
  AUTH__PROVIDERS__AMOCRM__CLIENT_SECRET: ${AUTH_AMOCRM_CLIENT_SECRET:-}
  # Sign in with Apple: client_id / team_id / key_id — в conf.json на сервере; секрет — только ключ .p8
  AUTH__PROVIDERS__APPLE__APPLE_PRIVATE_KEY: ${AUTH_APPLE_PRIVATE_KEY:-}
  # Демо-вход: auth.demo.login_enabled в conf.json; пароль только из секрета деплоя (не коммитить).
  AUTH__DEMO__PASSWORD: ${AUTH_DEMO_PASSWORD:-}
  # Ключи должны совпадать с s3.default_bucket и s3.buckets в conf.json (см. shvedzilla).
  S3__DEFAULT_BUCKET: shvedzilla
  S3__BUCKETS__SHVEDZILLA__ACCESS_KEY_ID: ${SELECTEL_ACCESS_KEY}
  S3__BUCKETS__SHVEDZILLA__SECRET_ACCESS_KEY: ${SELECTEL_SECRET_KEY}
  # Web Push (VAPID): переопределяют conf.json; задайте в GitHub Secrets и передайте в deploy (см. .github/workflows/deploy.yml).
  PUSH__ENABLED: ${PUSH__ENABLED:-true}
  PUSH__VAPID_PUBLIC_KEY: ${PUSH__VAPID_PUBLIC_KEY:-}
  PUSH__VAPID_PRIVATE_KEY: ${PUSH__VAPID_PRIVATE_KEY:-}
  PUSH__VAPID_EMAIL: ${PUSH__VAPID_EMAIL:-ops@humanitec.ru}
  # APNs: опционально отдельный .p8 (если не тот же, что AUTH__PROVIDERS__APPLE__APPLE_PRIVATE_KEY). team_id / key_id / bundle_id — в conf.json (push или auth.providers.apple).
  PUSH__APNS_PRIVATE_KEY: ${PUSH__APNS_PRIVATE_KEY:-}
  # FCM (Android Capacitor через @capacitor/push-notifications): service account JSON одной строкой.
  # Берётся в Firebase Console → Project settings → Service accounts → Generate new private key.
  # Пустое значение допустимо: тогда FcmPushService не инициализируется и Android-устройства не получают push.
  PUSH__FCM_CREDENTIALS_JSON: ${PUSH__FCM_CREDENTIALS_JSON:-}
  # Опционально: project_id переопределяет значение из service account JSON.
  PUSH__FCM_PROJECT_ID: ${PUSH__FCM_PROJECT_ID:-}
  # WebRTC звонки: livekit доступен внутри Docker по имени сервиса.
  # CALLS__LIVEKIT_PUBLIC_URL — публичный wss:// URL для браузеров (через nginx/ingress).
  # CALLS__TURN_HOST использует SERVER_HOST (тот же IP что и для SSH деплоя).
  CALLS__LIVEKIT_URL: ws://livekit:7880
  CALLS__LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-wss://livekit.humanitec.ru}
  CALLS__LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
  CALLS__LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-change-me-in-production}
  CALLS__TURN_HOST: ${SERVER_HOST}
  CALLS__TURN_SECRET: ${TURN_SECRET:-change-me-in-production}
  # LLM: переопределяют conf.json; задайте в GitHub Secrets и передайте в deploy (см. .github/workflows/deploy.yml).
  LLM__BOTHUB__API_KEY: ${LLM_BOTHUB_API_KEY:-}
  LLM__OPENROUTER__API_KEY: ${LLM_OPENROUTER_API_KEY:-}
  STT__CLOUD_RU__API_KEY: ${STT__CLOUD_RU__API_KEY:-${STT_CLOUD_RU_API_KEY:-}}
  # RAG pgvector (CRM, flows, сервис rag): OpenRouter embeddings. По умолчанию тот же ключ, что и LLM; иначе RAG_EMBEDDING_API_KEY в SSH/env деплоя.
  RAG__PROVIDERS__PGVECTOR__EMBEDDING_API_KEY: ${RAG_EMBEDDING_API_KEY:-${LLM_OPENROUTER_API_KEY:-}}
  PROVIDER_LITSERVE__API__BASE_URL: ${PROVIDER_LITSERVE__API__BASE_URL:-http://provider_litserve:8014/v1}
  # OnlyOffice + публичный origin платформы (браузер и исходящие запросы DS). Переопределение: .env на сервере.
  SERVER__PLATFORM_PUBLIC_BASE_URL: ${SERVER__PLATFORM_PUBLIC_BASE_URL:-https://humanitec.ru}
  OFFICE__DOCUMENT_SERVER_PUBLIC_URL: ${OFFICE_DOCUMENT_SERVER_PUBLIC_URL:-https://onlyoffice.humanitec.ru}
  OFFICE__JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-change-me-in-production}
  OFFICE__CALLBACK_PUBLIC_BASE_URL: ${OFFICE_CALLBACK_PUBLIC_BASE_URL:-https://humanitec.ru}
  # YooMoney: секреты платежного провайдера
  PAYMENT_PROVIDERS__PROVIDERS__YOOMONEY_MAIN__ACCOUNT_NUMBER: ${YOOMONEY_ACCOUNT_NUMBER:-}
  PAYMENT_PROVIDERS__PROVIDERS__YOOMONEY_MAIN__NOTIFICATION_SECRET: ${YOOMONEY_NOTIFICATION_SECRET:-}
  PAYMENT_PROVIDERS__PROVIDERS__YOOMONEY_MAIN__CLIENT_ID: ${YOOMONEY_CLIENT_ID:-}
  PAYMENT_PROVIDERS__PROVIDERS__YOOMONEY_MAIN__CLIENT_SECRET: ${YOOMONEY_CLIENT_SECRET:-}
  PAYMENT_PROVIDERS__PROVIDERS__YOOMONEY_MAIN__ACCESS_TOKEN: ${YOOMONEY_ACCESS_TOKEN:-}

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-app: &app
  image: ${IMAGE:-ghcr.io/zamb124/agent-lab:latest}
  environment:
    <<: *common-env
  restart: unless-stopped
  networks:
    - agentlab-net

services:
  # ============================================
  # Infrastructure
  # ============================================
  postgres:
    # Мажорная версия PG должна совпадать с данными в volume. Смена мажора без pg_dump/pg_upgrade — только новый volume.
    image: pgvector/pgvector:pg17
    container_name: agentlab_postgres
    environment:
      POSTGRES_DB: platform_shared
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres/init.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    command: postgres -c max_connections=300
    healthcheck:
      # Первый старт с docker-entrypoint-initdb.d (несколько БД + vector) на слабом диске может идти минуты —
      # пока идёт init, провалы не должны «съедать» retries (start_period достаточно большой).
      # platform_user / postgres: новый кластер vs legacy volume. Сокет по умолчанию, без PGPASSWORD (trust).
      test:
        [
          "CMD-SHELL",
          "pg_isready -U platform_user -d postgres || pg_isready -U postgres -d postgres",
        ]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    networks:
      - agentlab-net

  redis:
    image: redis:7-alpine
    container_name: agentlab_redis
    command: redis-server --save 60 1 --loglevel notice --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - agentlab-net

  # ============================================
  # Init container: Migrations
  # ============================================
  migrations:
    <<: *app
    container_name: agentlab_migrations
    command: ["python", "-m", "scripts.db_migrate", "upgrade"]
    volumes:
      - ./conf.json:/app/conf.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ============================================
  # Application Services
  # ============================================
  agents:
    <<: *app
    container_name: agentlab_agents
    command: ["python", "-m", "apps.flows.main"]
    ports:
      - "8001:8001"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - agents_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8001"
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler-api:
        condition: service_healthy
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 240s
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=8).read()",
        ]
    restart: unless-stopped
    networks:
      - agentlab-net

  frontend:
    <<: *app
    container_name: agentlab_frontend
    command: ["python", "-m", "apps.frontend.main"]
    ports:
      - "8002:8002"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - frontend_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8002"
    depends_on:
      migrations:
        condition: service_completed_successfully
      agents:
        condition: service_healthy
      scheduler-api:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  crm:
    <<: *app
    container_name: agentlab_crm
    command: ["python", "-m", "apps.crm.main"]
    ports:
      - "8003:8003"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - crm_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8003"
    depends_on:
      migrations:
        condition: service_completed_successfully
      agents:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  rag:
    <<: *app
    container_name: agentlab_rag
    command: ["python", "-m", "apps.rag.main"]
    ports:
      - "8004:8004"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - rag_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8004"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  provider_litserve:
    <<: *app
    container_name: agentlab_provider_litserve
    command: ["python", "-m", "apps.provider_litserve.main"]
    ports:
      - "8014:8014"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - provider_litserve_logs:/app/logs
      - provider_litserve_data:/var/lib/provider_litserve
    environment:
      <<: *common-env
      PROVIDER_LITSERVE__INFRA__BACKEND: flagllm
      PROVIDER_LITSERVE__INFRA__HOST: 0.0.0.0
      PROVIDER_LITSERVE__INFRA__GATEWAY_PORT: "8014"
      PROVIDER_LITSERVE__INFRA__MODEL_ID: ${PROVIDER_LITSERVE__INFRA__MODEL_ID:-BAAI/bge-reranker-v2-gemma}
      PROVIDER_LITSERVE__INFRA__EMBEDDING_MODEL_ID: ${PROVIDER_LITSERVE__INFRA__EMBEDDING_MODEL_ID:-BAAI/bge-m3}
      PROVIDER_LITSERVE__INFRA__SQLITE_PATH: /var/lib/provider_litserve/registry.db
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  scheduler-api:
    <<: *app
    container_name: agentlab_scheduler_api
    command: ["python", "-m", "apps.scheduler.main"]
    ports:
      - "8006:8006"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - scheduler_api_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8006"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  sync:
    <<: *app
    container_name: agentlab_sync
    command: ["python", "-m", "apps.sync.main"]
    ports:
      - "8005:8005"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - sync_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8005"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: agentlab_onlyoffice
    ports:
      - "8088:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-change-me-in-production}
    volumes:
      - ./deploy/onlyoffice/themes/theme-humanitec-light.json:/var/www/onlyoffice/documentserver/web-apps/apps/common/main/resources/themes/theme-humanitec-light.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  office:
    <<: *app
    container_name: agentlab_office
    command: ["python", "-m", "apps.office.main"]
    ports:
      - "8008:8008"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - office_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8008"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      onlyoffice-documentserver:
        condition: service_started
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  # ============================================
  # Workers
  # ============================================
  flows_worker:
    <<: *app
    command: ["taskiq", "worker", "apps.flows_worker.worker:worker_app", "--workers", "4"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - flows_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net
    deploy:
      replicas: 2

  scheduler:
    <<: *app
    container_name: agentlab_scheduler
    command: ["taskiq", "scheduler", "apps.scheduler.scheduler:scheduler"]
    volumes:
      - ./conf.json:/app/conf.json:ro
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  rag_worker:
    <<: *app
    container_name: agentlab_rag_worker
    command: ["taskiq", "worker", "apps.rag_worker.worker:worker_app", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - rag_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  sync_worker:
    <<: *app
    container_name: agentlab_sync_worker
    command: ["taskiq", "worker", "apps.sync_worker.worker:worker_app", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - sync_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  crm_worker:
    <<: *app
    container_name: agentlab_crm_worker
    command: ["taskiq", "worker", "apps.crm_worker.worker:worker_app", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - crm_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  idle_worker:
    <<: *app
    container_name: agentlab_idle_worker
    command: ["taskiq", "worker", "apps.idle_worker.worker:worker_app", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - idle_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  livekit:
    image: livekit/livekit-server:latest
    container_name: agentlab_livekit
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}
        redis:
          address: redis:6379
          db: 2
        rtc:
          tcp_port: 7882
          udp_port: 7881
          use_external_ip: true
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "7882:7882/tcp"
    restart: unless-stopped
    networks:
      - agentlab-net

  livekit-egress:
    image: livekit/egress:latest
    container_name: agentlab_livekit_egress
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret}
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
          db: 2
        logging:
          level: info
          json: true
        session_limits:
          file_output_max_duration: 1h
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped
    networks:
      - agentlab-net

  coturn:
    image: coturn/coturn:latest
    container_name: agentlab_coturn
    network_mode: host
    command:
      - "-n"
      - "--log-file=stdout"
      - "--lt-cred-mech"
      - "--realm=${TURN_REALM:-agentlab}"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:-change-me-in-production}"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--no-multicast-peers"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  agents_logs:
  frontend_logs:
  crm_logs:
  rag_logs:
  sync_logs:
  provider_litserve_logs:
  provider_litserve_data:
  office_logs:
  scheduler_api_logs:
  flows_worker_logs:
  rag_worker_logs:
  sync_worker_logs:
  crm_worker_logs:
  idle_worker_logs:

networks:
  agentlab-net:
    driver: bridge
