name: agentlab-prod

# Production Docker Compose с YAML anchors для DRY
# Использование: docker-compose -f docker-compose-prod.yaml up -d

# ============================================
# Общие переменные окружения
# ============================================
x-common-env: &common-env
  DATABASE__URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_db
  DATABASE__SHARED_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_db
  DATABASE__REDIS_URL: redis://redis:6379/0
  DATABASE__AUTO_MIGRATE: "false"
  TASKS__BROKER_URL: redis://redis:6379/1
  SERVER__DEBUG: "false"
  SERVER__AGENTS_SERVICE_URL: http://agents:8001
  SERVER__FRONTEND_SERVICE_URL: http://frontend:8002
  SERVER__CRM_SERVICE_URL: http://crm:8003
  SERVER__RAG_SERVICE_URL: http://rag:8004
  SERVER__SYNC_SERVICE_URL: http://sync:8005
  DATABASE__SYNC_URL: postgresql+asyncpg://platform_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/platform_db
  AUTH__JWT_SECRET: ${AUTH__JWT_SECRET:-change-me-in-production}
  AUTH__PROVIDERS__YANDEX__CLIENT_ID: ${AUTH_YANDEX_CLIENT_ID}
  AUTH__PROVIDERS__YANDEX__CLIENT_SECRET: ${AUTH_YANDEX_CLIENT_SECRET}
  AUTH__PROVIDERS__GOOGLE__CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
  AUTH__PROVIDERS__GOOGLE__CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET}
  AUTH__PROVIDERS__GITHUB__CLIENT_ID: ${AUTH_GITHUB_CLIENT_ID}
  AUTH__PROVIDERS__GITHUB__CLIENT_SECRET: ${AUTH_GITHUB_CLIENT_SECRET}
  S3__DEFAULT_BUCKET: selectel
  S3__BUCKETS__SELECTEL__ACCESS_KEY_ID: ${SELECTEL_ACCESS_KEY}
  S3__BUCKETS__SELECTEL__SECRET_ACCESS_KEY: ${SELECTEL_SECRET_KEY}

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-app: &app
  image: ${IMAGE:-ghcr.io/zamb124/agent-lab:latest}
  environment:
    <<: *common-env
  restart: unless-stopped
  networks:
    - agentlab-net

services:
  # ============================================
  # Infrastructure
  # ============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: agentlab_postgres
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - agentlab-net

  redis:
    image: redis:7-alpine
    container_name: agentlab_redis
    command: redis-server --save 60 1 --loglevel notice --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - agentlab-net

  # ============================================
  # Init container: Migrations
  # ============================================
  migrations:
    <<: *app
    container_name: agentlab_migrations
    command: ["python", "-m", "core.db.migrations"]
    volumes:
      - ./conf.json:/app/conf.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ============================================
  # Application Services
  # ============================================
  agents:
    <<: *app
    container_name: agentlab_agents
    command: ["python", "-m", "apps.agents.main"]
    ports:
      - "8001:8001"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/agents/conf.json:/app/apps/agents/conf.json:ro
      - agents_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8001"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  frontend:
    <<: *app
    container_name: agentlab_frontend
    command: ["python", "-m", "apps.frontend.main"]
    ports:
      - "8002:8002"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/frontend/conf.json:/app/apps/frontend/conf.json:ro
      - frontend_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8002"
    depends_on:
      migrations:
        condition: service_completed_successfully
      agents:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  crm:
    <<: *app
    container_name: agentlab_crm
    command: ["python", "-m", "apps.crm.main"]
    ports:
      - "8003:8003"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/crm/conf.json:/app/apps/crm/conf.json:ro
      - crm_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8003"
    depends_on:
      migrations:
        condition: service_completed_successfully
      agents:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  rag:
    <<: *app
    container_name: agentlab_rag
    command: ["python", "-m", "apps.rag.main"]
    ports:
      - "8004:8004"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/rag/conf.json:/app/apps/rag/conf.json:ro
      - rag_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8004"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  sync:
    <<: *app
    container_name: agentlab_sync
    command: ["python", "-m", "apps.sync.main"]
    ports:
      - "8005:8005"
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/sync/conf.json:/app/apps/sync/conf.json:ro
      - sync_logs:/app/logs
    environment:
      <<: *common-env
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: "8005"
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
    restart: unless-stopped
    networks:
      - agentlab-net

  # ============================================
  # Workers
  # ============================================
  worker:
    <<: *app
    command: ["taskiq", "worker", "apps.broker.worker:broker", "--workers", "4"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net
    deploy:
      replicas: 2

  scheduler:
    <<: *app
    container_name: agentlab_scheduler
    command: ["taskiq", "scheduler", "apps.scheduler.scheduler:scheduler"]
    volumes:
      - ./conf.json:/app/conf.json:ro
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  rag-worker:
    <<: *app
    container_name: agentlab_rag_worker
    command: ["taskiq", "worker", "apps.rag_worker.worker:broker", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ./apps/rag_worker/conf.json:/app/apps/rag_worker/conf.json:ro
      - rag_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

  sync-worker:
    <<: *app
    container_name: agentlab_sync_worker
    command: ["taskiq", "worker", "apps.sync_worker.worker:broker", "--workers", "2"]
    volumes:
      - ./conf.json:/app/conf.json:ro
      - sync_worker_logs:/app/logs
    environment:
      <<: *common-env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentlab-net

volumes:
  postgres_data:
  redis_data:
  agents_logs:
  frontend_logs:
  crm_logs:
  rag_logs:
  sync_logs:
  worker_logs:
  rag_worker_logs:
  sync_worker_logs:

networks:
  agentlab-net:
    driver: bridge
