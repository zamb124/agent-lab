# Единый реестр навигации UI-инструкций (docs/scenarios).
# tag в @pytest.mark.scenario должен быть зарегистрирован здесь.

service_order:
  - platform
  - sync
  - flows
  - crm
  - rag
  - frontend
  - office

learning_paths:
  - id: new-user
    label_ru: Новый пользователь
    label_en: New user
    intro_ru: >-
      Если вы впервые на Humanitec — пройдите эти шаги по порядку: войти на сайт,
      открыть Dashboard и разобраться с меню аккаунта.
    intro_en: >-
      First time on Humanitec? Follow these steps in order: sign in, open the Dashboard,
      and learn the account menu.
    steps:
      - label_ru: Основные инструкции — вход, Dashboard и меню
        label_en: Platform basics — sign-in, Dashboard, and user menu
        href: scenarios/platform/main-dashboard-user-menu/
      - label_ru: Sync — полная инструкция по чату
        label_en: Sync — complete chat guide
        href: scenarios/sync/sync-complete-guide/

  - id: developer
    label_ru: Разработчик
    label_en: Developer
    intro_ru: >-
      Минимальный путь для интеграции: быстрый старт с A2A, затем справочник API
      и инструкция по API Console в Flows.
    intro_en: >-
      Minimum integration path: A2A quickstart, API reference, and the Flows API Console guide.
    steps:
      - label_ru: Быстрый старт — первый запрос к агенту
        label_en: Quickstart — first agent request
        href: quickstart/
      - label_ru: Flows — API Console и A2A
        label_en: Flows — API Console and A2A
        href: scenarios/flows/api-console/
      - label_ru: Справочник API
        label_en: API reference
        href: api/

  - id: sync-team
    label_ru: Команда в Sync
    label_en: Team in Sync
    intro_ru: >-
      Для команд, которые работают в чате: сначала длинная инструкция по сервису,
      затем короткие маршруты по каналам, сообщениям и звонкам.
    intro_en: >-
      For teams using chat: start with the full service guide, then short routes
      for channels, messages, and calls.
    steps:
      - label_ru: Sync — полная инструкция
        label_en: Sync — complete guide
        href: scenarios/sync/sync-complete-guide/
      - label_ru: Создание канала
        label_en: Create a channel
        href: scenarios/sync/create-topic-channel/
      - label_ru: Отправка сообщения
        label_en: Send a message
        href: scenarios/sync/send-message-in-channel/
      - label_ru: Звонок из канала
        label_en: Start a channel call
        href: scenarios/sync/channel-call-overlay/

  - id: office-documents
    label_ru: Документы Office
    label_en: Office documents
    intro_ru: >-
      Работа с документами на /documents: от первого пространства и каталога
      до редактирования в OnlyOffice и публикации ссылки.
    intro_en: >-
      Working with documents at /documents: from the first workspace and catalog
      to OnlyOffice editing and sharing a public link.
    steps:
      - label_ru: Office — полная инструкция
        label_en: Office — complete guide
        href: scenarios/office/documents-complete-guide/
      - label_ru: Каталоги и пространство
        label_en: Workspaces and catalogs
        href: scenarios/office/workspace-and-catalogs/
      - label_ru: Создание и загрузка документов
        label_en: Create and upload documents
        href: scenarios/office/create-and-upload-documents/
      - label_ru: Редактирование в OnlyOffice
        label_en: Edit in OnlyOffice
        href: scenarios/office/edit-in-onlyoffice/
      - label_ru: Каталоги и пространство
        label_en: Workspaces and catalogs
        href: scenarios/office/workspace-and-catalogs/

