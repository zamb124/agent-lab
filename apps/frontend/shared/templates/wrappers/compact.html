{% if view_mode == "table" %}
  <!-- Компактный бейдж для таблицы в ячейке -->
  <td class="field-cell">
    <div class="nested-model-summary">
      <span class="badge badge-info">
        <i class="ti ti-box"></i> {{ model_type.title() if model_type else 'Модель' }}
      </span>
      {% if model_id %}
      <!-- Это ссылка на отдельную модель в БД -->
      <button class="btn btn-ghost btn-xs" 
              hx-get="/frontend/models/{{ model_type }}/{{ model_id }}?view=modal" 
              hx-target="#modal-container"
              data-tooltip="Показать {{ model_type }}">
          <i class="ti ti-eye"></i>
      </button>
      {% else %}
      <!-- Это поле текущей модели - показываем в модальном окне -->
      <button class="btn btn-ghost btn-xs" 
              hx-post="/frontend/models/show-inline-modal"
              hx-ext="json-enc"
              hx-vals='{"field_name": "{{ field_name }}", "parent_model_type": "{{ parent_model_type }}", "parent_model_id": "{{ parent_model_id }}", "model_data": "{}"}'
              hx-target="body"
              hx-swap="beforeend"
              data-tooltip="Редактировать {{ title|default(field_name) }}">
          <i class="ti ti-pencil"></i>
      </button>
      {% endif %}
    </div>
  </td>
{% else %}
  <!-- Компактная карточка для формы -->
  <div class="compact-model-card">
    <div class="card">
      <div class="card-header p-2">
        <div class="d-flex align-items-center gap-2">
          <i class="ti ti-box"></i>
          <span class="small">{{ model_type.title() if model_type else 'Модель' }}</span>
        </div>
      </div>
      <div class="card-body p-2">
        <small class="text-muted">Вложенная модель</small>
        {% if model_id %}
        <button class="btn btn-outline-primary btn-sm w-100 mt-2" 
                hx-get="/frontend/models/{{ model_type }}/{{ model_id }}?view=form" 
                hx-target="#content">
            Редактировать
        </button>
        {% endif %}
      </div>
    </div>
  </div>
{% endif %}
