<!-- Knowledge Graph Partial -->
<div class="crm-knowledge-graph" style="position: relative;">
    <div class="crm-graph-container">
        <div class="crm-graph-canvas" id="graph-canvas"></div>
        
        <!-- Controls -->
        <div class="crm-graph-controls">
            <button class="graph-control-btn graph-edit-btn" onclick="CRM.toggleGraphEditMode()" title="Режим редактирования">
                <i class="ti ti-pencil"></i>
            </button>
            <button class="graph-control-btn" onclick="CRM.zoomGraph('in')" title="{{ t('crm.graph.zoom_in') }}">
                <i class="ti ti-plus"></i>
            </button>
            <button class="graph-control-btn" onclick="CRM.zoomGraph('out')" title="{{ t('crm.graph.zoom_out') }}">
                <i class="ti ti-minus"></i>
            </button>
            <button class="graph-control-btn" onclick="CRM.fitGraph()" title="{{ t('crm.graph.fit') }}">
                <i class="ti ti-arrows-maximize"></i>
            </button>
        </div>
        
        <!-- Legend - dynamic from entity_types -->
        <div class="crm-graph-legend" id="graph-legend">
            {% if entity_types %}
                {% for et in entity_types %}
                    {% if not et.is_filtered %}
                    <div class="crm-graph-legend-item">
                        <span class="crm-entity-dot" style="background: {{ et.color or '#999999' }}"></span>
                        <span>{{ et.name }}</span>
                    </div>
                    {% endif %}
                {% endfor %}
            {% else %}
            <div class="crm-graph-legend-item">
                <span class="crm-entity-dot" style="background: #5B8EC2"></span>
                <span>People</span>
            </div>
            <div class="crm-graph-legend-item">
                <span class="crm-entity-dot" style="background: #6B5B95"></span>
                <span>Companies</span>
            </div>
            <div class="crm-graph-legend-item">
                <span class="crm-entity-dot" style="background: #7BC96F"></span>
                <span>Projects</span>
            </div>
            {% endif %}
        </div>
    </div>
</div>

<script>
// Initialize graph when this partial loads
document.addEventListener('DOMContentLoaded', function() {
    if (window.crmModule) {
        window.crmModule.initGraph();
    }
});

// Also init on HTMX swap
if (window.crmModule) {
    window.crmModule.initGraph();
}
</script>
