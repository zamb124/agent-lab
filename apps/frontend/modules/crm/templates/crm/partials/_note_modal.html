<!-- Note Modal -->
<div class="modal-overlay" onclick="if(event.target === this) CRM.closeModal()">
    <div class="crm-note-modal">
        <!-- Header -->
        <div class="crm-note-modal-header">
            <button class="crm-btn crm-btn-icon crm-btn-ghost" onclick="CRM.closeModal()">
                <i class="ti ti-arrow-left"></i>
            </button>
            
            <div class="crm-note-modal-title">
                    <input type="text" 
                       form="note-form"
                           name="title" 
                       class="crm-note-title-input"
                       placeholder="{{ t('crm.notes.placeholder', 'Note title...') }}"
                           value="{{ note.title if note else '' }}"
                           required>
                {% if note %}
                <span>{{ note.note_date or (note.created_at[:10] if note.created_at else '') }} · {{ note.note_type | replace('_', ' ') | capitalize if note.note_type else 'Note' }}</span>
                        {% endif %}
            </div>
            
            <div class="crm-note-modal-actions">
                {% if note %}
                <button type="button" 
                        class="crm-btn crm-btn-ghost crm-btn-sm"
                        hx-get="/crm/partials/notes/{{ note.note_id or note.id }}"
                        hx-target="#crm-content"
                        hx-push-url="/crm/notes/{{ note.note_id or note.id }}"
                        hx-on::after-request="CRM.closeModal()">
                    <i class="ti ti-external-link"></i>
                    </button>
                {% endif %}
                <button class="crm-btn crm-btn-icon crm-btn-ghost" onclick="CRM.closeModal()">
                    <i class="ti ti-x"></i>
                    </button>
                </div>
            </div>
        
        <!-- Body -->
        <div class="crm-note-modal-body">
            {% set is_modal = true %}
            {% include "crm/partials/_note_content.html" %}
        </div>
    </div>
</div>

<style>
.crm-note-modal {
    background: var(--crm-bg, #f8fafc);
    border-radius: 16px;
    width: 95%;
    max-width: 1100px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

/* Header */
.crm-note-modal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--crm-surface, #ffffff);
    border-bottom: 1px solid var(--crm-border, #e5e7eb);
    flex-shrink: 0;
}

.crm-note-modal-title {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.crm-note-title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 18px;
    font-weight: 600;
    color: var(--crm-text, #1f2937);
    padding: 4px 0;
    outline: none;
}

.crm-note-title-input::placeholder {
    color: var(--crm-text-secondary, #9ca3af);
    font-weight: 400;
}

.crm-note-title-input:focus {
    border-bottom: 2px solid var(--crm-primary, #6366f1);
    margin-bottom: -2px;
}

.crm-note-modal-title span {
    font-size: 12px;
    color: var(--crm-text-secondary, #6b7280);
}

.crm-note-modal-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
}

/* Body */
.crm-note-modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 0;
}

/* Override form styles for modal */
.crm-note-modal .crm-note-form-body {
    height: auto;
    min-height: 450px;
}

.crm-note-modal .crm-note-editor-section {
    max-height: none;
    overflow: visible;
}

.crm-note-modal .crm-note-suggestions-section {
    max-height: none;
}
</style>
