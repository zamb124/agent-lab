<div class="canvas-node {{ node.type }}-node" 
     data-node-id="{{ node.id }}" 
     data-node-type="{{ node.type }}"
     style="transform: translate({{ node.ui.x }}px, {{ node.ui.y }}px); width: {{ node.ui.width }}px; height: {{ node.ui.height }}px;">
    
    <div class="node-header">
        <div class="node-icon">
            {% if node.type == 'agent_node' %}
                <i class="icon-brain"></i>
            {% elif node.type == 'tool_node' %}
                <i class="icon-tool"></i>
            {% elif node.type == 'flow_node' %}
                <i class="icon-flow"></i>
            {% elif node.type == 'function_node' %}
                <i class="icon-code"></i>
            {% else %}
                <i class="icon-circle"></i>
            {% endif %}
        </div>
        <div class="node-title">{{ node.params.get('name', node.id) }}</div>
        <div class="node-actions">
            <button class="btn-icon" data-action="edit">
                <i class="icon-edit"></i>
            </button>
        </div>
    </div>
    
    {% if node.params.get('description') %}
    <div class="node-description">{{ node.params.description }}</div>
    {% endif %}
    
    <!-- Порты для подключения -->
    <div class="node-ports">
        <!-- Входные порты -->
        <div class="input-ports">
            <div class="port input-port" data-port-type="input" data-port-id="input">
                <div class="port-dot"></div>
            </div>
        </div>
        
        <!-- Выходные порты -->
        <div class="output-ports">
            <div class="port output-port" data-port-type="output" data-port-id="output">
                <div class="port-dot"></div>
            </div>
        </div>
    </div>
    
    <!-- Статус выполнения -->
    <div class="node-status" data-status="idle">
        <div class="status-indicator"></div>
    </div>
</div>
