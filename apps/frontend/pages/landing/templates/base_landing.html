<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}Agents Lab{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="/static/img/favicon/favicon.ico">
    
    <!-- Local Fonts: Fira Sans + Fira Sans Condensed -->
    <link rel="stylesheet" href="/static/fonts/fonts.css">
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="/static/fonts/tabler-icons/tabler-icons.min.css">
    
    <!-- Custom CSS (главный файл + landing специфичные) -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/landing/css/landing.css">
    
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <!-- Контейнер для уведомлений -->
    <div id="notifications-container"></div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modal-container"></div>

    <script>
        // App Launcher
        function toggleAppLauncher() {
            const launcher = document.getElementById('app-launcher');
            if (launcher) {
                launcher.classList.toggle('active');
                document.body.style.overflow = launcher.classList.contains('active') ? 'hidden' : '';
            }
        }

        // FAQ Accordion
        document.querySelectorAll('.faq-question').forEach(button => {
            button.addEventListener('click', () => {
                const faqItem = button.parentElement;
                faqItem.classList.toggle('active');
            });
        });

        // Закрытие по ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const launcher = document.getElementById('app-launcher');
                if (launcher && launcher.classList.contains('active')) {
                    toggleAppLauncher();
                }
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
