<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Humanitec - AI-агенты для автоматизации бизнеса</title>
    <meta name="description" content="Humanitec — платформа для автоматизации бизнеса: AI-агенты, умная база знаний и система управления контактами.">
    <link rel="icon" type="image/svg+xml" href="/static/core/assets/service_logos/frontend_logo.svg">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#16213e">
    <meta name="theme-color" content="#16213e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: light)">
    
    <!-- iOS PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Humanitec">
    <link rel="apple-touch-icon" href="/static/core/pwa/icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/core/pwa/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/core/pwa/icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/core/pwa/icons/icon-192x192.png">
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#1a1a2e">
    <meta name="msapplication-TileImage" content="/static/core/pwa/icons/icon-144x144.png">
    
    <link rel="stylesheet" href="/static/core/assets/fonts/fira-sans.css">
    <link rel="stylesheet" href="/static/core/assets/fonts/fira-sans-condensed.css">
    
    <!-- Import Map для Lit и библиотеки -->
    <script type="importmap">
    {
        "imports": {
            "lit": "/static/core/assets/js/lit/lit.min.js",
            "lit/decorators.js": "/static/core/assets/js/lit/decorators.min.js",
            "lit/directives/class-map.js": "/static/core/assets/js/lit/directives/class-map.min.js",
            "lit/directives/unsafe-html.js": "/static/core/assets/js/lit/directives/unsafe-html.min.js",
            "lit/directives/unsafe-svg.js": "/static/core/assets/js/lit/directives/unsafe-svg.min.js",
            "@platform/lib/": "/static/core/lib/",
            "@platform/services/": "/static/core/services/",
            "@capacitor/app": "/static/core/assets/js/vendor/@capacitor/app/index.js",
            "@capacitor/core": "/static/core/assets/js/vendor/@capacitor/core/index.js",
            "@capacitor/splash-screen": "/static/core/assets/js/vendor/@capacitor/splash-screen/index.js"
        }
    }
    </script>
    
    <!-- Стили -->
    <link rel="stylesheet" href="/static/core/assets/css/tokens.css">
    <link rel="stylesheet" href="/static/core/assets/css/reset.css">
    <link rel="stylesheet" href="/static/frontend/styles/landing.css">
    
    <!-- Загружаем app-loader ПЕРЕД использованием в body -->
    <script type="module">
        import '/static/core/lib/components/app-loader.js';
    </script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient, linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%));
            min-height: 100vh;
        }
        
        platform-app,
        frontend-app {
            display: block;
            width: 100%;
            min-height: 100vh;
        }
        
        platform-app:not(:defined),
        frontend-app:not(:defined) {
            opacity: 0;
        }
        
        /* Показываем app-loader даже если он еще не определен */
        app-loader:not(:defined) {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient, linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%));
            z-index: 9999;
            color: var(--text-secondary, rgba(255, 255, 255, 0.5));
            font-family: 'Fira Sans', sans-serif;
        }
        
        app-loader:not(:defined)::after {
            content: 'AI Studio';
        }
    </style>
</head>
<body>
    <!-- Загрузочный экран -->
    <app-loader id="app-loader" fullscreen text="Загрузка Humanitec..."></app-loader>
    
    <frontend-app></frontend-app>
    
    <script type="module" src="/static/frontend/index.js"></script>
    
    <script>
        // Скрыть загрузчик когда приложение готово
        customElements.whenDefined('frontend-app').then(() => {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 400);
            }
        });
    </script>
</body>
</html>
