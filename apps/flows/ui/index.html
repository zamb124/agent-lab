<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Flows</title>
    
    <link rel="icon" type="image/svg+xml" href="/static/core/assets/service_logos/agents_logo.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-title" content="Humanitec">
    <link rel="apple-touch-icon" href="/static/core/pwa/icons/icon-180x180.png">

    <!-- PWA -->
    <meta name="theme-color" content="#0f0f1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Fonts - SF Pro Display fallback with system fonts -->
    <style>
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display'), local('SFProDisplay-Regular'), local('.SFNSDisplay-Regular');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display Medium'), local('SFProDisplay-Medium'), local('.SFNSDisplay-Medium');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display Semibold'), local('SFProDisplay-Semibold'), local('.SFNSDisplay-Semibold');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display Bold'), local('SFProDisplay-Bold'), local('.SFNSDisplay-Bold');
            font-weight: 700;
            font-style: normal;
        }
    </style>
    
    <!-- Lit через import map (из core/frontend общей библиотеки) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "/static/core/assets/js/lit/lit.min.js",
            "lit/": "/static/core/assets/js/lit/",
            "lit/decorators.js": "/static/core/assets/js/lit/decorators.min.js",
            "lit/directives/unsafe-html.js": "/static/core/assets/js/lit/directives/unsafe-html.min.js",
            "lit/directives/class-map.js": "/static/core/assets/js/lit/directives/class-map.min.js",
            "lit/directives/repeat.js": "/static/core/assets/js/lit/directives/repeat.min.js",
            "lit/directives/when.js": "/static/core/assets/js/lit/directives/when.min.js",
            "lit/directives/guard.js": "/static/core/assets/js/lit/directives/guard.min.js",
            "@platform/lib/": "/static/core/lib/",
            "@capacitor/app": "/static/core/assets/js/vendor/@capacitor/app/index.js",
            "@capacitor/core": "/static/core/assets/js/vendor/@capacitor/core/index.js",
            "@capacitor/splash-screen": "/static/core/assets/js/vendor/@capacitor/splash-screen/index.js",
            "@capacitor/push-notifications": "/static/core/assets/js/vendor/@capacitor/push-notifications/index.js"
        }
    }
    </script>
    
    <!-- External Dependencies -->
    <script src="/flows/static/assets/js/marked.min.js"></script>
    
    <!-- Platform UI Styles (из core/frontend) -->
    <link rel="stylesheet" href="/static/core/assets/css/tokens.css">
    <link rel="stylesheet" href="/static/core/assets/css/reset.css">
<style>
        /* Критические стили для предотвращения FOUC */
        flows-app {
            display: flex;
            width: 100%;
            height: 100vh;
            background: transparent;
        }
        flows-app:not(:defined) {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f0f23 50%, #1a1a2e 75%, #16213e 100%);
            z-index: 9999;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        flows-app:not(:defined)::after {
            content: 'AI Studio';
        }
</style>
</head>
<body class="platform-shell">
    <flows-app></flows-app>
    <script type="module" src="/flows/static/index.js"></script>
</body>
</html>
