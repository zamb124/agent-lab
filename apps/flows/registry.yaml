# Единый реестр flows и тулов platform
# Определяет какие сущности загружаются в систему

version: "2.0"

# Flows (bundles)
# ВСЕ flows загружаются в system namespace при старте
# public: true - будут дополнительно копироваться в новые компании со ВСЕМИ зависимостями
flows:
  # Примеры для разработчиков (public для обучения)
  - id: example_react
    public: true
    description: "ReAct агент: демонстрация tools, субагентов, interrupt, variables, skills"
    
  - id: example_graph
    public: true
    description: "Граф агент: демонстрация function нод, условных переходов, inline кода"
  
  # Внешние агенты
  - id: example_external
    public: true
    description: "Внешний агент по A2A протоколу"
  
  # Кастомные классы
  - id: example_custom_class
    public: true
    description: "Кастомный класс агента с llm_node_class параметром"
  
  # CRM агенты
  - id: crm
    public: true
    description: "AI анализатор текста CRM заметок для извлечения entities/relationships"
  
  # Telegram Demo
  - id: telegram_demo
    public: true
    description: "Демо агент с Telegram триггерами и ChannelNode"

  - id: lara
    public: true
    description: "Lara: ассистент CRM (заметки, анализ, файлы, UI-блоки в чате)"

  - id: psychologist_assistant
    public: true
    description: "Ассистент Лары Швед: эмпатичный агент с доступом к базе знаний через RAG и прямыми контактами психолога"

  - id: internship_contract_filler
    public: true
    description: "Агент заполнения договора стажировки по DOCX-шаблону с выдачей готового файла"


# Тулы
# ВСЕ тулы загружаются в system namespace при старте
# public: true - будут дополнительно копироваться как standalone в новые компании
tools:
  # Базовые тулы (public)
  - id: ask_user
    public: true
    description: "Запрашивает информацию у пользователя"
  
  - id: calculator
    public: true
    description: "Калькулятор для математических вычислений"
  
  - id: search
    public: true
    description: "Поиск информации"
  
  # Инструменты для работы с документами (public)
  - id: parse_document
    public: true
    description: "Парсинг документов"
  
  - id: extract_text
    public: true
    description: "Извлечение текста из документов"
  
  # Административные инструменты (private)
  - id: admin_tool
    public: false
    description: "Административные операции"
  
  - id: system_diagnostic
    public: false
    description: "Системная диагностика"

# Общие настройки по умолчанию
defaults:
  llm:
    model: gpt-4o
    temperature: 0.2
  channels:
    - a2a
