# Единый реестр flows и тулов platform
# Определяет какие сущности загружаются в систему

version: "2.0"

# Flows (bundles)
# ВСЕ flows загружаются в system namespace при старте
# public: true - будут дополнительно копироваться в новые компании со ВСЕМИ зависимостями
# landing_public_demo: true - на старте HTTP flows в development bundle перезаписывается в БД с диска
#   (правки prompts/flow.json без ручного reload; список = только помеченные здесь)
flows:
  # Примеры для разработчиков (public для обучения)
  - id: example_react
    public: true
    description: "ReAct агент: демонстрация tools, субагентов, interrupt, variables, skills"
    
  - id: example_graph
    public: true
    description: "Граф агент: демонстрация function нод, условных переходов, inline кода"
  
  # Внешние агенты
  - id: example_external
    public: true
    description: "Внешний агент по A2A протоколу"
  
  # Кастомные классы
  - id: example_custom_class
    public: true
    description: "Кастомный класс агента с llm_node_class параметром"
  
  # CRM агенты
  - id: crm
    public: true
    description: "AI анализатор текста CRM заметок для извлечения entities/relationships"
  
  # Telegram Demo
  - id: telegram_demo
    public: true
    description: "Демо агент с Telegram триггерами и ChannelNode"

  - id: lara
    public: true
    description: "Lara: ассистент CRM (заметки, анализ, файлы, UI-блоки в чате)"

  - id: psychologist_assistant
    public: true
    description: "Ассистент Лары Швед: эмпатичный агент с доступом к базе знаний через RAG и прямыми контактами психолога"

  - id: internship_contract_filler
    public: true
    description: "Агент заполнения договора стажировки по DOCX-шаблону с выдачей готового файла"

  - id: universal_agent
    public: true
    description: "Серия «Универсальный агент»: общий ассистент с калькулятором, уточнениями и мультиязычным sandbox_codegen; навыки RAG и упор на код"

  - id: simple_crawler
    public: true
    description: "Простой краулер snapshot-first через MCP browser: 3 search URL -> top-3 links -> дедуп -> обход 9 URL. Чтение/markdown/RAG ingestion — отдельный шаг."

  - id: public_search
    public: true
    landing_public_demo: true
    description: "Публичный поисковый агент: Search MCP выполняет SERP, suggestions и result insights, затем LLM формирует ответ и источники."

  - id: runet_agent
    public: true
    description: "Агент поиска по platform index runet"

  - id: browser_agent
    public: true
    description: "Интерактивный агент управления браузером через MCP Browser Runtime (multi-turn): хранит browser_session_id в state, выполняет произвольные команды пользователя (navigate/observe/click/fill) и закрывает сессию по явной команде."

  - id: lawyer
    public: true
    landing_public_demo: true
    description: "Лендинг: юридический аналитик РФ (структурированный разбор, ориентиры по НПА и реестрам; не замена консультации юриста)"

  - id: doctor
    public: true
    description: "Демо лендинга: просветительский ориентир по здоровью (не диагноз)"

  - id: support_demo
    public: true
    landing_public_demo: true
    description: "Лендинг: демо первой линии поддержки с мок-поиском заказа"

  - id: psy
    public: true
    landing_public_demo: true
    description: "Демо лендинга: психологический ориентир (не терапия)"

  - id: coach
    public: true
    landing_public_demo: true
    description: "Демо лендинга: карьерный коуч (структура целей и резюме)"

  - id: tutor
    public: true
    landing_public_demo: true
    description: "Демо лендинга: репетитор (объяснение тем без списывания)"
  - id: rasputin_wiki_search
    public: true
    description: "Тестовый ReAct-агент: browser_duckduckgo_links (поиск URL) + browser_page_markdown (готовый markdown страницы); сценарий — Википедия о Григории Распутине."


# Тулы
# ВСЕ тулы загружаются в system namespace при старте
# public: true - будут дополнительно копироваться как standalone в новые компании
tools:
  # Базовые тулы (public)
  - id: ask_user
    public: true
    description: "Запрашивает информацию у пользователя"
  
  - id: calculator
    public: true
    description: "Калькулятор для математических вычислений"

  - id: summarize_text
    public: true
    description: "Суммаризация текста через платформенный LLM"

  - id: format_text_markdown
    public: true
    description: "Преобразование текста в структурированный Markdown через company LLM capability"

  - id: sandbox_codegen
    public: true
    description: "Мета-тул: LLM генерирует код на python/javascript/typescript/go/csharp и выполняет его через isolated code-runner с capability-gateway"

  - id: search
    public: true
    description: "Поиск информации"
  
  # Инструменты для работы с документами (public)
  - id: parse_document
    public: true
    description: "Парсинг документов"
  
  - id: extract_text
    public: true
    description: "Извлечение текста из документов"
  
  # Административные инструменты (private)
  - id: admin_tool
    public: false
    description: "Административные операции"
  
  - id: system_diagnostic
    public: false
    description: "Системная диагностика"

# Общие настройки по умолчанию
defaults:
  llm:
    provider: humanitec_llm
    model: auto
    temperature: 0.2
  channels:
    - a2a
