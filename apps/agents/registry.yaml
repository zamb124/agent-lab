# Единый реестр агентов и тулов platform
# Определяет какие сущности загружаются в систему

version: "2.0"

# Агенты
# ВСЕ агенты загружаются в system namespace при старте
# public: true - будут дополнительно копироваться в новые компании со ВСЕМИ зависимостями
agents:
  # Примеры для разработчиков (public для обучения)
  - id: example_react
    public: true
    description: "ReAct агент: демонстрация tools, субагентов, interrupt, variables, skills"
    
  - id: example_graph
    public: true
    description: "Граф агент: демонстрация function нод, условных переходов, inline кода"
  
  # Внешние агенты
  - id: example_external
    public: false
    description: "Внешний агент по A2A протоколу"
  
  # Кастомные классы
  - id: example_custom_class
    public: false
    description: "Кастомный класс агента с react_node_class параметром"
  
  # CRM агенты
  - id: crm
    public: true
    description: "AI анализатор текста CRM заметок для извлечения entities/relationships"


# Тулы
# ВСЕ тулы загружаются в system namespace при старте
# public: true - будут дополнительно копироваться как standalone в новые компании
tools:
  # Базовые тулы (public)
  - id: ask_user
    public: true
    description: "Запрашивает информацию у пользователя"
  
  - id: calculator
    public: true
    description: "Калькулятор для математических вычислений"
  
  - id: search
    public: true
    description: "Поиск информации"
  
  # Инструменты для работы с документами (public)
  - id: parse_document
    public: true
    description: "Парсинг документов"
  
  - id: extract_text
    public: true
    description: "Извлечение текста из документов"
  
  # Административные инструменты (private)
  - id: admin_tool
    public: false
    description: "Административные операции"
  
  - id: system_diagnostic
    public: false
    description: "Системная диагностика"

# Общие настройки по умолчанию
defaults:
  llm:
    model: gpt-4o
    temperature: 0.2
  channels:
    - a2a
