<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Sync Chat</title>
    <link rel="icon" type="image/svg+xml" href="/static/core/assets/service_logos/sync_logo.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16213e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Humanitec">
    <link rel="apple-touch-icon" href="/static/core/pwa/icons/icon-180x180.png">

    <script type="importmap">
    {
        "imports": {
            "lit": "/static/core/assets/js/lit/lit.min.js",
            "lit/decorators.js": "/static/core/assets/js/lit/decorators.min.js",
            "lit/directives/class-map.js": "/static/core/assets/js/lit/directives/class-map.min.js",
            "lit/directives/repeat.js": "/static/core/assets/js/lit/directives/repeat.min.js",
            "lit/directives/unsafe-html.js": "/static/core/assets/js/lit/directives/unsafe-html.min.js",
            "lit/directives/when.js": "/static/core/assets/js/lit/directives/when.min.js",
            "lit/directives/guard.js": "/static/core/assets/js/lit/directives/guard.min.js",
            "@platform/lib/": "/static/core/lib/",
            "@platform/services/": "/static/core/services/",
            "@capacitor/app": "/static/core/assets/js/vendor/@capacitor/app/index.js",
            "@capacitor/core": "/static/core/assets/js/vendor/@capacitor/core/index.js",
            "@capacitor/splash-screen": "/static/core/assets/js/vendor/@capacitor/splash-screen/index.js",
            "@capacitor/push-notifications": "/static/core/assets/js/vendor/@capacitor/push-notifications/index.js",
            "@livekit/client": "/static/core/assets/js/livekit/livekit-client.esm.mjs"
        }
    }
    </script>

    <link rel="stylesheet" href="/static/core/assets/css/tokens.css">
    <link rel="stylesheet" href="/static/core/assets/css/reset.css">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('/sync/ui/static/assets/InterVariable-DEKF4JyX.ttf') format('truetype');
            font-weight: 100 900;
            font-display: swap;
            font-style: normal;
        }
        @font-face {
            font-family: 'Inter';
            src: url('/sync/ui/static/assets/InterVariable-Italic-uRLhbqHc.ttf') format('truetype');
            font-weight: 100 900;
            font-display: swap;
            font-style: italic;
        }
    </style>

    <script type="module">
        import '/static/core/lib/components/app-loader.js';
    </script>

    <style>
        sync-app:not(:defined) { opacity: 0; }

        app-loader:not(:defined) {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            z-index: 9999;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        app-loader:not(:defined)::after {
            content: 'Sync';
        }
    </style>
</head>
<body class="platform-shell">
    <app-loader id="app-loader" fullscreen></app-loader>
    <sync-app></sync-app>
    <script type="module" src="/sync/ui/static/index.js"></script>
    <script>
        customElements.whenDefined('sync-app').then(() => {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 400);
            }
        });
    </script>
</body>
</html>
