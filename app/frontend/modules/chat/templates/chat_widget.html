{% import 'components.html' as c %}
<link rel="stylesheet" href="/static/chat/css/chat-widget.css">

<div id="chat-widget" class="chat-widget hidden">
    <div class="chat-widget-header bg-primary text-light p-2 d-flex justify-content-between align-items-center">
        <span id="chat-widget-title">Чат с агентом</span>
        <div>
            <button id="chat-widget-minimize" class="btn btn-sm btn-ghost text-light">
                <i class="bi bi-dash"></i>
            </button>
            <button id="chat-widget-close" class="btn btn-sm btn-ghost text-light">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>
    
    <div id="chat-widget-body" class="chat-widget-body">
        <!-- Сообщения -->
        <div id="chat-widget-messages" class="chat-messages p-2 overflow-auto bg-light">
            <!-- Сообщения будут добавляться динамически -->
        </div>
        
        <!-- Поле ввода -->
        <div class="chat-input-container p-2 bg-white border-top">
            <div class="input-group input-group-sm">
                <input type="text" id="chat-widget-input" class="form-control" placeholder="Введите сообщение...">
                <button id="chat-widget-send" class="btn btn-primary">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Кнопка для открытия чата -->
<button id="chat-widget-toggle" class="chat-widget-toggle btn btn-primary rounded-circle">
    <i class="bi bi-chat-dots"></i>
</button>
