<!-- Виджет чата для встраивания в любую страницу -->
<div id="chat-widget" class="chat-widget" style="display: none;">
    <div class="chat-widget-header bg-primary text-light p-2">
        <!-- Основная строка заголовка -->
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span id="chat-widget-title">Чат с агентом</span>
                <button id="chat-widget-info" class="btn btn-sm btn-ghost text-light" title="Информация о флоу" style="display: none;">
                    <i class="bi bi-info-circle"></i>
                </button>
                <div id="chat-connection-status" class="connection-status" title="Состояние соединения">
                    <div class="connection-indicator connecting"></div>
                </div>
            </div>
            <div>
                <button id="chat-widget-agents" class="btn btn-sm btn-ghost text-light" title="Переключить агента">
                    <i class="bi bi-people"></i>
                </button>
                <button id="chat-widget-fullscreen" class="btn btn-sm btn-ghost text-light" title="Развернуть на весь экран">
                    <i class="bi bi-arrows-fullscreen"></i>
                </button>
                <button id="chat-widget-minimize" class="btn btn-sm btn-ghost text-light" title="Свернуть">
                    <i class="bi bi-dash"></i>
                </button>
                <button id="chat-widget-close" class="btn btn-sm btn-ghost text-light" title="Закрыть">
                    <i class="bi bi-x"></i>
                </button>
            </div>
        </div>
        
        <!-- Панель переключения агентов -->
        <div id="chat-agents-panel" class="chat-agents-panel mt-2" style="display: none;">
            <div class="d-flex flex-wrap gap-1">
                <!-- Активные агенты будут добавляться динамически -->
            </div>
        </div>
    </div>
    
    <div id="chat-widget-body" class="chat-widget-body">
        <div id="chat-widget-messages" class="chat-messages p-2 overflow-auto bg-light">
            <!-- Сообщения будут добавляться динамически -->
        </div>
        
        <div class="chat-input-container p-2 bg-white border-top">
            <!-- Область предпросмотра файлов -->
            <div id="chat-files-preview" class="chat-files-preview" style="display: none;">
                <!-- Файлы будут добавляться динамически -->
            </div>
            
            <div class="chat-input-wrapper">
                <button id="chat-widget-commands" class="chat-commands-btn" title="Команды">
                    <i class="bi bi-slash-circle"></i>
                </button>
                <button id="chat-widget-attach" class="chat-attach-btn" title="Прикрепить файл">
                    <i class="bi bi-paperclip"></i>
                </button>
                <button id="chat-widget-voice" class="chat-voice-btn" title="Голосовое сообщение (зажмите и говорите)">
                    <i class="bi bi-mic"></i>
                </button>
                <span id="voice-recording-indicator-widget" class="voice-recording-indicator" style="display: none;">
                    🔴 Запись...
                </span>
                <input type="text" id="chat-widget-input" class="chat-input" placeholder="Введите сообщение...">
                <button id="chat-widget-send" class="chat-send-btn">
                    <i class="bi bi-send"></i>
                </button>
            </div>
            
            <!-- Выпадающее меню команд -->
            <div id="chat-commands-menu" class="chat-commands-menu" style="display: none;">
                <div class="commands-list">
                    <button class="command-item" data-command="/help">
                        <i class="bi bi-question-circle"></i>
                        <span>/help - Показать справку</span>
                    </button>
                    <button class="command-item" data-command="/clear">
                        <i class="bi bi-trash"></i>
                        <span>/clear - Очистить контекст диалога</span>
                    </button>
                    <button class="command-item" data-command="/start">
                        <i class="bi bi-play-circle"></i>
                        <span>/start - Начать новый диалог</span>
                    </button>
                </div>
            </div>
            <!-- Скрытый input для выбора файлов -->
            <input type="file" id="chat-file-input" style="display: none;" multiple accept="*/*">
        </div>
    </div>
</div>

<!-- Кнопка переключения чата -->
<button id="chat-widget-toggle" class="chat-widget-toggle btn btn-primary rounded-circle">
    <i class="bi bi-chat-dots"></i>
</button>

<style>
    /* Используем переменные из основной темы платформы */
    .chat-widget {
        /* Светлая тема (по умолчанию) */
        --chat-bg: var(--bg-card, #ffffff);
        --chat-border: var(--border-primary, #e2e8f0);
        --chat-header-bg: var(--bg-tertiary, #f1f5f9);
        --chat-header-text: var(--text-primary, #1e293b);
        --chat-messages-bg: var(--bg-secondary, #f8fafc);
        --chat-input-bg: var(--bg-card, #ffffff);
        --chat-input-border: var(--border-primary, #e2e8f0);
        --chat-input-text: var(--text-primary, #1e293b);
        --chat-user-msg-bg: var(--accent-primary, #6366f1);
        --chat-user-msg-text: white;
        --chat-agent-msg-bg: var(--bg-card, #ffffff);
        --chat-agent-msg-text: var(--text-primary, #1e293b);
        --chat-agent-msg-border: var(--border-secondary, #cbd5e1);
        --chat-shadow: var(--shadow-lg, 0 10px 15px -3px rgba(0, 0, 0, 0.1));
    }

    /* Темная тема - автоматически использует переменные из variables.css */
    [data-theme="dark"] .chat-widget {
        --chat-bg: var(--bg-card, #1e1e2e);
        --chat-border: var(--border-primary, #374151);
        --chat-header-bg: var(--bg-tertiary, #16213e);
        --chat-header-text: var(--text-primary, #ffffff);
        --chat-messages-bg: var(--bg-secondary, #1a1a2e);
        --chat-input-bg: var(--bg-card, #1e1e2e);
        --chat-input-border: var(--border-primary, #374151);
        --chat-input-text: var(--text-primary, #ffffff);
        --chat-user-msg-bg: var(--accent-primary, #6366f1);
        --chat-user-msg-text: white;
        --chat-agent-msg-bg: var(--bg-hover, #252545);
        --chat-agent-msg-text: var(--text-primary, #ffffff);
        --chat-agent-msg-border: var(--border-secondary, #4b5563);
        --chat-shadow: var(--shadow-lg, 0 10px 15px -3px rgba(0, 0, 0, 0.5));
    }

    .chat-widget {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: auto;
        min-width: 420px;
        max-width: min(50vw, calc(100vw - 40px));
        height: 520px;
        max-height: calc(100vh - 100px);
        border: 1px solid var(--chat-border);
        border-radius: var(--radius-md, 8px);
        background: var(--chat-bg);
        box-shadow: 0 4px 12px var(--chat-shadow);
        z-index: 1040;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    .chat-widget-header {
        background: var(--chat-header-bg) !important;
        color: var(--chat-header-text) !important;
        border-bottom: 1px solid var(--chat-border);
        border-radius: var(--radius-md, 8px) var(--radius-md, 8px) 0 0;
        min-height: 60px;
        flex-shrink: 0;
        cursor: move;
        user-select: none;
        width: 100%;
    }
    
    .chat-widget-header .d-flex {
        flex-wrap: nowrap !important;
        white-space: nowrap;
        gap: 8px;
    }
    
    .chat-widget-header #chat-widget-title {
        white-space: nowrap;
        min-width: max-content;
        flex-shrink: 0;
    }
    
    .chat-widget-header > .d-flex > div:last-child {
        display: flex;
        flex-wrap: nowrap !important;
        gap: 4px;
        flex-shrink: 0;
    }
    
    .chat-widget-header .btn {
        color: var(--chat-header-text) !important;
        border: none !important;
        background: transparent !important;
        flex-shrink: 0;
    }
    
    .chat-widget-header .btn:hover {
        background: rgba(255, 255, 255, 0.1) !important;
    }

    .chat-widget-body {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .chat-messages {
        flex: 1;
        max-height: 400px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--chat-border) transparent;
        background: var(--chat-messages-bg) !important;
    }
    
    .chat-messages::after {
        content: "";
        display: table;
        clear: both; /* Clearfix для float элементов */
    }
    
    .chat-messages::-webkit-scrollbar {
        width: 6px;
    }
    
    .chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }
    
    .chat-messages::-webkit-scrollbar-thumb {
        background-color: var(--chat-border);
        border-radius: 3px;
    }
    
    .chat-input-container {
        flex-shrink: 0;
        border-top: 1px solid var(--chat-border);
        background: var(--chat-input-bg) !important;
        position: relative;
        min-height: 70px;
        padding: 12px 16px;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
    }
    
    .chat-input-wrapper {
        display: flex;
        align-items: center;
        gap: 0;
        width: 100%;
        border-radius: var(--radius-sm, 6px);
        transition: all var(--transition-fast, 0.15s ease);
    }
    
    .chat-input-wrapper:focus-within {
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    
    .chat-commands-btn {
        flex-shrink: 0;
        border: 1px solid var(--chat-input-border);
        border-radius: var(--radius-sm, 6px) 0 0 var(--radius-sm, 6px);
        border-right: none;
        background: var(--chat-input-bg);
        color: var(--chat-input-text);
        padding: 8px 10px;
        cursor: pointer;
        min-width: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-normal, 0.25s ease);
    }

    .chat-commands-btn:hover {
        background: var(--chat-agent-msg-bg);
        opacity: 0.8;
    }

    .chat-attach-btn {
        flex-shrink: 0;
        border: 1px solid var(--chat-input-border);
        border-radius: 0;
        border-right: none;
        border-left: none;
        background: var(--chat-input-bg);
        color: var(--chat-input-text);
        padding: 8px 10px;
        cursor: pointer;
        min-width: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-normal, 0.25s ease);
    }

    .chat-attach-btn:hover {
        background: var(--chat-agent-msg-bg);
        opacity: 0.8;
    }

    .chat-voice-btn {
        flex-shrink: 0;
        border: 1px solid var(--chat-input-border);
        border-radius: 0;
        border-right: none;
        border-left: none;
        background: var(--chat-input-bg);
        color: var(--chat-input-text);
        padding: 8px 10px;
        cursor: pointer;
        min-width: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-normal, 0.25s ease);
        user-select: none;
    }

    .chat-voice-btn:hover {
        background: var(--chat-agent-msg-bg);
        opacity: 0.8;
    }

    .chat-voice-btn:active,
    .chat-voice-btn.recording {
        background: #ef4444;
        color: white;
        border-color: #ef4444;
    }

    .voice-recording-indicator {
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        background: #ef4444;
        color: white;
        padding: 6px 12px;
        border-radius: var(--radius-sm, 6px);
        font-size: 0.85em;
        font-weight: 500;
        box-shadow: var(--shadow-md, 0 4px 6px -1px rgba(0, 0, 0, 0.1));
        z-index: 1000;
        animation: pulse-recording 1s infinite;
        white-space: nowrap;
    }

    @keyframes pulse-recording {
        0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
        50% { opacity: 0.8; transform: translateX(-50%) scale(1.05); }
    }

    .chat-input {
        flex: 1;
        border: 1px solid var(--chat-input-border);
        border-radius: 0;
        border-right: none;
        border-left: none;
        padding: 8px 12px;
        font-size: 14px;
        outline: none;
        background: var(--chat-input-bg);
        color: var(--chat-input-text);
        min-width: 0;
    }
    
    .chat-input:focus {
        outline: none;
    }
    
    .chat-input::placeholder {
        color: var(--chat-input-text);
        opacity: 0.6;
    }
    
    .chat-send-btn {
        flex-shrink: 0; /* Кнопка не сжимается */
        border: 1px solid var(--chat-user-msg-bg);
        border-radius: 0 var(--radius-sm, 6px) var(--radius-sm, 6px) 0; /* Скругляем правые углы */
        background: var(--chat-user-msg-bg);
        color: var(--chat-user-msg-text);
        padding: 8px 12px;
        cursor: pointer;
        min-width: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-normal, 0.25s ease);
    }
    
    .chat-send-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }
    
    .chat-send-btn:active {
        opacity: 0.8;
        transform: translateY(0);
    }

    .chat-widget-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        z-index: 1041;
    }

    .chat-widget.minimized .chat-widget-body {
        display: none;
    }

    .chat-widget.minimized {
        height: auto;
    }

    .chat-widget.fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        border-radius: 0;
        z-index: 9999;
    }

    .chat-widget.fullscreen .chat-widget-header {
        border-radius: 0;
        flex-shrink: 0; /* Заголовок не сжимается */
        min-height: 60px; /* Минимальная высота заголовка */
    }

    .chat-widget.fullscreen .chat-messages {
        max-height: none;
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
    }

    .chat-widget.fullscreen .chat-widget-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 60px); /* Вычитаем высоту заголовка */
    }

    .chat-widget.fullscreen .chat-input-container {
        padding: 16px 20px;
        flex-shrink: 0;
        position: relative;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
    }

    .chat-widget.fullscreen .chat-commands-btn {
        padding: 16px 16px; /* Увеличиваем отступы кнопки команд */
        min-width: 56px; /* Увеличиваем минимальную ширину */
        font-size: 16px; /* Увеличиваем размер иконки */
    }

    .chat-widget.fullscreen .chat-attach-btn {
        padding: 16px 16px; /* Увеличиваем отступы кнопки прикрепления */
        min-width: 56px; /* Увеличиваем минимальную ширину */
        font-size: 16px; /* Увеличиваем размер иконки */
    }

    .chat-widget.fullscreen .chat-voice-btn {
        padding: 16px 16px; /* Увеличиваем отступы кнопки микрофона */
        min-width: 56px; /* Увеличиваем минимальную ширину */
        font-size: 16px; /* Увеличиваем размер иконки */
    }

    .chat-widget.fullscreen .chat-input {
        padding: 16px 20px; /* Увеличиваем внутренние отступы */
        font-size: 16px; /* Увеличиваем размер шрифта */
        min-height: 24px; /* Минимальная высота */
    }

    .chat-widget.fullscreen .chat-send-btn {
        padding: 16px 24px; /* Увеличиваем отступы кнопки */
        min-width: 60px; /* Увеличиваем минимальную ширину */
        font-size: 16px; /* Увеличиваем размер иконки */
    }

    .chat-widget.fullscreen .chat-commands-menu {
        z-index: 10000; /* Еще выше для полноэкранного режима */
        max-width: 400px; /* Больше места в полноэкранном режиме */
    }

    .chat-message {
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: var(--radius-md, 8px);
        max-width: 80%;
        width: fit-content; /* Подстраиваем под размер контента */
        word-wrap: break-word;
        overflow-wrap: break-word;
        hyphens: auto;
        display: inline-block; /* Позволяет width: fit-content работать правильно */
    }

    .chat-message.user {
        background: var(--chat-user-msg-bg);
        color: var(--chat-user-msg-text);
        float: right; /* Выравниваем справа */
        clear: both; /* Каждое сообщение на новой строке */
        text-align: right;
    }

    .chat-message.agent {
        background: var(--chat-agent-msg-bg);
        color: var(--chat-agent-msg-text);
        border: 1px solid var(--chat-agent-msg-border);
        float: left; /* Выравниваем слева */
        clear: both; /* Каждое сообщение на новой строке */
    }

    /* Markdown стили внутри сообщений */
    .chat-message h1, .chat-message h2, .chat-message h3 {
        margin: 0.5em 0 0.3em;
        line-height: 1.3;
    }

    .chat-message h1 {
        font-size: 1.4em;
        font-weight: 600;
    }

    .chat-message h2 {
        font-size: 1.2em;
        font-weight: 600;
    }

    .chat-message h3 {
        font-size: 1.1em;
        font-weight: 600;
    }

    .chat-message strong {
        font-weight: 600;
    }

    .chat-message em {
        font-style: italic;
    }

    .chat-message code {
        background: rgba(0, 0, 0, 0.1);
        padding: 2px 6px;
        border-radius: 3px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.9em;
    }

    [data-theme="dark"] .chat-message code {
        background: rgba(255, 255, 255, 0.1);
    }

    .chat-message a {
        color: var(--accent-primary, #6366f1);
        text-decoration: underline;
        transition: opacity 0.15s ease;
    }

    .chat-message a:hover {
        opacity: 0.8;
    }

    .chat-message ul, .chat-message ol {
        margin: 0.5em 0;
        padding-left: 1.5em;
    }

    .chat-message ul {
        list-style-type: disc;
    }

    .chat-message ol {
        list-style-type: decimal;
    }

    .chat-message li {
        margin: 0.2em 0;
        line-height: 1.5;
    }

    .chat-message ul ul, .chat-message ol ul {
        margin: 0.2em 0;
        padding-left: 1.2em;
        list-style-type: circle;
    }

    .chat-message ol ol, .chat-message ul ol {
        margin: 0.2em 0;
        padding-left: 1.2em;
    }

    .chat-message p {
        margin: 0.5em 0;
        line-height: 1.5;
    }

    .chat-message p:first-child {
        margin-top: 0;
    }

    .chat-message p:last-child {
        margin-bottom: 0;
    }

    .chat-file {
        margin: 5px 0;
        padding: 8px;
        border: 1px solid var(--chat-border);
        border-radius: var(--radius-sm, 6px);
        background: var(--chat-agent-msg-bg);
        color: var(--chat-agent-msg-text);
    }

    .file-info {
        font-size: 0.8em;
        color: var(--chat-agent-msg-text);
        opacity: 0.7;
        margin-top: 4px;
    }

    /* Индикатор печати */
    .chat-typing-indicator {
        margin-bottom: 10px;
    }

    .typing-message {
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0.8;
        border: none !important;
        background: transparent !important;
        padding: 4px 8px !important;
    }

    .typing-text {
        font-size: 0.9em;
        color: var(--chat-agent-msg-text);
        opacity: 0.7;
    }

    .typing-dots {
        display: flex;
        gap: 3px;
        align-items: center;
    }

    .typing-dots span {
        width: 6px;
        height: 6px;
        background: var(--chat-agent-msg-text);
        border-radius: 50%;
        opacity: 0.4;
        animation: typing-bounce 1.4s ease-in-out infinite both;
    }

    .typing-dots span:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: -0.16s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: 0s;
    }

    @keyframes typing-bounce {
        0%, 80%, 100% {
            transform: scale(0.8);
            opacity: 0.4;
        }
        40% {
            transform: scale(1.2);
            opacity: 1;
        }
    }

    /* Предпросмотр файлов над полем ввода */
    .chat-files-preview {
        margin-bottom: 8px;
        padding: 8px;
        border: 1px solid var(--chat-border);
        border-radius: var(--radius-sm, 6px);
        background: var(--chat-messages-bg);
        max-height: 120px;
        overflow-y: auto;
    }

    .file-preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .file-preview-cancel {
        background: none;
        border: none;
        color: var(--chat-agent-msg-text);
        cursor: pointer;
        padding: 4px;
        border-radius: var(--radius-sm, 6px);
    }

    .file-preview-cancel:hover {
        background: var(--chat-border);
    }

    .file-preview-list {
        margin: 8px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }

    .file-preview-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        font-size: 0.8em;
        background: var(--chat-input-bg);
        border-radius: var(--radius-sm, 6px);
        border: 1px solid var(--chat-border);
        width: fit-content;
        max-width: 180px;
    }

    .file-name {
        flex: 1;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
    }
