<h1 class="header-title" id="page-title" hx-swap-oob="true">
    <i class="bi bi-chat-left-dots me-2"></i>
    {{ t('chats.title') }}
</h1>

<div class="container-fluid py-4">
    <style>
        #chats-filters .form-control,
        #chats-filters .form-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            height: 31px;
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        
        #chats-filters .form-control:focus,
        #chats-filters .form-select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--bg-card);
        }
        
        #chats-filters .btn-sm {
            height: 31px;
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.5;
        }
    </style>

    <div class="card mb-3">
        <div class="card-body py-2">
            <form id="chats-filters" 
                  hx-get="/frontend/chats/list" 
                  hx-target="#chats-list"
                  hx-trigger="submit, change from:select"
                  hx-indicator="#loading-indicator"
                  class="d-flex flex-wrap align-items-center gap-2">
                
                <select class="form-select form-select-sm" id="filter-platform" name="platform" style="width: 140px;">
                    <option value="">{{ t('chats.filters.platform_placeholder') }}</option>
                    <option value="web">{{ t('chats.platform_values.web') }}</option>
                    <option value="telegram">{{ t('chats.platform_values.telegram') }}</option>
                    <option value="api">{{ t('chats.platform_values.api') }}</option>
                </select>
                
                <input type="text" class="form-control form-control-sm" id="filter-flow" name="flow_id" placeholder="{{ t('chats.filters.flow_placeholder') }}" style="width: 150px;">
                
                <select class="form-select form-select-sm" id="filter-status" name="status" style="width: 120px;">
                    <option value="">{{ t('chats.filters.status_placeholder') }}</option>
                    <option value="active">{{ t('chats.status_values.active') }}</option>
                    <option value="inactive">{{ t('chats.status_values.inactive') }}</option>
                    <option value="processing">{{ t('chats.status_values.processing') }}</option>
                    <option value="waiting_input">{{ t('chats.status_values.waiting_input') }}</option>
                </select>
                
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-funnel"></i>
                    {{ t('chats.apply') }}
                </button>
                
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="
                    document.getElementById('chats-filters').reset();
                    htmx.trigger('#chats-filters', 'submit');
                ">
                    <i class="bi bi-x-circle"></i>
                    {{ t('chats.reset') }}
                </button>
            </form>
        </div>
    </div>

    <div style="position: relative; min-height: 400px; margin-top: 1.5rem;">
        <div id="loading-indicator" class="htmx-indicator">
            <div class="loading-overlay">
                <div style="text-align: center;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div id="chats-list" 
             hx-get="/frontend/chats/list" 
             hx-trigger="load"
             hx-indicator="#loading-indicator">
        </div>
    </div>
</div>
