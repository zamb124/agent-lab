<link rel="stylesheet" href="/static/store/css/store.css">

<h1 class="header-title" id="page-title" hx-swap-oob="true">
    <i class="bi bi-shop me-2"></i>
    <span data-i18n="store.title">Магазин Flow</span>
</h1>

<div class="header-right" hx-swap-oob="true">
    <button class="btn btn-ghost btn-sm" data-theme-toggle data-tooltip="Переключить тему">
        <i class="bi bi-sun"></i>
    </button>
</div>

<div class="store-container" 
     id="store-list-view"
     hx-get="/frontend/store/list" 
     hx-trigger="load" 
     hx-indicator="#store-loading">
    <div id="store-loading" class="loading-indicator htmx-indicator">
        <div class="spinner"></div>
        <span data-i18n="store.loading">Загрузка магазина...</span>
    </div>
</div>

<div id="flow-details-modal" class="flow-modal" style="display: none;" hx-preserve="true">
    <div class="flow-modal-content" id="modal-flow-details">
    </div>
</div>

<script src="/static/store/js/store.js" type="module"></script>
