<div class="modal fade" id="flowEditorModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    {% if flow %}Редактировать Flow{% else %}Создать новый Flow{% endif %}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <form id="flowEditorForm" 
                  hx-post="{% if flow %}/frontend/builder/flows/{{ flow.flow_id }}{% else %}/frontend/builder/flows/{% endif %}"
                  hx-target="#flowEditorModal"
                  hx-swap="outerHTML">
                
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="flowName" class="form-label">Название *</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="flowName" 
                                       name="name" 
                                       value="{{ flow.name if flow else '' }}" 
                                       required>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="flowEntryPoint" class="form-label">Entry Point Agent</label>
                                <select class="form-control" id="flowEntryPoint" name="entry_point_agent">
                                    <option value="">Выберите агента...</option>
                                    <!-- Опции будут загружены через HTMX -->
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="flowDescription" class="form-label">Описание</label>
                        <textarea class="form-control" 
                                  id="flowDescription" 
                                  name="description" 
                                  rows="3">{{ flow.description if flow else '' }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="flowTimeout" class="form-label">Таймаут (сек)</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="flowTimeout" 
                                       name="timeout" 
                                       value="{{ flow.timeout if flow and flow.timeout else '' }}" 
                                       min="1">
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="flowMaxRetries" class="form-label">Макс. повторов</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="flowMaxRetries" 
                                       name="max_retries" 
                                       value="{{ flow.max_retries if flow else 0 }}" 
                                       min="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Платформы</label>
                        <div class="platforms-list">
                            {% set platforms = flow.platforms if flow else {'api': {}} %}
                            {% for platform, config in platforms.items() %}
                            <div class="platform-item">
                                <div class="form-check">
                                    <input class="form-check-input" 
                                           type="checkbox" 
                                           id="platform_{{ platform }}" 
                                           name="platforms[]" 
                                           value="{{ platform }}" 
                                           checked>
                                    <label class="form-check-label" for="platform_{{ platform }}">
                                        {{ platform.title() }}
                                    </label>
                                </div>
                            </div>
                            {% endfor %}
                            
                            <!-- Добавление новых платформ -->
                            <div class="platform-item">
                                <div class="form-check">
                                    <input class="form-check-input" 
                                           type="checkbox" 
                                           id="platform_telegram" 
                                           name="platforms[]" 
                                           value="telegram"
                                           {% if 'telegram' in platforms %}checked{% endif %}>
                                    <label class="form-check-label" for="platform_telegram">
                                        <i class="bi bi-telegram"></i> Telegram
                                    </label>
                                </div>
                            </div>
                            
                            <div class="platform-item">
                                <div class="form-check">
                                    <input class="form-check-input" 
                                           type="checkbox" 
                                           id="platform_whatsapp" 
                                           name="platforms[]" 
                                           value="whatsapp"
                                           {% if 'whatsapp' in platforms %}checked{% endif %}>
                                    <label class="form-check-label" for="platform_whatsapp">
                                        <i class="bi bi-whatsapp"></i> WhatsApp
                                    </label>
                                </div>
                            </div>
                            
                            <div class="platform-item">
                                <div class="form-check">
                                    <input class="form-check-input" 
                                           type="checkbox" 
                                           id="platform_web" 
                                           name="platforms[]" 
                                           value="web"
                                           {% if 'web' in platforms %}checked{% endif %}>
                                    <label class="form-check-label" for="platform_web">
                                        <i class="bi bi-globe"></i> Web
                                    </label>
                                </div>
                            </div>
                            
                            <div class="platform-item">
                                <div class="form-check">
                                    <input class="form-check-input" 
                                           type="checkbox" 
                                           id="platform_amocrm" 
                                           name="platforms[]" 
                                           value="amocrm"
                                           {% if 'amocrm' in platforms %}checked{% endif %}>
                                    <label class="form-check-label" for="platform_amocrm">
                                        <i class="bi bi-building"></i> AmoCRM
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        {% if flow %}Сохранить{% else %}Создать{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
