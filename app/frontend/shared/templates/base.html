<!DOCTYPE html>
<html lang="{{ request.state.language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}{{ t('common.app_name') }}{% endblock %}</title>
    
    <!-- Применяем тему ДО загрузки страницы для избежания мигания -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    
    <!-- Preconnect для быстрой загрузки шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-ws@2.0.2" defer></script>
    
    <!-- Custom CSS (единый файл со всеми компонентами) -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- Code Editor CSS (для работы с Ace Editor) -->
    <link rel="stylesheet" href="/static/css/components/code-editor.css">

    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-primary" hx-ext="ws" ws-connect="/ws/notifications">
    {% block content %}{% endblock %}

    <!-- Контейнер для уведомлений -->
    <div id="notifications-container"></div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modal-container"></div>

    <!-- Виджет чата (доступен на всех страницах) -->
    {% include 'chat_widget_inline.html' %}

    <!-- Opus Recorder для записи голоса в OGG/Opus -->
    <script src="/static/js/opus-recorder.min.js"></script>
    
    <!-- CodeEditor компонент (нужен для inline кода) -->
    <script src="/static/js/components/code-editor.js"></script>

    <!-- Modal Manager (система модальных окон) -->
    <script src="/static/js/components/modal.js"></script>

    <!-- Ace Editor (для редактирования кода) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.js"></script>

    <!-- Prompt Editor -->
    <script src="/static/js/prompt-editor.js" type="module"></script>
    
    <!-- Main APP JavaScript -->
    <script src="/static/js/app.js" type="module"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
