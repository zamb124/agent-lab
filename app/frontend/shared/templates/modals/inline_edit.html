<div class="p-3">
    <form hx-put="/frontend/models/{{ parent_model_type }}/{{ parent_model_id }}" 
          hx-ext="json-enc"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) this.closest('.modal-overlay').remove()">
        <div class="mb-3">
            <label class="form-label">Поле {{ field_name }}:</label>
            <textarea name="{{ field_name }}" 
                      class="form-control form-control-code" 
                      rows="15">{{ formatted_json }}</textarea>
            <small class="form-text text-muted">Редактируйте JSON структуру поля</small>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="ti ti-check"></i>
                Сохранить
            </button>
            <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">
                <i class="ti ti-x"></i>
                Отмена
            </button>
        </div>
    </form>
</div>
