<div class="modal-overlay" style="display: flex;" onclick="this.remove()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="d-flex align-items-center gap-3">
                <div class="table-icon">
                    <i class="bi bi-eye"></i>
                </div>
                <div>
                    <h5 class="mb-0 font-semibold">{{ model_type.title() if model_type else 'Детали' }}</h5>
                    <small class="text-muted">Подробная информация</small>
                </div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">
                <i class="bi bi-x"></i>
            </button>
        </div>
        
        <div class="modal-body">
            {{ content|safe }}
        </div>
        
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">
                <i class="bi bi-x"></i>
                Закрыть
            </button>
        </div>
    </div>
</div>
