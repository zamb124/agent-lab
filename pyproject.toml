[project]
name = "agent-lab"
version = "0.1.0"
description = "AI Agents Lab with LangGraph"
requires-python = ">=3.12"
dependencies = [
    # Web Framework & Server
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "gunicorn>=21.2.0",
    "python-multipart>=0.0.6",
    # LangChain & LangGraph Core
    "langchain>=0.1.0",
    "langchain-core>=0.1.0",
    "langchain-community>=0.0.20",
    # LLM Integrations
    "langchain-openai>=0.0.8",
    "langfuse>=2.0.0",
    # Data Validation & Settings
    "pydantic[email]>=2.5.0",
    "pydantic-settings>=2.1.0",
    # Database & ORM
    "sqlalchemy[asyncpg]>=2.0.23",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "psycopg2-binary>=2.9.9",
    # Asynchronous HTTP Client
    "httpx>=0.25.0",
    # S3 Client
    "aioboto3>=12.0.0",
    "boto3>=1.28.0",
    # Image Processing
    "Pillow>=10.0.0",
    # Audio Processing
    "pydub>=0.25.1",
    # Templating
    "jinja2>=3.1.2",
    # HTML Parsing
    "beautifulsoup4>=4.12.0",
    # Testing
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    # Additional
    "greenlet>=3.2.4",
    "pytest-xdist>=3.8.0",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.21",
    "mkdocs-static-i18n>=1.3.0",
    "pymdown-extensions>=10.16.1",
    "pyjwt>=2.10.1",
    "openinference-instrumentation-langchain>=0.1.54",
    "openinference-instrumentation-openai>=0.1.39",
    "opentelemetry-sdk>=1.38.0",
    "opentelemetry-exporter-otlp>=1.38.0",
    "opentelemetry-instrumentation-asyncpg>=0.59b0",
    "simpleeval>=1.0.3",
    "taskiq>=0.12.0",
    "taskiq-pg>=0.2.0",
    "pytest-playwright-asyncio>=0.7.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
markers = [
    "integration: integration tests that require external services",
    "slow: slow tests that take longer to run",
]
filterwarnings = [
    "ignore::DeprecationWarning:starlette.templating:",
    "ignore::DeprecationWarning:httpx._models:",
    "ignore::DeprecationWarning:httpx._client:",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[dependency-groups]
dev = [
    "filelock>=3.20.0",
    "pillow>=11.3.0",
    "playwright>=1.55.0",
    "pymupdf>=1.26.5",
    "ruff>=0.13.0",
    "coverage>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.4.0",
]

