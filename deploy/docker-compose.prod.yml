version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agents-lab-app
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./conf.json:/app/conf.json:ro
      - ~/.postgresql:/app/.postgresql:ro
      - app_logs:/app/logs
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - agents-lab-network

volumes:
  app_logs:

networks:
  agents-lab-network:
    driver: bridge
