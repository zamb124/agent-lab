# HTTP редирект для основного домена
server {
    listen 80;
    server_name agents-lab.ru www.agents-lab.ru;
    
    # Перенаправление на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTP редирект для всех поддоменов
server {
    listen 80;
    server_name *.agents-lab.ru;
    
    # Перенаправление на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS для основного домена
server {
    listen 443 ssl http2;
    server_name agents-lab.ru www.agents-lab.ru;

    # SSL конфигурация
    ssl_certificate /etc/letsencrypt/live/agents-lab.ru-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agents-lab.ru-0001/privkey.pem;
    
    # SSL настройки безопасности
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Размер загружаемых файлов
    client_max_body_size 100M;
    
    # Статические файлы через проксирование
    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Проксирование на приложение
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket поддержка
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Логи
    access_log /var/log/nginx/agents-lab.access.log;
    error_log /var/log/nginx/agents-lab.error.log;
}

# HTTPS для всех поддоменов
server {
    listen 443 ssl http2;
    server_name *.agents-lab.ru;

    # SSL конфигурация (тот же wildcard сертификат)
    ssl_certificate /etc/letsencrypt/live/agents-lab.ru-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agents-lab.ru-0001/privkey.pem;
    
    # SSL настройки безопасности
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Размер загружаемых файлов
    client_max_body_size 100M;
    
    # Статические файлы
    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Проксирование на приложение
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket поддержка
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Логи для поддоменов
    access_log /var/log/nginx/subdomains.access.log;
    error_log /var/log/nginx/subdomains.error.log;
}
