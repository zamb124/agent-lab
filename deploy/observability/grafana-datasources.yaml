# Provisioned datasources для Grafana.
# Cross-linking: trace_id в логе (Loki) → Tempo waterfall, и обратно.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id"\s*:\s*"(\w+)"'
          matcherType: regex
          name: trace_id
          url: "${__value.raw}"
          urlDisplayLabel: "View Trace"

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        customQuery: true
        query: '{} | json | trace_id = "${__trace.traceId}"'
