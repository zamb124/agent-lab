# Подготовленные datasources для Grafana.
# Loki → Tempo (derivedFields по trace_id в логах).
# Связку Tempo → Loki в Explore при желании включите в UI datasources (избегаем циклических UID при provisioning).
apiVersion: 1

datasources:
  # Tempo первым: у Loki derivedFields ссылаются на uid tempo (иначе provisioning падает).
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id"\s*:\s*"(\w+)"'
          matcherType: regex
          name: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"
