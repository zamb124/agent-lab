apiVersion: 1

# Базовая политика маршрутизации алертов.
# severity=critical — маршрутизируются сразу, warning — с меньшим приоритетом.

policies:
  - orgId: 1
    receiver: default
    group_by:
      - alertname
      - severity
      - svc
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: default
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      - receiver: default
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 4h
