# Production overrides для humanitec.ru.
# Применяется поверх values.yaml: helm upgrade ... --values values.yaml --values values-prod.yaml

domain: humanitec.ru

image:
  pullSecrets:
    - ghcr-agent-lab-pull

ingress:
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru

observability:
  loki:
    storage: 100Gi
  tempo:
    storage: 50Gi

# Совпадает с существующим PVC litserve-model-cache (helm patch size требует
# allowVolumeExpansion у StorageClass; microk8s-hostpath без него). Увеличение
# кеша — через migrate-pvc / новый PVC и перенос данных, затем обновить это значение.
litserve:
  modelCacheSize: 50Gi
