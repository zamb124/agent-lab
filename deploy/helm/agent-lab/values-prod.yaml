# Production overrides для humanitec.ru.
# Применяется поверх values.yaml: helm upgrade ... --values values.yaml --values values-prod.yaml

domain: humanitec.ru

image:
  pullSecrets:
    - ghcr-agent-lab-pull

ingress:
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru

observability:
  loki:
    storage: 100Gi
  tempo:
    storage: 50Gi

# PVC litserve-model-cache: текущий размер зафиксирован на 50Gi.
# Целевой размер — 100Gi (GigaAM v3 + Silero TTS/VAD + Qwen3 embedding/reranker + запас).
# microk8s-hostpath не поддерживает allowVolumeExpansion, поэтому resize в-месте невозможен.
# Для увеличения до 100Gi выполнить:
#   bash deploy/scripts/migrate-pvc.sh provider-litserve master
# После успешной миграции обновить значение до 100Gi и закоммитить.
litserve:
  modelCacheSize: 50Gi
  llmBackend: transformers
