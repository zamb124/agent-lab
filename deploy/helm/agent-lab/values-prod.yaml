# Production overrides для humanitec.ru.
# Применяется поверх values.yaml: helm upgrade ... --values values.yaml --values values-prod.yaml

domain: humanitec.ru

image:
  pullSecrets:
    - ghcr-agent-lab-pull

ingress:
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru

observability:
  loki:
    storage: 100Gi
  tempo:
    storage: 50Gi

# PVC litserve-model-cache: GigaAM v3 (~3Gi) + Silero TTS v5 (~150Mi) + Silero VAD (~50Mi)
# + Qwen3-Embedding-8B + Qwen3-Reranker-8B + запас = 100Gi минимум.
# При изменении размера существующего PVC нужен migrate-pvc.sh (microk8s-hostpath
# не поддерживает allowVolumeExpansion в-месте).
litserve:
  modelCacheSize: 100Gi
