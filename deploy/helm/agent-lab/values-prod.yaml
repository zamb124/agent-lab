# Production overrides для humanitec.ru.
# Применяется поверх values.yaml: helm upgrade ... --values values.yaml --values values-prod.yaml

domain: humanitec.ru
# Имя master-ноды в kube (microk8s hostname после bootstrap-master.sh = "master").
masterNodeName: master

image:
  pullSecrets:
    - ghcr-agent-lab-pull

ingress:
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru

# litserve.scheduleOnGpuNode = true (по умолчанию из values.yaml) — нода gpu-worker
# подключена через deploy/scripts/join-cluster.sh, label accelerator=nvidia-gpu.
# NVIDIA k8s-device-plugin DaemonSet (templates/50-gpu/nvidia-device-plugin.yaml) публикует
# nvidia.com/gpu в Allocatable. workflow_dispatch.litserve_node=gpu (default).

observability:
  loki:
    storage: 100Gi
  tempo:
    storage: 50Gi
