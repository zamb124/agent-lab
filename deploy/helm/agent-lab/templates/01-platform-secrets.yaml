{{- if .Values.platformSecrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.platformSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: agent-lab
type: Opaque
stringData:
  postgres-password: {{ .Values.platformSecrets.postgresPassword | quote }}
  auth-jwt-secret: {{ .Values.platformSecrets.authJwtSecret | quote }}
  hf-token: {{ .Values.platformSecrets.hfToken | quote }}
  auth-yandex-client-id: {{ .Values.platformSecrets.authYandexClientId | quote }}
  auth-yandex-client-secret: {{ .Values.platformSecrets.authYandexClientSecret | quote }}
  auth-google-client-id: {{ .Values.platformSecrets.authGoogleClientId | quote }}
  auth-google-client-secret: {{ .Values.platformSecrets.authGoogleClientSecret | quote }}
  auth-github-client-id: {{ .Values.platformSecrets.authGithubClientId | quote }}
  auth-github-client-secret: {{ .Values.platformSecrets.authGithubClientSecret | quote }}
  auth-amocrm-client-id: {{ .Values.platformSecrets.authAmocrmClientId | quote }}
  auth-amocrm-client-secret: {{ .Values.platformSecrets.authAmocrmClientSecret | quote }}
  auth-apple-private-key: {{ .Values.platformSecrets.authApplePrivateKey | quote }}
  auth-demo-password: {{ .Values.platformSecrets.authDemoPassword | quote }}
  push-vapid-public-key: {{ .Values.platformSecrets.pushVapidPublicKey | quote }}
  push-vapid-private-key: {{ .Values.platformSecrets.pushVapidPrivateKey | quote }}
  push-apns-private-key: {{ .Values.platformSecrets.pushApnsPrivateKey | quote }}
  push-fcm-credentials-json: {{ .Values.platformSecrets.pushFcmCredentialsJson | quote }}
  push-fcm-project-id: {{ .Values.platformSecrets.pushFcmProjectId | quote }}
  selectel-access-key: {{ .Values.platformSecrets.selectelAccessKey | quote }}
  selectel-secret-key: {{ .Values.platformSecrets.selectelSecretKey | quote }}
  livekit-api-key: {{ .Values.platformSecrets.livekitApiKey | quote }}
  livekit-api-secret: {{ .Values.platformSecrets.livekitApiSecret | quote }}
  turn-secret: {{ .Values.platformSecrets.turnSecret | quote }}
  onlyoffice-jwt-secret: {{ .Values.platformSecrets.onlyofficeJwtSecret | quote }}
  grafana-admin-password: {{ .Values.platformSecrets.grafanaAdminPassword | quote }}
  llm-openrouter-api-key: {{ .Values.platformSecrets.llmOpenrouterApiKey | quote }}
  llm-bothub-api-key: {{ .Values.platformSecrets.llmBothubApiKey | quote }}
  llm-groq-api-key: {{ .Values.platformSecrets.llmGroqApiKey | quote }}
  llm-google-api-key: {{ .Values.platformSecrets.llmGoogleApiKey | quote }}
  llm-github-api-key: {{ .Values.platformSecrets.llmGithubApiKey | quote }}
  llm-huggingface-api-key: {{ .Values.platformSecrets.llmHuggingfaceApiKey | quote }}
  llm-deepinfra-api-key: {{ .Values.platformSecrets.llmDeepinfraApiKey | quote }}
  llm-yandex-api-key: {{ .Values.platformSecrets.llmYandexApiKey | quote }}
  llm-yandex-folder-id: {{ .Values.platformSecrets.llmYandexFolderId | quote }}
  stt-cloud-ru-api-key: {{ .Values.platformSecrets.sttCloudRuApiKey | quote }}
  stt-yandex-api-key: {{ .Values.platformSecrets.sttYandexApiKey | quote }}
  stt-yandex-folder-id: {{ .Values.platformSecrets.sttYandexFolderId | quote }}
  stt-sber-client-id: {{ .Values.platformSecrets.sttSberClientId | quote }}
  stt-sber-client-secret: {{ .Values.platformSecrets.sttSberClientSecret | quote }}
  tts-cloud-ru-api-key: {{ .Values.platformSecrets.ttsCloudRuApiKey | quote }}
  tts-yandex-api-key: {{ .Values.platformSecrets.ttsYandexApiKey | quote }}
  tts-yandex-folder-id: {{ .Values.platformSecrets.ttsYandexFolderId | quote }}
  tts-sber-client-id: {{ .Values.platformSecrets.ttsSberClientId | quote }}
  tts-sber-client-secret: {{ .Values.platformSecrets.ttsSberClientSecret | quote }}
  rag-embedding-api-key: {{ .Values.platformSecrets.ragEmbeddingApiKey | quote }}
  yoomoney-account-number: {{ .Values.platformSecrets.yoomoneyAccountNumber | quote }}
  yoomoney-notification-secret: {{ .Values.platformSecrets.yoomoneyNotificationSecret | quote }}
  yoomoney-client-id: {{ .Values.platformSecrets.yoomoneyClientId | quote }}
  yoomoney-client-secret: {{ .Values.platformSecrets.yoomoneyClientSecret | quote }}
  yoomoney-access-token: {{ .Values.platformSecrets.yoomoneyAccessToken | quote }}
  proxy-enabled: {{ .Values.platformSecrets.proxyEnabled | quote }}
  proxy-proxies: {{ .Values.platformSecrets.proxyProxies | quote }}
  search-tinyfish-api-key: {{ .Values.platformSecrets.searchTinyfishApiKey | quote }}
  search-linkup-api-key: {{ .Values.platformSecrets.searchLinkupApiKey | quote }}
  search-serper-api-key: {{ .Values.platformSecrets.searchSerperApiKey | quote }}
