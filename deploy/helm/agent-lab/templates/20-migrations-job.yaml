apiVersion: batch/v1
kind: Job
metadata:
  name: migrations
  namespace: {{ .Values.namespace }}
  annotations:
    # pre-install/pre-upgrade: миграции применяются ДО того, как Helm --wait начинает ждать готовность
    # Deployments приложений. Иначе apps стартуют на пустой схеме, падают в CrashLoop, --wait упирается
    # в таймаут и post-* hook никогда не достигается — deadlock.
    # На первом install Postgres StatefulSet ещё не существует — wait-postgres init-контейнер не дождётся
    # сервиса postgres и Job упадёт. Поэтому первый install выполняется в два прохода (см. deploy/README.md):
    # сначала helm install --skip-hooks, затем повторный helm upgrade без skip-hooks.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Без ttlSecondsAfterFinished: TTL controller удаляет завершённые Job (Complete и Failed),
  # из-за чего теряются логи диагностики. Успешный hook очищается Helm по hook-delete-policy.
  backoffLimit: 5
  # Жёсткий потолок на миграцию: при затяжных Alembic upgrade Job падает быстрее, чем
  # helm --timeout (30m), и CI получает понятную причину, а не общий context deadline exceeded.
  activeDeadlineSeconds: 900
  template:
    metadata:
      name: migrations
    spec:
{{- include "agentlab.podImagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      initContainers:
        - name: wait-postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platformSecretName }}
                  key: postgres-password
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 90); do
                if PGPASSWORD="$POSTGRES_PASSWORD" pg_isready -h postgres -U platform_user -d postgres; then
                  echo "postgres ready"
                  exit 0
                fi
                echo "wait postgres ($i/90)"
                sleep 2
              done
              echo "postgres unavailable" >&2
              exit 1
      containers:
        - name: migrate
          image: {{ include "agentlab.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "scripts.db_migrate", "upgrade"]
          env:
            {{- include "agentlab.appEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "agentlab.confVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "agentlab.confVolume" . | nindent 8 }}
