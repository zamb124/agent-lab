{{- if .Values.nvidiaDevicePlugin.enabled }}
# NVIDIA k8s-device-plugin DaemonSet публикует nvidia.com/gpu в Allocatable
# на нодах с лейблом {{ .Values.gpuNodeSelectorKey }}={{ .Values.gpuNodeSelectorValue }}.
# Host-драйвер и containerd drop-in ставит deploy/scripts/bootstrap-gpu-worker.sh.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/component: gpu
    app.kubernetes.io/part-of: agent-lab
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-device-plugin
        app.kubernetes.io/component: gpu
    spec:
      nodeSelector:
        {{ .Values.gpuNodeSelectorKey }}: {{ .Values.gpuNodeSelectorValue | quote }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin
          image: "{{ .Values.nvidiaDevicePlugin.image }}:{{ .Values.nvidiaDevicePlugin.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            # envvar (legacy): nvidia-container-runtime инжектит host-libs через NVIDIA_VISIBLE_DEVICES.
            - name: DEVICE_LIST_STRATEGY
              value: "envvar"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
{{- end }}
