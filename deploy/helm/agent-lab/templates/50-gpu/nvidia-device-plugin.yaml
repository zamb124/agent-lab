{{- if .Values.nvidiaDevicePlugin.enabled }}
# NVIDIA k8s-device-plugin DaemonSet — публикует nvidia.com/gpu в Allocatable
# на нодах с лейблом {{ .Values.gpuNodeSelectorKey }}={{ .Values.gpuNodeSelectorValue }}.
#
# Альтернатива тяжёлому NVIDIA gpu-operator. Operator-toolkit-daemonset переписывает
# containerd config и выставляет disabled_plugins=["io.containerd.grpc.v1.cri"],
# что отключает CRI plugin и валит kubelet (Unimplemented runtime.v1.RuntimeService).
# Host-driver + nvidia-container-toolkit + drop-in /etc/containerd/conf.d/99-nvidia.toml
# ставит deploy/scripts/bootstrap-gpu-worker.sh — здесь только device-plugin.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/component: gpu
    app.kubernetes.io/part-of: agent-lab
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-device-plugin
        app.kubernetes.io/component: gpu
    spec:
      nodeSelector:
        {{ .Values.gpuNodeSelectorKey }}: {{ .Values.gpuNodeSelectorValue | quote }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin
          image: "{{ .Values.nvidiaDevicePlugin.image }}:{{ .Values.nvidiaDevicePlugin.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            # Legacy режим без CDI: device-plugin регистрирует GPU в kubelet, kubelet
            # передаёт NVIDIA_VISIBLE_DEVICES в pod env, nvidia-container-runtime (host)
            # инжектит host-libs (libcuda.so/libnvidia-ml.so) в контейнер при старте.
            # CDI-режим (PASS_DEVICE_SPECS + cdi-annotations) требует libs внутри pod
            # (через bind-mount /driver-root) — для host-driver setup без gpu-operator
            # это не работает (libcuda.so не найден).
            - name: DEVICE_LIST_STRATEGY
              value: "envvar"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
{{- end }}
