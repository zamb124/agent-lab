{{- if .Values.ingress.enabled }}
{{- /*
  Два Ingress объекта вместо одного:
  - platform-services (router.priority=10) — все доменные сервисы (/flows, /crm, …)
  - platform-frontend (router.priority=1)  — catch-all / на frontend
  Аннотация traefik.ingress.kubernetes.io/router.priority применяется на ВЕСЬ
  Ingress, поэтому без разделения все routers получают равный приоритет 1
  и порядок выбора маршрута становится недетерминированным (выигрывает /).
  
  Subdomain-specific Ingress (livekit/grafana/onlyoffice) используют priority=1000.
  platform-frontend: priority=-100 — иначе Traefik отдаёт wildcard *.humanitec.ru выше
  точного host (grafana.humanitec.ru и т.д.), см. traefik/traefik#4161.
*/}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-services
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "10"
    # gzip+brotli compression для UI bundles (см. compression-middleware.yaml)
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.namespace }}-compress@kubernetescrd
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.apexHost | quote }}
        - {{ .Values.ingress.wildcardHost | quote }}
      secretName: platform-tls
  rules:
    {{- range $host := list .Values.ingress.apexHost .Values.ingress.wildcardHost }}
    - host: {{ $host | quote }}
      http:
        paths:
          {{- if $.Values.applications.flows.enabled }}
          - path: /flows
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.flows.serviceName }}
                port:
                  number: {{ $.Values.applications.flows.port }}
          {{- end }}

          {{- if $.Values.applications.crm.enabled }}
          - path: /crm
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.crm.serviceName }}
                port:
                  number: {{ $.Values.applications.crm.port }}
          {{- end }}

          {{- if $.Values.applications.rag.enabled }}
          - path: /rag
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.rag.serviceName }}
                port:
                  number: {{ $.Values.applications.rag.port }}
          {{- end }}

          {{- if $.Values.applications.sync.enabled }}
          - path: /sync
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.sync.serviceName }}
                port:
                  number: {{ $.Values.applications.sync.port }}
          {{- end }}

          {{- if $.Values.applications.office.enabled }}
          - path: /documents
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.office.serviceName }}
                port:
                  number: {{ $.Values.applications.office.port }}
          {{- end }}

          {{- $sched := index $.Values.applications "scheduler-api" }}
          {{- if $sched.enabled }}
          - path: /scheduler
            pathType: Prefix
            backend:
              service:
                name: {{ $sched.serviceName }}
                port:
                  number: {{ $sched.port }}
          {{- end }}

          {{- if $.Values.applications.voice.enabled }}
          - path: /voice
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.voice.serviceName }}
                port:
                  number: {{ $.Values.applications.voice.port }}
          {{- end }}

          {{- if $.Values.litserve.enabled }}
          - path: /litserve
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.litserve.serviceName }}
                port:
                  number: {{ $.Values.litserve.port }}
          {{- end }}
    {{- end }}
{{- if .Values.applications.frontend.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-frontend
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "-100"
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.namespace }}-compress@kubernetescrd
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.apexHost | quote }}
        - {{ .Values.ingress.wildcardHost | quote }}
      secretName: platform-tls
  rules:
    {{- range $host := list .Values.ingress.apexHost .Values.ingress.wildcardHost }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.applications.frontend.serviceName }}
                port:
                  number: {{ $.Values.applications.frontend.port }}
    {{- end }}
{{- end }}
{{- end }}
