{{- if and .Values.ingress.enabled .Values.livekit.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1000"
  # secretName platform-tls выпускается deploy/scripts/setup-wildcard-tls.sh.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.livekitHost }}
      secretName: platform-tls
  rules:
    - host: {{ .Values.ingress.livekitHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: livekit
                port:
                  number: 7880
{{- end }}
