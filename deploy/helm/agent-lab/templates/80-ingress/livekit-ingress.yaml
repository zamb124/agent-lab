{{- if and .Values.ingress.enabled .Values.livekit.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
  # Wildcard Secret platform-tls покрывает livekit.humanitec.ru — отдельный cluster-issuer не нужен.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.livekitHost }}
      secretName: {{ .Values.ingress.livekitTlsSecretName }}
  rules:
    - host: {{ .Values.ingress.livekitHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: livekit
                port:
                  number: 7880
{{- end }}
