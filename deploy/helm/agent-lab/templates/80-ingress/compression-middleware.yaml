{{- if .Values.ingress.enabled }}
{{- /*
  Traefik compression middleware (gzip + brotli) для всех Ingress.
  Применяется через annotation `traefik.ingress.kubernetes.io/router.middlewares`
  на platform-services и platform-frontend. Не сжимаются ответы <1024 байт,
  уже сжатые (image, video, font/woff2) и `Cache-Control: no-transform`.
*/}}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: {{ .Values.namespace }}
spec:
  compress:
    encodings:
      - br
      - gzip
    minResponseBodyBytes: 1024
{{- end }}
