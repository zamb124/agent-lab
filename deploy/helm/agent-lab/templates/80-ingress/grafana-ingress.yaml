{{- if and .Values.ingress.enabled .Values.observability.grafana.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1000"
{{- if .Values.applications.frontend.enabled }}
    {{- /*
      Traefik v3 (MicroK8s ingress): в annotation router.middlewares CRD Middleware задаётся как
      "<k8s-namespace>-<middleware.metadata.name>@kubernetescrd" (см. doc v3.6, пример default-stripPrefix@kubernetescrd).
      Вариант "имя@kubernetescrd" без префикса namespace даёт ERR "middleware does not exist", роут Grafana не поднимается,
      HTTPS на grafana.<domain> уходит на platform-frontend (*.domain catch-all → главная).
    */}}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.namespace }}-grafana-forward-auth@kubernetescrd"
{{- end }}
  # secretName platform-tls выпускается deploy/scripts/setup-wildcard-tls.sh.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.grafanaHost }}
      secretName: platform-tls
  rules:
    - host: {{ .Values.ingress.grafanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
# Без forwardAuth: иначе curl https://grafana.../api/health (cluster-health §13) получает 401 от grafana-check.
# Приоритет выше основного Ingress Grafana (1000), иначе совпадение PathPrefix / перехватывает запрос.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-health
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1001"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.grafanaHost }}
      secretName: platform-tls
  rules:
    - host: {{ .Values.ingress.grafanaHost | quote }}
      http:
        paths:
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: grafana
                port:
                  number: 3000
{{- end }}
