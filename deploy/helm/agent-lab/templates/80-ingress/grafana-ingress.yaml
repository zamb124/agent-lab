{{- if and .Values.ingress.enabled .Values.observability.grafana.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1000"
{{- if .Values.applications.frontend.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s/grafana-forward-auth@kubernetescrd" .Values.namespace | quote }}
{{- end }}
  # secretName platform-tls выпускается deploy/scripts/setup-wildcard-tls.sh.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.grafanaHost }}
      secretName: platform-tls
  rules:
    - host: {{ .Values.ingress.grafanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
{{- end }}
