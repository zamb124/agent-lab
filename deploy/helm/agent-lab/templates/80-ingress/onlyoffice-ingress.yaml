{{- if and .Values.ingress.enabled .Values.onlyoffice.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onlyoffice
  namespace: {{ .Values.namespace }}
  # secretName platform-tls выпускается deploy/scripts/setup-wildcard-tls.sh.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.onlyofficeHost }}
      secretName: platform-tls
  rules:
    - host: {{ .Values.ingress.onlyofficeHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: onlyoffice
                port:
                  number: 80
{{- end }}
