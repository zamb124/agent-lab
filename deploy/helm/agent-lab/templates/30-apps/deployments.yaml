{{- range $name, $app := .Values.applications }}
{{- if $app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $app.serviceName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $app.serviceName }}
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: agent-lab
spec:
  replicas: {{ $app.replicas }}
  selector:
    matchLabels:
      app: {{ $app.serviceName }}
  template:
    metadata:
      labels:
        app: {{ $app.serviceName }}
        app.kubernetes.io/component: application
    spec:
{{- include "agentlab.podImagePullSecrets" $ | nindent 6 }}
      {{- if eq $name "frontend" }}
      initContainers:
        - name: extract-static
          image: {{ include "agentlab.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /shared-static
              cp -r /app/static/. /shared-static/
              echo "static prepared"
          volumeMounts:
            - name: shared-static
              mountPath: /shared-static
      {{- end }}
      containers:
        {{- if eq $name "browser" }}
        - name: chromium-cdp
          image: zenika/alpine-chrome:latest
          imagePullPolicy: IfNotPresent
          command:
            - chromium-browser
            - --no-sandbox
            - --disable-dev-shm-usage
            - --disable-blink-features=AutomationControlled
            - --exclude-switches=enable-automation
            - --window-size=1920,1080
            - --lang=en-US
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
          ports:
            - name: cdp
              containerPort: 9222
          volumeMounts:
            - name: chromium-dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /json/version
              port: cdp
            failureThreshold: 30
            periodSeconds: 5
        {{- end }}
        - name: {{ $app.serviceName }}
          image: {{ include "agentlab.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: {{ $app.command | toJson }}
          env:
            - name: SERVER__HOST
              value: 0.0.0.0
            - name: SERVER__PORT
              value: {{ $app.port | quote }}
            {{- if eq $name "browser" }}
            - name: BROWSER__CDP_ENDPOINTS__CHROMIUM
              value: "http://127.0.0.1:9222"
            {{- end }}
            {{- include "agentlab.appEnv" $ | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $app.port }}
          volumeMounts:
            {{- include "agentlab.confVolumeMount" $ | nindent 12 }}
            {{- if eq $name "frontend" }}
            - name: shared-static
              mountPath: /app/static-shared
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          {{- if eq $name "browser" }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -sf "http://127.0.0.1:9222/json/version" >/dev/null && curl -sf "http://127.0.0.1:${SERVER__PORT}/health" >/dev/null
            failureThreshold: 40
            periodSeconds: 5
            timeoutSeconds: 5
          {{- else }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            failureThreshold: 30
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml $app.resources | nindent 12 }}
      volumes:
        {{- include "agentlab.confVolume" $ | nindent 8 }}
        {{- if eq $name "frontend" }}
        - name: shared-static
          emptyDir: {}
        {{- end }}
        {{- if eq $name "browser" }}
        - name: chromium-dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- end }}
{{- end }}
{{- end }}
