{{- range $name, $app := .Values.applications }}
{{- if $app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $app.serviceName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $app.serviceName }}
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: agent-lab
spec:
  replicas: {{ $app.replicas }}
  selector:
    matchLabels:
      app: {{ $app.serviceName }}
  template:
    metadata:
      labels:
        app: {{ $app.serviceName }}
        app.kubernetes.io/component: application
    spec:
{{- include "agentlab.podImagePullSecrets" $ | nindent 6 }}
{{- include "agentlab.nodeSchedule" (list $ $app.nodeName) | nindent 6 }}
      initContainers:
        {{- include "agentlab.dbReadyAndMigrateInitContainers" $ | nindent 8 }}
      containers:
        {{- if eq $name "browser" }}
        - name: chromium-cdp
          image: "{{ $app.chromium.image }}:{{ $app.chromium.tag }}"
          imagePullPolicy: IfNotPresent
          # runAsUser=0 + --no-zygote: chromium пишет /proc/<pid>/oom_score_adj.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - chromium-browser
            - --headless=new
            - --no-zygote
            - --ozone-platform=headless
            - --disable-gpu
            - --no-sandbox
            - --disable-dev-shm-usage
            - --disable-blink-features=AutomationControlled
            - --exclude-switches=enable-automation
            - --window-size=1920,1080
            - --lang=en-US
            # Снижение фоновой активности и памяти рендереров под нагрузкой.
            - --disable-extensions
            - --disable-background-networking
            - --disable-component-update
            - --disable-features=site-per-process,Translate,BackForwardCache
            - --metrics-recording-only
            - --mute-audio
            - --js-flags=--max-old-space-size=512
            # Chromium 124+ слушает только 127.0.0.1; browser-app ходит через shared netns pod'а.
            - --remote-debugging-port=9222
          volumeMounts:
            - name: chromium-dshm
              mountPath: /dev/shm
          resources:
            {{- toYaml $app.chromium.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - wget -q -O- http://127.0.0.1:9222/json/version >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - wget -q -O- http://127.0.0.1:9222/json/version >/dev/null
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - wget -q -O- http://127.0.0.1:9222/json/version >/dev/null
            failureThreshold: 30
            periodSeconds: 5
        {{- end }}
        - name: {{ $app.serviceName }}
          image: {{ include "agentlab.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: {{ $app.command | toJson }}
          env:
            - name: SERVER__HOST
              value: 0.0.0.0
            - name: SERVER__PORT
              value: {{ $app.port | quote }}
            {{- if eq $name "browser" }}
            - name: BROWSER__CDP_ENDPOINTS__CHROMIUM
              value: "http://127.0.0.1:9222"
            {{- end }}
            {{- if eq $name "code-runner-python" }}
            - name: CODE_RUNNER_PYTHON_WORKERS
              value: "2"
            {{- end }}
            {{- include "agentlab.appEnv" $ | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $app.port }}
          volumeMounts:
            {{- include "agentlab.confVolumeMount" $ | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          {{- if eq $name "browser" }}
          # Readiness отражает реальную работоспособность CDP: пока Chromium
          # недоступен/перезапускается, под выводится из Service, а не отдаёт ошибки.
          readinessProbe:
            httpGet:
              path: /browser/api/v1/health/cdp
              port: {{ $app.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- else }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          {{- end }}
          {{- if eq $name "browser" }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - curl -sf "http://127.0.0.1:9222/json/version" >/dev/null && curl -sf "http://127.0.0.1:${SERVER__PORT}/health" >/dev/null
            failureThreshold: 40
            periodSeconds: 5
            timeoutSeconds: 5
          {{- else }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ $app.port }}
            failureThreshold: 30
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml $app.resources | nindent 12 }}
      volumes:
        {{- include "agentlab.confVolume" $ | nindent 8 }}
        {{- if eq $name "browser" }}
        - name: chromium-dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- end }}
{{- end }}
{{- end }}
