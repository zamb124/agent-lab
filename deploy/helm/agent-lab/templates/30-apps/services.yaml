{{- range $name, $app := .Values.applications }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $app.serviceName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $app.serviceName }}
  annotations:
    # h2c: Traefik ходит HTTP/2 cleartext на Granian backend (multiplexing
    # concurrent статики на одном TCP, без round-trip latency на каждый chunk).
    # Granian слушает HTTP/2 нативно через `--http auto`.
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  type: ClusterIP
  selector:
    app: {{ $app.serviceName }}
  ports:
    - name: http
      port: {{ $app.port }}
      targetPort: {{ $app.port }}
{{- end }}
{{- end }}
