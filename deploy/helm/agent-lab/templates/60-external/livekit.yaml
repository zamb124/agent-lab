{{- if .Values.livekit.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: {{ .Values.namespace }}
data:
  livekit.yaml: |
    port: 7880
    keys:
      ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    redis:
      address: redis:6379
      db: 2
    rtc:
      tcp_port: 7882
      udp_port: 7881
      use_external_ip: true
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
  labels:
    app: livekit
spec:
  type: ClusterIP
  selector:
    app: livekit
  ports:
    - name: ws
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7882
      targetPort: 7882
      protocol: TCP
    - name: rtc-udp
      port: 7881
      targetPort: 7881
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
  labels:
    app: livekit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      {{- include "agentlab.masterNodeSelector" . | nindent 6 }}
      enableServiceLinks: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: livekit
          image: {{ .Values.livekit.image }}
          imagePullPolicy: IfNotPresent
          args:
            - "--config-body"
            - |
              port: 7880
              keys:
                $(LIVEKIT_API_KEY): $(LIVEKIT_API_SECRET)
              redis:
                address: redis:6379
                db: 2
              rtc:
                tcp_port: 7882
                udp_port: 7881
                use_external_ip: true
          env:
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platformSecretName }}
                  key: livekit-api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platformSecretName }}
                  key: livekit-api-secret
          ports:
            - name: ws
              containerPort: 7880
            - name: rtc-tcp
              containerPort: 7882
              protocol: TCP
            - name: rtc-udp
              containerPort: 7881
              protocol: UDP
{{- end }}
