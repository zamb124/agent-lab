{{- if .Values.onlyoffice.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: onlyoffice-theme
  namespace: {{ .Values.namespace }}
data:
  theme-humanitec-light.json: |-
{{ .Files.Get "files/onlyoffice-theme.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: {{ .Values.namespace }}
  labels:
    app: onlyoffice
spec:
  type: ClusterIP
  selector:
    app: onlyoffice
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: {{ .Values.namespace }}
  labels:
    app: onlyoffice
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
{{- include "agentlab.nodeSchedule" (list . .Values.onlyoffice.nodeName) | nindent 6 }}
      containers:
        - name: documentserver
          image: {{ .Values.onlyoffice.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: JWT_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platformSecretName }}
                  key: onlyoffice-jwt-secret
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: theme
              mountPath: /var/www/onlyoffice/documentserver/web-apps/apps/common/main/resources/themes/theme-humanitec-light.json
              subPath: theme-humanitec-light.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.onlyoffice.resources | nindent 12 }}
      volumes:
        - name: theme
          configMap:
            name: onlyoffice-theme
{{- end }}
