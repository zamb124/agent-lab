{{- range $name, $worker := .Values.workers }}
{{- if $worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: agent-lab
spec:
  replicas: {{ $worker.replicas }}
  # Recreate: два воркера одновременно конкурируют за TaskIQ-задачи и плодят дубли.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        app.kubernetes.io/component: worker
    spec:
{{- include "agentlab.podImagePullSecrets" $ | nindent 6 }}
{{- include "agentlab.nodeSchedule" (list $ $worker.nodeName) | nindent 6 }}
      # Воркеры обрабатывают тяжёлые задачи (STT, LLM); дефолтных 30s недостаточно.
      terminationGracePeriodSeconds: {{ $worker.terminationGracePeriodSeconds | default 60 }}
      initContainers:
        {{- include "agentlab.dbReadyAndMigrateInitContainers" $ | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "agentlab.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: {{ $worker.command | toJson }}
          env:
            {{- include "agentlab.appEnv" $ | nindent 12 }}
          volumeMounts:
            {{- include "agentlab.confVolumeMount" $ | nindent 12 }}
          resources:
            {{- toYaml $worker.resources | nindent 12 }}
          # Воркеры не слушают HTTP; проверяем, жив ли главный процесс контейнера.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "kill -0 1"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        {{- include "agentlab.confVolume" $ | nindent 8 }}
{{- end }}
{{- end }}
