        "worker",
        "apps.flows_worker.worker:worker_app",
        "--workers",
        "4",
      ]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  scheduler:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "scheduler", "apps.scheduler.scheduler:scheduler"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  rag-worker:
    nodeName: master
    enabled: true
    replicas: 1
    terminationGracePeriodSeconds: 300
    command:
      [
        "taskiq",
        "worker",
        "apps.rag_worker.worker:worker_app",
        "--workers",
        "2",
      ]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  sync-worker:
    nodeName: master
    enabled: true
    replicas: 1
    terminationGracePeriodSeconds: 300
    command:
      [
        "taskiq",
        "worker",
        "apps.sync_worker.worker:worker_app",
        "--workers",
        "2",
      ]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  crm-worker:
    nodeName: master
    enabled: true
    replicas: 1
    command:
      [
        "taskiq",
        "worker",
        "apps.crm_worker.worker:worker_app",
        "--workers",
        "2",
      ]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
