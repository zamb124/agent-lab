litserve:
  enabled: true
  # ВАЖНО: provider-litserve использует ОТДЕЛЬНЫЙ image на Python 3.14 (GIL build),
  # потому что torchaudio (через silero_vad), torch+CUDA, transformers и пр.
  # пока НЕ публикуют cp314t wheels (free-threaded ABI). Stable-ABI .so из GIL-build
  # физически не загружается в free-threaded интерпретатор (PEP 703).
  # Главный image платформы остаётся на 3.14t. См. .cursor/rules/infrastructure.mdc
  # раздел "ML GIL resurrection" и Dockerfile.gpu / Dockerfile.base.gpu.
  image: ""  # переопределяется в .github/workflows/deploy.yml через --set litserve.image=...
  # Целевая нода. gpu-worker → toleration dedicated=gpu:NoSchedule + nvidia.com/gpu resource.
  # master → CPU-режим (без GPU resource). auto → шедулер сам выбирает.
  nodeName: gpu-worker
  port: 8014
  serviceName: provider-litserve
  # PVC под HF cache: GigaAM v3 (~3 Gi), Silero TTS v5 (~150 Mi), Silero VAD (~50 Mi),
  # Qwen3-Embedding-0.6B, Qwen3-Reranker-0.6B + запас
  # (gigaam/silero-tts/silero-vad/qwen/flagllm) → берём 100Gi.
  modelCacheSize: 100Gi
  modelId: Qwen/Qwen3-Reranker-0.6B
  embeddingModelId: Qwen/Qwen3-Embedding-0.6B
  # API id дефолтных моделей (поля stt_default_api_model_id и т.д. в
  # ProviderLitserveInfraConfig). ENV: PROVIDER_LITSERVE__INFRA__STT_DEFAULT_API_MODEL_ID и т.д.
  sttDefaultApiModelId: gigaam-v3-rnnt-ru
  ttsDefaultApiModelId: silero-tts-v5-5-ru
  vadDefaultApiModelId: silero-vad-v5
  # Загружать embedding-модель в bfloat16 (экономия ~50% VRAM на RTX A2000 6GB).
  # Отключить: embeddingUseBf16: "false"
  embeddingUseBf16: "true"
  resources:
    # Память: GigaAM v3, Silero TTS/VAD, Qwen3-Reranker-0.6B, Qwen3-Embedding-0.6B.
    # Пара 0.6B снижает пик RSS vs 4B/8B; limits с запасом под суммарный RSS воркеров.
    # allocatable памяти ноды (kubelet) должен быть >= limits.memory, иначе Pod Pending.
    requests:
      cpu: "2"
      memory: 28Gi
    limits:
      cpu: "8"
      memory: 52Gi

# NVIDIA k8s-device-plugin DaemonSet публикует nvidia.com/gpu в Allocatable.
# Host-драйвер и containerd drop-in ставит deploy/scripts/bootstrap-gpu-worker.sh.
nvidiaDevicePlugin:
