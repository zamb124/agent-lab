        memory: 1Gi
  office:
    nodeName: master
    enabled: true
    port: 8008
    replicas: 1
    serviceName: office
    command: ["python", "-m", "apps.office.main"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
