litserve:
  enabled: true
  # Целевая нода. gpu-worker → toleration dedicated=gpu:NoSchedule + nvidia.com/gpu resource.
  # master → CPU-режим (без GPU resource). auto → шедулер сам выбирает.
  nodeName: gpu-worker
  port: 8014
  serviceName: provider-litserve
  # PVC под HF cache: GigaAM v3 (~3 Gi), Silero TTS v5 (~150 Mi), Silero VAD (~50 Mi),
  # Qwen3-Embedding-0.6B, Qwen3-Reranker-0.6B, малый chat-Qwen (~1.5B) + запас
  # (gigaam/silero-tts/silero-vad/qwen/flagllm) → берём 100Gi.
  modelCacheSize: 100Gi
  modelId: Qwen/Qwen3-Reranker-0.6B
  embeddingModelId: Qwen/Qwen3-Embedding-0.6B
  # API id дефолтных моделей (поля stt_default_api_model_id и т.д. в
  # ProviderLitserveInfraConfig). ENV: PROVIDER_LITSERVE__INFRA__STT_DEFAULT_API_MODEL_ID и т.д.
  sttDefaultApiModelId: gigaam-v3-rnnt-ru
  ttsDefaultApiModelId: silero-tts-v5-5-ru
  vadDefaultApiModelId: silero-vad-v5
  # Загружать embedding-модель в bfloat16 (экономия ~50% VRAM на RTX A2000 6GB).
  # Отключить: embeddingUseBf16: "false"
  embeddingUseBf16: "true"
  resources:
    # Память: GigaAM v3, Silero TTS/VAD, Qwen3-Reranker-0.6B, chat 1.5B, Qwen3-Embedding-0.6B.
    # Пара 0.6B снижает пик RSS vs 4B/8B; limits с запасом под суммарный RSS воркеров.
    # allocatable памяти ноды (kubelet) должен быть >= limits.memory, иначе Pod Pending.
    requests:
      cpu: "2"
      memory: 28Gi
    limits:
      cpu: "8"
      memory: 52Gi

# NVIDIA k8s-device-plugin DaemonSet публикует nvidia.com/gpu в Allocatable.
# Host-драйвер и containerd drop-in ставит deploy/scripts/bootstrap-gpu-worker.sh.
nvidiaDevicePlugin:
  enabled: true
  image: nvcr.io/nvidia/k8s-device-plugin
  tag: v0.19.1

livekit:
  enabled: true
  nodeName: master
  image: livekit/livekit-server:v1.11.0
  imagePullPolicy: IfNotPresent
  apiKey: devkey
  publicUrl: wss://livekit.humanitec.ru
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "2"
      memory: 1Gi

livekitEgress:
  enabled: true
  nodeName: master
  image: livekit/egress:v1.12.0
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

coturn:
  enabled: true
  nodeName: master
  image: coturn/coturn:4.10.0
  realm: agentlab
  minPort: 49152
  maxPort: 65535
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 512Mi

onlyoffice:
  enabled: true
  nodeName: master
  image: onlyoffice/documentserver:9.3.1
  publicUrl: https://onlyoffice.humanitec.ru
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

observability:
  loki:
    enabled: true
    nodeName: master
    image: grafana/loki:3.7.1
    storage: 100Gi
  tempo:
    enabled: true
    nodeName: master
    image: grafana/tempo:2.9.2
    storage: 50Gi
  grafana:
    enabled: true
    nodeName: master
    image: grafana/grafana:13.0.1
    publicUrl: https://grafana.humanitec.ru
  alloy:
    enabled: true
    image: grafana/alloy:v1.16.0

ingress:
  enabled: true
  # Аддон ingress в MicroK8s = traefik, IngressClass "public".
  className: public
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru
  proxyBodySize: 100m

