    nodeName: master
    enabled: true
    port: 8001
    replicas: 1
    serviceName: flows
    command: ["python", "-m", "apps.flows.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  frontend:
