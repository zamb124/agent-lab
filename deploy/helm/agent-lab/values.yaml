# Дефолтные значения чарта Humanitec Platform. Production-overrides — values-prod.yaml.

namespace: platform

image:
  repository: ghcr.io/zamb124/agent-lab
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

# Public domain для Ingress + сервисных URL платформы.
domain: humanitec.ru

# Лейбл, которым размечается GPU-нода (kubectl label node <name> accelerator=nvidia-gpu).
gpuNodeSelectorKey: accelerator
gpuNodeSelectorValue: nvidia-gpu

# Имена GPU-нод кластера (kubernetes.io/hostname). Поды с nodeName из этого списка автоматически
# получают toleration dedicated=gpu:NoSchedule и nvidia.com/gpu resource (для litserve).
# Добавить вторую GPU-ноду: дописать имя в массив без правки шаблонов.
gpuNodeNames:
  - gpu-worker

storageClassName: microk8s-hostpath

postgres:
  nodeName: master
  image: pgvector/pgvector:pg17
  storage: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 8Gi
  maxConnections: 300

redis:
  nodeName: master
  image: redis:7-alpine
  storage: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# ConfigMap app-conf собирается make render-helm-app-conf из conf.json + overlay.
# Межсервисные URL в кластере выставляются ENV SERVER__*_SERVICE_URL в templates/_helpers.tpl.
appConfigConfigMap: app-conf

# Глобальные переменные окружения для всех подов приложения и воркеров.
# Поверх задаются конкретные SERVER__HOST/PORT в каждом Deployment.
appCommonEnv:
  databasePrefix: postgres
  redisService: redis
  redisPort: 6379
  postgresService: postgres
  postgresPort: 5432
  # Только если публичный webhook flows не {platform_public_base_url}/flows (редкий случай).
  flowsWebhookPublicBaseUrl: ""

applications:
  flows:
    nodeName: master
    enabled: true
    port: 8001
    replicas: 1
    serviceName: flows
    command: ["python", "-m", "apps.flows.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  frontend:
    nodeName: master
    enabled: true
    port: 8002
    replicas: 1
    serviceName: frontend
    command: ["python", "-m", "apps.frontend.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
  crm:
    nodeName: master
    enabled: true
    port: 8003
    replicas: 1
    serviceName: crm
    command: ["python", "-m", "apps.crm.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  rag:
    nodeName: master
    enabled: true
    port: 8004
    replicas: 1
    serviceName: rag
    command: ["python", "-m", "apps.rag.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  sync:
    nodeName: master
    enabled: true
    port: 8005
    replicas: 1
    serviceName: sync
    command: ["python", "-m", "apps.sync.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  scheduler-api:
    nodeName: master
    enabled: true
    port: 8006
    replicas: 1
    serviceName: scheduler-api
    command: ["python", "-m", "apps.scheduler.main"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  office:
    nodeName: master
    enabled: true
    port: 8008
    replicas: 1
    serviceName: office
    command: ["python", "-m", "apps.office.main"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  voice:
    # Voice gateway держим рядом с provider-litserve (минимизация RTT
    # STT/TTS-batch вызовов и поддержка backend `silero_local` для VAD).
    # Сам voice GPU не использует — toleration к dedicated=gpu:NoSchedule
    # автоматически прокидывается gpuNodeNames-helper'ом.
    nodeName: gpu-worker
    enabled: true
    port: 8015
    replicas: 1
    serviceName: voice
    command: ["python", "-m", "apps.voice.main"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  browser:
    nodeName: master
    enabled: true
    port: 8009
    replicas: 1
    serviceName: browser
    command: ["python", "-m", "apps.browser.main"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

workers:
  flows-worker:
    nodeName: master
    enabled: true
    replicas: 2
    command: ["taskiq", "worker", "apps.flows_worker.worker:worker_app", "--workers", "4"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  scheduler:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "scheduler", "apps.scheduler.scheduler:scheduler"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  rag-worker:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "worker", "apps.rag_worker.worker:worker_app", "--workers", "2"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  sync-worker:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "worker", "apps.sync_worker.worker:worker_app", "--workers", "2"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  crm-worker:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "worker", "apps.crm_worker.worker:worker_app", "--workers", "2"]
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  idle-worker:
    nodeName: master
    enabled: true
    replicas: 1
    command: ["taskiq", "worker", "apps.idle_worker.worker:worker_app", "--workers", "2"]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 2Gi

litserve:
  enabled: true
  # Целевая нода. gpu-worker → toleration dedicated=gpu:NoSchedule + nvidia.com/gpu resource.
  # master → CPU-режим (без GPU resource). auto → шедулер сам выбирает.
  nodeName: gpu-worker
  port: 8014
  serviceName: provider-litserve
  # PVC под HF cache: GigaAM v3 (~3 Gi), Silero TTS v5 (~150 Mi), Silero VAD (~50 Mi),
  # Qwen3-Embedding-8B, Qwen3-Reranker-8B, малый chat-Qwen (~1.5B) + запас
  # (gigaam/silero-tts/silero-vad/qwen/flagllm) → берём 100Gi.
  modelCacheSize: 100Gi
  modelId: Qwen/Qwen3-Reranker-8B
  embeddingModelId: Qwen/Qwen3-Embedding-8B
  # API id дефолтных моделей (поля stt_default_api_model_id и т.д. в
  # ProviderLitserveInfraConfig). ENV: PROVIDER_LITSERVE__INFRA__STT_DEFAULT_API_MODEL_ID и т.д.
  sttDefaultApiModelId: gigaam-v3-rnnt-ru
  ttsDefaultApiModelId: silero-tts-v5-5-ru
  vadDefaultApiModelId: silero-vad-v5
  resources:
    # Память: GigaAM v3 (~2.5 Gi RSS), Silero TTS v5 (~300 Mi RSS), Silero VAD (~120 Mi),
    # Qwen embedding + rerank + малый LLM в LitServe (см. conf provider_litserve.infra).
    # При CPU-режиме выше RSS; при GPU — часть в VRAM, целиться в 8Gi request / 24Gi limit.
    requests:
      cpu: "1"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 24Gi

# NVIDIA k8s-device-plugin DaemonSet публикует nvidia.com/gpu в Allocatable.
# Host-драйвер и containerd drop-in ставит deploy/scripts/bootstrap-gpu-worker.sh.
nvidiaDevicePlugin:
  enabled: true
  image: nvcr.io/nvidia/k8s-device-plugin
  tag: v0.19.1

livekit:
  enabled: true
  nodeName: master
  image: livekit/livekit-server:latest
  apiKey: devkey
  publicUrl: wss://livekit.humanitec.ru

livekitEgress:
  enabled: true
  nodeName: master
  image: livekit/egress:latest

coturn:
  enabled: true
  nodeName: master
  image: coturn/coturn:latest
  realm: agentlab
  minPort: 49152
  maxPort: 65535

onlyoffice:
  enabled: true
  nodeName: master
  image: onlyoffice/documentserver:latest
  publicUrl: https://onlyoffice.humanitec.ru

observability:
  loki:
    enabled: true
    nodeName: master
    image: grafana/loki:latest
    storage: 100Gi
  tempo:
    enabled: true
    nodeName: master
    image: grafana/tempo:latest
    storage: 50Gi
  grafana:
    enabled: true
    nodeName: master
    image: grafana/grafana:latest
    publicUrl: https://grafana.humanitec.ru
  alloy:
    enabled: true
    image: grafana/alloy:latest

ingress:
  enabled: true
  # MicroK8s ingress addon = traefik, IngressClass "public".
  className: public
  apexHost: humanitec.ru
  wildcardHost: "*.humanitec.ru"
  livekitHost: livekit.humanitec.ru
  onlyofficeHost: onlyoffice.humanitec.ru
  grafanaHost: grafana.humanitec.ru
  proxyBodySize: 100m

# Secret platform-secrets: манифест в templates/01-platform-secrets.yaml при platformSecrets.create=true.
# Значения задаются через helm --set-json (deploy/scripts/helm_platform_secrets_json.sh).
platformSecrets:
  create: false
  postgresPassword: ""
  authJwtSecret: ""
  hfToken: ""
  authYandexClientId: ""
  authYandexClientSecret: ""
  authGoogleClientId: ""
  authGoogleClientSecret: ""
  authGithubClientId: ""
  authGithubClientSecret: ""
  authAmocrmClientId: ""
  authAmocrmClientSecret: ""
  authApplePrivateKey: ""
  authDemoPassword: ""
  pushVapidPublicKey: ""
  pushVapidPrivateKey: ""
  pushApnsPrivateKey: ""
  pushFcmCredentialsJson: ""
  pushFcmProjectId: ""
  selectelAccessKey: ""
  selectelSecretKey: ""
  livekitApiKey: ""
  livekitApiSecret: ""
  turnSecret: ""
  onlyofficeJwtSecret: ""
  grafanaAdminPassword: ""
  llmBothubApiKey: ""
  llmOpenrouterApiKey: ""
  sttCloudRuApiKey: ""
  sttYandexApiKey: ""
  sttYandexFolderId: ""
  sttSberClientId: ""
  sttSberClientSecret: ""
  ttsCloudRuApiKey: ""
  ttsYandexApiKey: ""
  ttsYandexFolderId: ""
  ttsSberClientId: ""
  ttsSberClientSecret: ""
  ragEmbeddingApiKey: ""
  yoomoneyAccountNumber: ""
  yoomoneyNotificationSecret: ""
  yoomoneyClientId: ""
  yoomoneyClientSecret: ""
  yoomoneyAccessToken: ""

platformSecretName: platform-secrets
