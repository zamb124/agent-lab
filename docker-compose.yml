version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agents Service (API для агентов)
  agents:
    build:
      context: .
      dockerfile: Dockerfile
      target: agents
    ports:
      - "${AGENTS_PORT:-8001}:8001"
    volumes:
      - agents_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_prod.py

  # Frontend Service (UI)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "${FRONTEND_PORT:-8002}:8002"
    environment:
      - AGENTS_SERVICE_URL=http://agents:8001
    volumes:
      - frontend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      agents:
        condition: service_started
    restart: unless-stopped
    command: python run_frontend_prod.py

  # TaskIQ Worker (единая очередь задач)
  # ВАЖНО: --workers 1 обязателен для taskiq-pg
  # Для масштабирования: docker-compose up --scale taskiq-worker=4
  taskiq-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - taskiq_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: taskiq worker core.tasks.worker:broker --workers 1

volumes:
  postgres_data:
  agents_logs:
  frontend_logs:
  taskiq_logs:
