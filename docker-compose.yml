version: '3.8'

services:
  # PostgreSQL база данных (только для локальной разработки)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agent Platform API
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${APP_PORT:-8001}:8001"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run.py

  # Task Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_worker.py

volumes:
  postgres_data:
  app_logs:
