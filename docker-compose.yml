version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agents Service (API для агентов)
  agents:
    build:
      context: .
      dockerfile: Dockerfile
      target: agents
    ports:
      - "${AGENTS_PORT:-8001}:8001"
    volumes:
      - agents_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_prod.py

  # Frontend Service (UI)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "${FRONTEND_PORT:-8002}:8002"
    volumes:
      - frontend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_frontend_prod.py

  # Task Worker (для agents)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - worker_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_worker.py

volumes:
  postgres_data:
  agents_logs:
  frontend_logs:
  worker_logs:
