services:
  # Redis для TaskIQ очередей
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-8099}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # PostgreSQL база данных (только для локальной разработки)
  postgres:
    image: postgres:15
    profiles:
      - local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agents Service (API для агентов)
  agents:
    image: ${DOCKER_REGISTRY:-zambas/repo}:agents
    build:
      context: .
      dockerfile: Dockerfile
      target: agents
    ports:
      - "${AGENTS_PORT:-8001}:8001"
    env_file: .env
    volumes:
      - agents_logs:/app/logs
      - ./conf.json:/app/conf.json:ro
      - ./apps/agents/conf.json:/app/apps/agents/conf.json:ro
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      chroma:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_prod.py

  # Frontend Service (UI)
  frontend:
    image: ${DOCKER_REGISTRY:-zambas/repo}:frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "${FRONTEND_PORT:-8002}:8002"
    env_file: .env
    volumes:
      - frontend_logs:/app/logs
      - ./conf.json:/app/conf.json:ro
      - ./apps/frontend/conf.json:/app/apps/frontend/conf.json:ro
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      agents:
        condition: service_started
      chroma:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: python run_frontend_prod.py

  # CRM Service (API для CRM)
  crm:
    image: ${DOCKER_REGISTRY:-zambas/repo}:crm
    build:
      context: .
      dockerfile: Dockerfile
      target: crm
    ports:
      - "${CRM_PORT:-8003}:8003"
    env_file: .env
    volumes:
      - crm_logs:/app/logs
      - ./conf.json:/app/conf.json:ro
      - ./apps/crm/conf.json:/app/apps/crm/conf.json:ro
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      agents:
        condition: service_started
    restart: unless-stopped
    command: python run_crm_prod.py

  # TaskIQ Worker (единая очередь задач на Redis)
  # Redis обеспечивает блокирующую очередь - каждый воркер получает свою задачу
  # SessionLockMiddleware гарантирует FIFO per session
  # Для масштабирования: docker-compose up --scale taskiq-worker=N
  taskiq-worker:
    image: ${DOCKER_REGISTRY:-zambas/repo}:worker
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    volumes:
      - taskiq_logs:/app/logs
      - ./conf.json:/app/conf.json:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: taskiq worker core.tasks.worker:broker --workers 4

  # TaskIQ Scheduler (для отложенных задач)
  # ВАЖНО: Запускать только один экземпляр scheduler
  taskiq-scheduler:
    image: ${DOCKER_REGISTRY:-zambas/repo}:worker
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    volumes:
      - taskiq_logs:/app/logs
      - ./conf.json:/app/conf.json:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    command: taskiq scheduler core.tasks.worker:scheduler

  # Генератор API документации
  # Запуск: docker-compose run --rm docs-generator
  docs-generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: agents
    environment:
      - AGENTS_SERVICE_URL=http://agents:8001
      - DOCS_OUTPUT_DIR=/app/docs/api
    volumes:
      - ./scripts:/app/scripts
      - ./docs/api:/app/docs/api
    depends_on:
      agents:
        condition: service_started
    profiles:
      - docs
    command: python scripts/generate_api_docs.py

  # ChromaDB Vector Database
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8100}:8100"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    command: ["run", "--host", "0.0.0.0", "--port", "8100", "--path", "/chroma/chroma"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/api/v2/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  agents_logs:
  frontend_logs:
  crm_logs:
  taskiq_logs:
  chroma_data:
