name: Build Base Image

# Базовый образ платформы (zambas/agent-lab-base = ghcr.io/<owner>/agent-lab-base):
# содержит весь Python-стек (torch CPU + 8 dep-групп), apt-runtime, Node/Go/.NET.
# Главный Dockerfile (target=full в Deploy workflow) делает FROM этого base и
# только COPY кода — CI билд за минуты, не за час.
#
# Триггеры:
#   - auto: push в master с изменениями pyproject.toml / uv.lock / Dockerfile.base
#   - manual: workflow_dispatch из UI (Actions → Build Base Image → Run workflow)
#
# Платформа: linux/amd64 (наш k8s кластер целиком amd64 — master + gpu-worker).
# arm64 wheels (torch CUDA, nvidia-cu*) часто отсутствуют, мульти-арч ломает резолв.

concurrency:
  group: agent-lab-build-base
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.base'
      - '.github/workflows/build-base.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab-base

jobs:
  build:
    name: Build & Push base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (CUDA wheels занимают ~5GiB)
        run: |
          set -e
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [ -d "/opt/hostedtoolcache" ]; then sudo rm -rf /opt/hostedtoolcache || true; fi
          if [ -d "/usr/local/lib/android" ]; then sudo rm -rf /usr/local/lib/android || true; fi
          if [ -d "/usr/share/dotnet" ]; then sudo rm -rf /usr/share/dotnet || true; fi
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max
