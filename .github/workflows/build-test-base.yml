name: Build Test Base Image

# agent-lab-test-base = agent-lab-base + dev dependency group (pytest, ruff, …).
# Dockerfile.test и tests_runner строятся поверх этого образа — только COPY кода.
#
# Триггеры:
#   - auto: push в main с изменениями pyproject.toml / uv.lock / Dockerfile.test.base
#   - manual: workflow_dispatch

concurrency:
  group: agent-lab-build-test-base
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.test.base'
      - '.github/workflows/build-test-base.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab-test-base

jobs:
  build:
    name: Build & Push test-base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute deps content hash
        id: deps
        run: |
          set -euo pipefail
          hash="$(cat pyproject.toml uv.lock Dockerfile.test.base | sha256sum | cut -c1-12)"
          echo "hash=${hash}" >> "${GITHUB_OUTPUT}"

      - name: Free disk space
        run: |
          set -e
          docker system prune -af --volumes || true
          docker builder prune -af || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push test-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test.base
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/agent-lab-base:latest
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:deps-${{ steps.deps.outputs.hash }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=test-base
          cache-to: type=gha,scope=test-base,mode=max
