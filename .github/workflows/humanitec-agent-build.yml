name: humanitec-agent-build

concurrency:
  group: humanitec-agent-release-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag for release; пусто = humanitec-agent-{short_sha} коммита"
        required: false
        default: ""
        type: string
      artifact_mode:
        description: "release for real installers, placeholder for smoke only"
        required: false
        default: release
        type: choice
        options:
          - release
          - placeholder
      publish_draft:
        description: "Create GitHub release as draft"
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: "Пересобрать matrix, даже если release с таким tag уже существует"
        required: false
        default: false
        type: boolean

env:
  AGENT_ARTIFACT_MODE: release

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version_sha: ${{ steps.resolve.outputs.version_sha }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - name: Resolve release metadata
        id: resolve
        run: |
          set -euo pipefail
          VERSION_SHA="${{ github.sha }}"
          SHORT_SHA="${VERSION_SHA:0:7}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="humanitec-agent-${SHORT_SHA}"
          fi
          echo "version_sha=${VERSION_SHA}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${VERSION_SHA}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release_tag=${RELEASE_TAG} version_sha=${VERSION_SHA}"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.release_tag }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "skip_build=false" >> "${GITHUB_OUTPUT}"
            echo "force_rebuild=true — full matrix build for ${TAG}"
            exit 0
          fi
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "skip_build=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${TAG} already exists — skip matrix build"
          else
            echo "skip_build=false" >> "${GITHUB_OUTPUT}"
            echo "Release ${TAG} not found — full build"
          fi

  build-matrix:
    needs: resolve-release
    if: needs.resolve-release.outputs.skip_build != 'true'
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runs_on: windows-latest
          - platform: macos-arm64
            runs_on: macos-14
          - platform: macos-x64
            # Intel-раннер macos-13 ретайрится/висит в очереди и не стартует.
            # x86_64-артефакт кросс-собираем на arm64-раннере macos-14
            # (rustup target x86_64-apple-darwin + electron-packager --arch x64).
            runs_on: macos-14
          - platform: linux-deb
            runs_on: ubuntu-latest
          - platform: linux-rpm
            runs_on: ubuntu-latest
          - platform: linux-appimage
            runs_on: ubuntu-latest
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}
          submodules: recursive

      - name: Validate distro config
        shell: bash
        run: test -f apps/agent/desktop/distro/humanitec.json

      - name: Prepare build scripts
        shell: bash
        run: chmod +x apps/agent/desktop/scripts/build.sh apps/agent/desktop/scripts/apply_branding.sh

      - name: Setup Node.js
        # Node 24 ломает extract-zip: процесс выходит (exit 0) посреди распаковки
        # zip — рвёт postinstall electron (dist остаётся с одними locales на
        # Linux/Windows) и упаковку @electron/packager на macOS. Node 22 LTS — ок.
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux skia dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libfontconfig1 libfreetype6 \
            fakeroot dpkg rpm squashfs-tools

      - name: Resolve artifact mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "AGENT_ARTIFACT_MODE=${{ github.event.inputs.artifact_mode || 'release' }}" >> "$GITHUB_ENV"
          else
            echo "AGENT_ARTIFACT_MODE=release" >> "$GITHUB_ENV"
          fi

      - name: Build artifact
        shell: bash
        env:
          AGENT_PLATFORM: ${{ matrix.platform }}
          AGENT_VERSION_SHA: ${{ needs.resolve-release.outputs.version_sha }}
          AGENT_ARTIFACT_MODE: ${{ env.AGENT_ARTIFACT_MODE }}
          MACOSX_DEPLOYMENT_TARGET: ${{ startsWith(matrix.platform, 'macos-') && '12.0' || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PATH: ${{ secrets.KEYCHAIN_PATH }}
          WINDOWS_CERTIFICATE_FILE: ${{ secrets.WINDOWS_CERTIFICATE_FILE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: make agent-ci-build

      - name: Verify artifact branding
        shell: bash
        env:
          AGENT_PLATFORM: ${{ matrix.platform }}
          AGENT_VERSION_SHA: ${{ needs.resolve-release.outputs.version_sha }}
        run: |
          uv run python scripts/verify_agent_artifact.py \
            --platform "${AGENT_PLATFORM}" \
            --version-sha "${AGENT_VERSION_SHA}" \
            --artifact-mode "${AGENT_ARTIFACT_MODE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: humanitec-agent-${{ matrix.platform }}
          path: apps/agent/desktop/dist/*

  publish-release:
    needs: [resolve-release, build-matrix]
    if: >
      always() &&
      needs.resolve-release.result == 'success' &&
      (needs.resolve-release.outputs.skip_build == 'true' || needs.build-matrix.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote existing release to latest
        if: needs.resolve-release.outputs.skip_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --latest
          echo "Promoted ${TAG} to latest"

      - name: Download all platform artifacts
        if: needs.resolve-release.outputs.skip_build != 'true'
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        if: needs.resolve-release.outputs.skip_build != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: HumanitecAgent ${{ needs.resolve-release.outputs.release_tag }}
          files: release-assets/**/*
          make_latest: true
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_draft == 'true' }}
          generate_release_notes: true

  verify-release:
    needs: [resolve-release, publish-release]
    if: needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          ASSET_COUNT="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets | length')"
          echo "Release ${TAG} has ${ASSET_COUNT} assets"
          if [[ "${ASSET_COUNT}" -lt 6 ]]; then
            echo "::error::Expected at least 6 platform assets, got ${ASSET_COUNT}"
            exit 1
          fi
          LATEST_TAG="$(curl -sf "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" | jq -r .tag_name)"
          echo "releases/latest tag: ${LATEST_TAG}"
          if [[ "${LATEST_TAG}" != "${TAG}" ]]; then
            echo "::error::releases/latest is ${LATEST_TAG}, expected ${TAG}"
            exit 1
          fi
