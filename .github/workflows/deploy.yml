name: Deploy

concurrency:
  group: agent-lab-deploy-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Оставить пустым: в Helm уйдёт короткий SHA того же коммита, что и docker push. Иначе — ровно существующий тег в ghcr.io (опечатка даёт ImagePullBackOff и pending-upgrade)."
        required: false
        default: ""
      apps_node:
        description: "Нода для всех apps (flows/frontend/crm/rag/sync/office/voice/browser/search/scheduler-api). unchanged = из values.yaml"
        type: choice
        default: unchanged
        options:
          - unchanged
          - auto
          - master
          - gpu-worker
      workers_node:
        description: "Нода для всех workers (flows-/scheduler/rag-/sync-/crm-/idle-worker). unchanged = из values.yaml"
        type: choice
        default: unchanged
        options:
          - unchanged
          - auto
          - master
          - gpu-worker
      data_node:
        description: "Нода для StatefulSets с PVC (postgres/redis/loki/tempo/grafana). ВНИМАНИЕ: переезд требует migrate-pvc.sh"
        type: choice
        default: unchanged
        options:
          - unchanged
          - master
          - gpu-worker
      public_node:
        description: "Нода для hostNetwork-сервисов (livekit/livekit-egress/coturn/onlyoffice). ВНИМАНИЕ: при смене нужен rebind-public-node.sh"
        type: choice
        default: unchanged
        options:
          - unchanged
          - master
          - gpu-worker
      litserve_node:
        description: "Нода для provider-litserve. unchanged = из values.yaml (по умолчанию gpu-worker)"
        type: choice
        default: unchanged
        options:
          - unchanged
          - auto
          - master
          - gpu-worker
      service_overrides:
        description: "CSV точечных override: flows=gpu-worker,redis=master,rag=auto (имена — как в values.yaml)"
        type: string
        default: ""
      replace_orphan_platform_secret:
        description: "Первый helm install: удалить существующий platform-secrets без меток Helm (один раз)"
        required: false
        default: false
        type: boolean

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab
  IMAGE_GPU: ghcr.io/${{ github.repository_owner }}/agent-lab-gpu
  K8S_NAMESPACE: platform
  K8S_RELEASE: agent-lab
  HELM_CHART: ./deploy/helm/agent-lab

jobs:
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Совпадает с type=sha,format=short в docker/metadata-action; не полагаться на meta.outputs.version (не всегда short SHA).
      image_tag: ${{ steps.helm_image_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Helm image tag (short commit SHA)
        id: helm_image_tag
        run: |
          set -euo pipefail
          tag="${GITHUB_SHA:0:7}"
          printf '%s\n' "${tag}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Free disk space before Docker build
        run: |
          set -e
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [ -d "/opt/hostedtoolcache" ]; then sudo rm -rf /opt/hostedtoolcache || true; fi
          if [ -d "/usr/local/lib/android" ]; then sudo rm -rf /usr/local/lib/android || true; fi
          if [ -d "/usr/share/dotnet" ]; then sudo rm -rf /usr/share/dotnet || true; fi
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (full stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: full
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      # GPU image для provider-litserve. Базовый агент-стек 3.14t несовместим с
      # torchaudio.abi3.so из GIL-build (PEP 703). Этот образ FROM agent-lab-base-gpu
      # (Python 3.14 GIL build) с тем же кодом и подключается в Helm через litserve.image.
      - name: Docker metadata (GPU)
        id: meta_gpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GPU }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: ${{ steps.meta_gpu.outputs.tags }}
          labels: ${{ steps.meta_gpu.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,scope=gpu,mode=min

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    # Helm --wait на большом чарте (много Deployment/StatefulSet + pull образов) может занимать >30m;
    # job timeout должен быть выше, чем helm --timeout.
    timeout-minutes: 120
    # Без GitHub Environment: иначе секрет с тем же именем в Environment перекрывает Repository,
    # и пустой KUBECONFIG_B64 в «production» ломает деплой. Нужны reviewers — GitHub Rulesets / отдельный процесс.

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_B64}" ]; then
            echo "::error title=Missing kubeconfig::Секрет KUBECONFIG_B64 пустой или не задан."
            echo ""
            echo "Добавьте в репозитории: Settings → Secrets and variables → Actions → New repository secret"
            echo "  Name:  KUBECONFIG_B64"
            echo "  Value: на master — microk8s config | base64 -w0  (Linux) или microk8s config | base64 | tr -d '\\n'  (macOS)"
            echo ""
            echo "Имя секрета должно совпадать посимвольно (регистр: KUBECONFIG_B64)."
            echo "Форк / чужой репозиторий: secrets недоступны — запускайте workflow только из основного repo."
            exit 1
          fi
          mkdir -p ~/.kube
          if ! printf '%s' "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config; then
            echo "::error::KUBECONFIG_B64 не декодируется как base64. Перезапишите секрет без лишних пробелов и переносов."
            exit 1
          fi
          if ! grep -q . ~/.kube/config; then
            echo "::error::После base64 -d файл ~/.kube/config пустой. Проверьте содержимое секрета."
            exit 1
          fi
          chmod 600 ~/.kube/config
          if ! kubectl config get-contexts -o name 2>/dev/null | grep -q .; then
            echo "::error::В kubeconfig нет контекстов. Снимите конфиг с master: microk8s config"
            exit 1
          fi
          kubectl config current-context
          kubectl get nodes -o wide

      - name: Ensure namespace and GHCR image pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_PULL_USERNAME}" ]; then
            echo "::error title=Missing GHCR_PULL_USERNAME::Задайте repository secret GHCR_PULL_USERNAME (логин ghcr.io)."
            exit 1
          fi
          if [ -z "${GHCR_PULL_TOKEN}" ]; then
            echo "::error title=Missing GHCR_PULL_TOKEN::Задайте repository secret GHCR_PULL_TOKEN (PAT с read:packages для ghcr.io)."
            exit 1
          fi
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-agent-lab-pull \
            --namespace "${K8S_NAMESPACE}" \
            --docker-server=ghcr.io \
            --docker-username="${GHCR_PULL_USERNAME}" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve image tag
        id: tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.image_tag }}"
          TAG="$(printf '%s' "${TAG}" | tr -d '[:space:]')"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.build.outputs.image_tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error title=Missing image_tag::Не задан inputs.image_tag и пустой needs.build.outputs.image_tag."
            exit 1
          fi
          if [ "$TAG" = "latest" ]; then
            echo "::error title=Invalid image_tag::image_tag=latest запрещён: он ломает SERVER__DEPLOYMENT_VERSION и PWA-инвалидацию статики."
            exit 1
          fi
          printf '%s\n' "image_tag=$TAG" >> "${GITHUB_OUTPUT}"
          printf '%s\n' "Deploying image tag: ${TAG}"

      - name: Render Helm app-conf (conf.json + K8s overlay)
        run: python3 deploy/scripts/render_helm_app_conf.py

      - name: Helm lint (sanity)
        run: helm lint "$HELM_CHART" --set image.tag="${{ steps.tag.outputs.image_tag }}"

      - name: Helm clear pending release lock (if any)
        env:
          HELM_NAMESPACE: ${{ env.K8S_NAMESPACE }}
          HELM_RELEASE: ${{ env.K8S_RELEASE }}
        run: bash deploy/scripts/helm_clear_pending_release.sh

      - name: Setup wildcard TLS (cert-manager-webhook-regru + Certificate platform-tls)
        # Идемпотентный выпуск wildcard-сертификата humanitec.ru + *.humanitec.ru через
        # DNS-01 ACME challenge (cert-manager-webhook-regru, API reg.ru). Выполняется ДО
        # helm install — Secret platform-tls создаётся cert-manager'ом, ingress'ы платформы
        # его подхватывают на старте (без HTTP-01, чтобы поддерживать wildcard).
        # Если webhook + ClusterIssuer + Certificate уже на месте и Ready — пропускаем все шаги.
        env:
          REGRU_USERNAME: ${{ secrets.REGRU_USERNAME }}
          REGRU_PASSWORD: ${{ secrets.REGRU_PASSWORD }}
          PLATFORM_NS: ${{ env.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          if [ -z "${REGRU_USERNAME:-}" ] || [ -z "${REGRU_PASSWORD:-}" ]; then
            echo "::warning::REGRU_USERNAME/REGRU_PASSWORD не заданы — пропускаю wildcard TLS (helm install продолжит без TLS, ingress'ы будут отдавать HTTP)."
            exit 0
          fi
          bash deploy/scripts/setup-wildcard-tls.sh

      - name: Helm upgrade --install
        env:
          APPS_NODE: ${{ inputs.apps_node }}
          WORKERS_NODE: ${{ inputs.workers_node }}
          DATA_NODE: ${{ inputs.data_node }}
          PUBLIC_NODE: ${{ inputs.public_node }}
          LITSERVE_NODE: ${{ inputs.litserve_node }}
          SERVICE_OVERRIDES: ${{ inputs.service_overrides }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AUTH_YANDEX_CLIENT_ID: ${{ secrets.AUTH_YANDEX_CLIENT_ID }}
          AUTH_YANDEX_CLIENT_SECRET: ${{ secrets.AUTH_YANDEX_CLIENT_SECRET }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          AUTH_AMOCRM_CLIENT_ID: ${{ secrets.AUTH_AMOCRM_CLIENT_ID }}
          AUTH_AMOCRM_CLIENT_SECRET: ${{ secrets.AUTH_AMOCRM_CLIENT_SECRET }}
          AUTH_APPLE_PRIVATE_KEY: ${{ secrets.AUTH_APPLE_PRIVATE_KEY }}
          AUTH_DEMO_PASSWORD: ${{ secrets.AUTH_DEMO_PASSWORD }}
          PUSH_VAPID_PUBLIC_KEY: ${{ secrets.PUSH__VAPID_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY: ${{ secrets.PUSH__VAPID_PRIVATE_KEY }}
          PUSH_APNS_PRIVATE_KEY: ${{ secrets.PUSH__APNS_PRIVATE_KEY }}
          PUSH_FCM_CREDENTIALS_JSON: ${{ secrets.PUSH__FCM_CREDENTIALS_JSON }}
          PUSH_FCM_PROJECT_ID: ${{ secrets.PUSH__FCM_PROJECT_ID }}
          SELECTEL_ACCESS_KEY: ${{ secrets.SELECTEL_ACCESS_KEY }}
          SELECTEL_SECRET_KEY: ${{ secrets.SELECTEL_SECRET_KEY }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          ONLYOFFICE_JWT_SECRET: ${{ secrets.ONLYOFFICE_JWT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LLM__OPENROUTER__API_KEY: ${{ secrets.LLM__OPENROUTER__API_KEY }}
          LLM__BOTHUB__API_KEY: ${{ secrets.LLM__BOTHUB__API_KEY }}
          LLM_OPENROUTER_API_KEY: ${{ secrets.LLM_OPENROUTER_API_KEY }}
          LLM_BOTHUB_API_KEY: ${{ secrets.LLM_BOTHUB_API_KEY }}
          LLM__GROQ__API_KEY: ${{ secrets.LLM__GROQ__API_KEY }}
          LLM__GOOGLE__API_KEY: ${{ secrets.LLM__GOOGLE__API_KEY }}
          LLM__GITHUB__API_KEY: ${{ secrets.LLM__GITHUB__API_KEY }}
          LLM__HUGGINGFACE__API_KEY: ${{ secrets.LLM__HUGGINGFACE__API_KEY }}
          LLM__DEEPINFRA__API_KEY: ${{ secrets.LLM__DEEPINFRA__API_KEY }}
          LLM__YANDEX__API_KEY: ${{ secrets.LLM__YANDEX__API_KEY }}
          LLM__YANDEX__FOLDER_ID: ${{ secrets.LLM__YANDEX__FOLDER_ID }}
          STT_CLOUD_RU_API_KEY: ${{ secrets.STT__CLOUD_RU__API_KEY }}
          STT_YANDEX_API_KEY: ${{ secrets.VOICE__STT__YANDEX__API_KEY }}
          STT_YANDEX_FOLDER_ID: ${{ secrets.VOICE__STT__YANDEX__FOLDER_ID }}
          STT_SBER_CLIENT_ID: ${{ secrets.VOICE__STT__SBER__CLIENT_ID }}
          STT_SBER_CLIENT_SECRET: ${{ secrets.VOICE__STT__SBER__CLIENT_SECRET }}
          TTS_CLOUD_RU_API_KEY: ${{ secrets.VOICE__TTS__CLOUD_RU__API_KEY }}
          TTS_YANDEX_API_KEY: ${{ secrets.VOICE__TTS__YANDEX__API_KEY }}
          TTS_YANDEX_FOLDER_ID: ${{ secrets.VOICE__TTS__YANDEX__FOLDER_ID }}
          TTS_SBER_CLIENT_ID: ${{ secrets.VOICE__TTS__SBER__CLIENT_ID }}
          TTS_SBER_CLIENT_SECRET: ${{ secrets.VOICE__TTS__SBER__CLIENT_SECRET }}
          RAG_EMBEDDING_API_KEY: ${{ secrets.RAG_EMBEDDING_API_KEY }}
          YOOMONEY_ACCOUNT_NUMBER: ${{ secrets.YOOMONEY_ACCOUNT_NUMBER }}
          YOOMONEY_NOTIFICATION_SECRET: ${{ secrets.YOOMONEY_NOTIFICATION_SECRET }}
          YOOMONEY_CLIENT_ID: ${{ secrets.YOOMONEY_CLIENT_ID }}
          YOOMONEY_CLIENT_SECRET: ${{ secrets.YOOMONEY_CLIENT_SECRET }}
          YOOMONEY_ACCESS_TOKEN: ${{ secrets.YOOMONEY_ACCESS_TOKEN }}
          PROXY_ENABLED: ${{ secrets.PROXY__ENABLED }}
          PROXY_PROXIES: ${{ secrets.PROXY__PROXIES }}
          SEARCH__TINYFISH__API_KEY: ${{ secrets.SEARCH__TINYFISH__API_KEY }}
          SEARCH__LINKUP__API_KEY: ${{ secrets.SEARCH__LINKUP__API_KEY }}
          SEARCH__SERPER__API_KEY: ${{ secrets.SEARCH__SERPER__API_KEY }}
          SEARCH__TAVILY__API_KEY: ${{ secrets.SEARCH__TAVILY__API_KEY }}
          HELM_DELETE_ORPHAN_PLATFORM_SECRET: ${{ inputs.replace_orphan_platform_secret == true && '1' || '0' }}
        run: |
          set -euo pipefail

          MISSING=""
          for required in POSTGRES_PASSWORD AUTH_JWT_SECRET SELECTEL_ACCESS_KEY SELECTEL_SECRET_KEY LIVEKIT_API_KEY LIVEKIT_API_SECRET TURN_SECRET ONLYOFFICE_JWT_SECRET GRAFANA_ADMIN_PASSWORD; do
            if [ -z "${!required:-}" ]; then
              MISSING="${MISSING}${MISSING:+ }${required}"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error title=Missing GitHub Secrets::Обязательные секреты пустые или не заданы: ${MISSING}"
            echo "Репозиторий → Settings → Secrets and variables → Actions. Имена см. deploy/github-actions-secrets-checklist.md (раздел 2)."
            exit 1
          fi

          NODE_SETS=$(bash deploy/scripts/build_helm_node_sets.sh)
          echo "Node scheduling overrides: ${NODE_SETS:-(none, using defaults)}"

          echo "helm_precheck_install_secret_conflict (Orphan Secret / первый install)..."
          HELM_WILL_CREATE_PLATFORM_SECRET=1 \
            HELM_RELEASE="$K8S_RELEASE" \
            HELM_NAMESPACE="$K8S_NAMESPACE" \
            bash deploy/scripts/helm_precheck_install_secret_conflict.sh

          echo "helm upgrade --install --wait (до 60m почти без вывода; смотри параллельно kubectl get pods -n ${K8S_NAMESPACE} -w)..."
          # shellcheck disable=SC2086
          helm upgrade --install "$K8S_RELEASE" "$HELM_CHART" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --values "$HELM_CHART/values.yaml" \
            --values "$HELM_CHART/values-prod.yaml" \
            --set image.tag="${{ steps.tag.outputs.image_tag }}" \
            --set litserve.image="${IMAGE_GPU}:${{ steps.tag.outputs.image_tag }}" \
            $NODE_SETS \
            --set-json "platformSecrets=$(bash deploy/scripts/helm_platform_secrets_json.sh)" \
            --wait --timeout 60m

      - name: Verify rollout (cluster-health.sh)
        env:
          PLATFORM_NS: ${{ env.K8S_NAMESPACE }}
          # CHECK_PUBLIC=1 — проверяем https://humanitec.ru/* через ingress
          CHECK_PUBLIC: "1"
        run: bash deploy/scripts/cluster-health.sh
