name: Deploy

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (full stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: full
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose-prod.yaml,conf.json"
          target: /opt/agent-lab/

      # docker-compose-prod монтирует ./migrations/postgres/init.sql — без файла на хосте
      # первый старт Postgres с пустым volume не создаст platform_agents и остальные БД.
      # onlyoffice-documentserver монтирует ./deploy/onlyoffice/themes/*.json — иначе Docker создаст каталог вместо файла.
      - name: Ensure server paths for compose volume mounts
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/agent-lab/migrations/postgres
            mkdir -p /opt/agent-lab/deploy/onlyoffice/themes
            rm -rf /opt/agent-lab/migrations/postgres/init.sql

      # Без strip_components файл окажется в .../postgres/migrations/postgres/init.sql,
      # требуемый путь .../postgres/init.sql не создаётся — Docker смонтирует его как каталог.
      - name: Copy Postgres SQL for volume mount and bootstrap
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "migrations/postgres/init.sql,migrations/postgres/bootstrap_idempotent.sql"
          target: /opt/agent-lab/migrations/postgres/
          strip_components: 2

      - name: Copy OnlyOffice theme (documentserver volume mount)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/onlyoffice/themes/theme-humanitec-light.json"
          target: /opt/agent-lab/deploy/onlyoffice/themes/
          strip_components: 3

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}
          IMAGE: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH__JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          SELECTEL_ACCESS_KEY: ${{ secrets.SELECTEL_ACCESS_KEY }}
          SELECTEL_SECRET_KEY: ${{ secrets.SELECTEL_SECRET_KEY }}
          AUTH_YANDEX_CLIENT_ID: ${{ secrets.AUTH_YANDEX_CLIENT_ID }}
          AUTH_YANDEX_CLIENT_SECRET: ${{ secrets.AUTH_YANDEX_CLIENT_SECRET }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          AUTH_APPLE_PRIVATE_KEY: ${{ secrets.AUTH_APPLE_PRIVATE_KEY }}
          AUTH_DEMO_PASSWORD: ${{ secrets.AUTH_DEMO_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          PUSH__ENABLED: ${{ secrets.PUSH__ENABLED }}
          PUSH__VAPID_PUBLIC_KEY: ${{ secrets.PUSH__VAPID_PUBLIC_KEY }}
          PUSH__VAPID_PRIVATE_KEY: ${{ secrets.PUSH__VAPID_PRIVATE_KEY }}
          PUSH__VAPID_EMAIL: ${{ secrets.PUSH__VAPID_EMAIL || 'ops@humanitec.ru' }}
          # APNs: отдельный .p8 только если не тот же, что у Sign in with Apple (иначе хватит AUTH_APPLE_PRIVATE_KEY + push.apns_bundle_id в conf.json).
          PUSH__APNS_PRIVATE_KEY: ${{ secrets.PUSH__APNS_PRIVATE_KEY }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          LIVEKIT_PUBLIC_URL: ${{ secrets.LIVEKIT_PUBLIC_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          DEPLOYMENT_VERSION: ${{ github.sha }}
          LLM_BOTHUB_API_KEY: ${{ secrets.LLM_BOTHUB_API_KEY }}
          LLM_OPENROUTER_API_KEY: ${{ secrets.LLM_OPENROUTER_API_KEY }}
          STT__CLOUD_RU__API_KEY: ${{ secrets.STT__CLOUD_RU__API_KEY }}
          STT_CLOUD_RU_API_KEY: ${{ secrets.STT_CLOUD_RU_API_KEY }}
          RAG_EMBEDDING_API_KEY: ${{ secrets.RAG_EMBEDDING_API_KEY }}
          ONLYOFFICE_JWT_SECRET: ${{ secrets.ONLYOFFICE_JWT_SECRET }}
          OFFICE_DOCUMENT_SERVER_PUBLIC_URL: ${{ secrets.OFFICE_DOCUMENT_SERVER_PUBLIC_URL }}
          OFFICE_CALLBACK_PUBLIC_BASE_URL: ${{ secrets.OFFICE_CALLBACK_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: IMAGE_TAG,IMAGE,POSTGRES_PASSWORD,AUTH__JWT_SECRET,SELECTEL_ACCESS_KEY,SELECTEL_SECRET_KEY,AUTH_YANDEX_CLIENT_ID,AUTH_YANDEX_CLIENT_SECRET,AUTH_GOOGLE_CLIENT_ID,AUTH_GOOGLE_CLIENT_SECRET,AUTH_GITHUB_CLIENT_ID,AUTH_GITHUB_CLIENT_SECRET,AUTH_APPLE_PRIVATE_KEY,AUTH_DEMO_PASSWORD,GHCR_TOKEN,GITHUB_ACTOR,PUSH__ENABLED,PUSH__VAPID_PUBLIC_KEY,PUSH__VAPID_PRIVATE_KEY,PUSH__VAPID_EMAIL,PUSH__APNS_PRIVATE_KEY,LIVEKIT_API_KEY,LIVEKIT_API_SECRET,LIVEKIT_PUBLIC_URL,SERVER_HOST,TURN_SECRET,DEPLOYMENT_VERSION,LLM_BOTHUB_API_KEY,LLM_OPENROUTER_API_KEY,STT__CLOUD_RU__API_KEY,STT_CLOUD_RU_API_KEY,RAG_EMBEDDING_API_KEY,ONLYOFFICE_JWT_SECRET,OFFICE_DOCUMENT_SERVER_PUBLIC_URL,OFFICE_CALLBACK_PUBLIC_BASE_URL
          script: |
            set -e

            mkdir -p /opt/agent-lab
            rm -f /opt/agent-lab/.env

            cd /opt/agent-lab

            export ONLYOFFICE_JWT_SECRET="${ONLYOFFICE_JWT_SECRET:-}"
            export OFFICE_DOCUMENT_SERVER_PUBLIC_URL="${OFFICE_DOCUMENT_SERVER_PUBLIC_URL:-}"
            export OFFICE_CALLBACK_PUBLIC_BASE_URL="${OFFICE_CALLBACK_PUBLIC_BASE_URL:-}"

            if [ ! -f migrations/postgres/init.sql ]; then
              echo "FATAL: migrations/postgres/init.sql должен быть обычным файлом (см. scp strip_components)."
              ls -la migrations/postgres/ 2>/dev/null || true
              exit 1
            fi
            if [ ! -f migrations/postgres/bootstrap_idempotent.sql ]; then
              echo "FATAL: migrations/postgres/bootstrap_idempotent.sql отсутствует."
              exit 1
            fi

            # ghcr.io с сервера иногда даёт TLS handshake timeout — несколько попыток с паузой
            retry() {
              local attempt max=5 delay=25
              for attempt in $(seq 1 $max); do
                if "$@"; then
                  return 0
                fi
                if [ "$attempt" -lt "$max" ]; then
                  echo "Команда не удалась (попытка $attempt/$max), повтор через ${delay}s..."
                  sleep "$delay"
                fi
              done
              return 1
            }

            for attempt in $(seq 1 5); do
              if echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                exit 1
              fi
              echo "docker login: попытка $attempt/5 не удалась, повтор через 25s..."
              sleep 25
            done

            retry docker compose -f docker-compose-prod.yaml pull

            docker compose -f docker-compose-prod.yaml up -d postgres redis

            _wait=0
            until docker compose -f docker-compose-prod.yaml exec -T postgres pg_isready -U platform_user -d postgres >/dev/null 2>&1; do
              _wait=$((_wait + 1))
              if [ "$_wait" -gt 90 ]; then
                echo "FATAL: postgres не принял соединения за ~3 минуты"
                exit 1
              fi
              sleep 2
            done

            docker compose -f docker-compose-prod.yaml exec -T postgres \
              psql -U platform_user -d postgres -v ON_ERROR_STOP=1 \
              < migrations/postgres/bootstrap_idempotent.sql

            docker compose -f docker-compose-prod.yaml run --rm migrations || {
              echo "=== docker compose ps ==="
              docker compose -f docker-compose-prod.yaml ps -a
              echo "=== agentlab_postgres logs ==="
              docker logs agentlab_postgres --tail 200 2>&1 || true
              echo "=== agentlab_postgres inspect health ==="
              docker inspect agentlab_postgres --format '{{json .State.Health}}' 2>&1 || true
              exit 1
            }

            docker compose -f docker-compose-prod.yaml up -d \
              agents frontend crm rag sync onlyoffice-documentserver office scheduler-api \
              flows_worker scheduler crm_worker rag_worker sync_worker idle_worker \
              livekit livekit-egress coturn

            _egress_wait=0
            until [ "$(docker inspect -f '{{.State.Running}}' agentlab_livekit_egress 2>/dev/null || echo false)" = "true" ]; do
              _egress_wait=$((_egress_wait + 1))
              if [ "$_egress_wait" -gt 30 ]; then
                echo "FATAL: livekit-egress не запустился за 60 секунд"
                docker logs agentlab_livekit_egress --tail 200 2>&1 || true
                exit 1
              fi
              sleep 2
            done

            docker image prune -f
