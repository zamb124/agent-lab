name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Тег образа для деплоя (по умолчанию — короткий SHA коммита)"
        required: false
        default: ""

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab
  K8S_NAMESPACE: platform
  K8S_RELEASE: agent-lab
  HELM_CHART: ./deploy/helm/agent-lab

jobs:
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space before Docker build
        run: |
          set -e
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [ -d "/opt/hostedtoolcache" ]; then sudo rm -rf /opt/hostedtoolcache || true; fi
          if [ -d "/usr/local/lib/android" ]; then sudo rm -rf /usr/local/lib/android || true; fi
          if [ -d "/usr/share/dotnet" ]; then sudo rm -rf /usr/share/dotnet || true; fi
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (full stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: full
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context
          kubectl get nodes -o wide

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.build.outputs.image_tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "FATAL: image_tag empty"
            exit 1
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Sync platform-secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AUTH_YANDEX_CLIENT_ID: ${{ secrets.AUTH_YANDEX_CLIENT_ID }}
          AUTH_YANDEX_CLIENT_SECRET: ${{ secrets.AUTH_YANDEX_CLIENT_SECRET }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          AUTH_AMOCRM_CLIENT_ID: ${{ secrets.AUTH_AMOCRM_CLIENT_ID }}
          AUTH_AMOCRM_CLIENT_SECRET: ${{ secrets.AUTH_AMOCRM_CLIENT_SECRET }}
          AUTH_APPLE_PRIVATE_KEY: ${{ secrets.AUTH_APPLE_PRIVATE_KEY }}
          AUTH_DEMO_PASSWORD: ${{ secrets.AUTH_DEMO_PASSWORD }}
          PUSH_VAPID_PUBLIC_KEY: ${{ secrets.PUSH__VAPID_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY: ${{ secrets.PUSH__VAPID_PRIVATE_KEY }}
          PUSH_APNS_PRIVATE_KEY: ${{ secrets.PUSH__APNS_PRIVATE_KEY }}
          PUSH_FCM_CREDENTIALS_JSON: ${{ secrets.PUSH__FCM_CREDENTIALS_JSON }}
          PUSH_FCM_PROJECT_ID: ${{ secrets.PUSH__FCM_PROJECT_ID }}
          SELECTEL_ACCESS_KEY: ${{ secrets.SELECTEL_ACCESS_KEY }}
          SELECTEL_SECRET_KEY: ${{ secrets.SELECTEL_SECRET_KEY }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          ONLYOFFICE_JWT_SECRET: ${{ secrets.ONLYOFFICE_JWT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LLM_BOTHUB_API_KEY: ${{ secrets.LLM_BOTHUB_API_KEY }}
          LLM_OPENROUTER_API_KEY: ${{ secrets.LLM_OPENROUTER_API_KEY }}
          STT_CLOUD_RU_API_KEY: ${{ secrets.STT__CLOUD_RU__API_KEY }}
          RAG_EMBEDDING_API_KEY: ${{ secrets.RAG_EMBEDDING_API_KEY }}
          YOOMONEY_ACCOUNT_NUMBER: ${{ secrets.YOOMONEY_ACCOUNT_NUMBER }}
          YOOMONEY_NOTIFICATION_SECRET: ${{ secrets.YOOMONEY_NOTIFICATION_SECRET }}
          YOOMONEY_CLIENT_ID: ${{ secrets.YOOMONEY_CLIENT_ID }}
          YOOMONEY_CLIENT_SECRET: ${{ secrets.YOOMONEY_CLIENT_SECRET }}
          YOOMONEY_ACCESS_TOKEN: ${{ secrets.YOOMONEY_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          for required in POSTGRES_PASSWORD AUTH_JWT_SECRET SELECTEL_ACCESS_KEY SELECTEL_SECRET_KEY LIVEKIT_API_KEY LIVEKIT_API_SECRET TURN_SECRET ONLYOFFICE_JWT_SECRET GRAFANA_ADMIN_PASSWORD; do
            if [ -z "${!required:-}" ]; then
              echo "FATAL: required secret $required is empty" >&2
              exit 1
            fi
          done

          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic platform-secrets -n "$K8S_NAMESPACE" \
            --from-literal=postgres-password="$POSTGRES_PASSWORD" \
            --from-literal=auth-jwt-secret="$AUTH_JWT_SECRET" \
            --from-literal=hf-token="${HF_TOKEN:-}" \
            --from-literal=auth-yandex-client-id="${AUTH_YANDEX_CLIENT_ID:-}" \
            --from-literal=auth-yandex-client-secret="${AUTH_YANDEX_CLIENT_SECRET:-}" \
            --from-literal=auth-google-client-id="${AUTH_GOOGLE_CLIENT_ID:-}" \
            --from-literal=auth-google-client-secret="${AUTH_GOOGLE_CLIENT_SECRET:-}" \
            --from-literal=auth-github-client-id="${AUTH_GITHUB_CLIENT_ID:-}" \
            --from-literal=auth-github-client-secret="${AUTH_GITHUB_CLIENT_SECRET:-}" \
            --from-literal=auth-amocrm-client-id="${AUTH_AMOCRM_CLIENT_ID:-}" \
            --from-literal=auth-amocrm-client-secret="${AUTH_AMOCRM_CLIENT_SECRET:-}" \
            --from-literal=auth-apple-private-key="${AUTH_APPLE_PRIVATE_KEY:-}" \
            --from-literal=auth-demo-password="${AUTH_DEMO_PASSWORD:-}" \
            --from-literal=push-vapid-public-key="${PUSH_VAPID_PUBLIC_KEY:-}" \
            --from-literal=push-vapid-private-key="${PUSH_VAPID_PRIVATE_KEY:-}" \
            --from-literal=push-apns-private-key="${PUSH_APNS_PRIVATE_KEY:-}" \
            --from-literal=push-fcm-credentials-json="${PUSH_FCM_CREDENTIALS_JSON:-}" \
            --from-literal=push-fcm-project-id="${PUSH_FCM_PROJECT_ID:-}" \
            --from-literal=selectel-access-key="$SELECTEL_ACCESS_KEY" \
            --from-literal=selectel-secret-key="$SELECTEL_SECRET_KEY" \
            --from-literal=livekit-api-key="$LIVEKIT_API_KEY" \
            --from-literal=livekit-api-secret="$LIVEKIT_API_SECRET" \
            --from-literal=turn-secret="$TURN_SECRET" \
            --from-literal=onlyoffice-jwt-secret="$ONLYOFFICE_JWT_SECRET" \
            --from-literal=grafana-admin-password="$GRAFANA_ADMIN_PASSWORD" \
            --from-literal=llm-bothub-api-key="${LLM_BOTHUB_API_KEY:-}" \
            --from-literal=llm-openrouter-api-key="${LLM_OPENROUTER_API_KEY:-}" \
            --from-literal=stt-cloud-ru-api-key="${STT_CLOUD_RU_API_KEY:-}" \
            --from-literal=rag-embedding-api-key="${RAG_EMBEDDING_API_KEY:-${LLM_OPENROUTER_API_KEY:-}}" \
            --from-literal=yoomoney-account-number="${YOOMONEY_ACCOUNT_NUMBER:-}" \
            --from-literal=yoomoney-notification-secret="${YOOMONEY_NOTIFICATION_SECRET:-}" \
            --from-literal=yoomoney-client-id="${YOOMONEY_CLIENT_ID:-}" \
            --from-literal=yoomoney-client-secret="${YOOMONEY_CLIENT_SECRET:-}" \
            --from-literal=yoomoney-access-token="${YOOMONEY_ACCESS_TOKEN:-}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm lint (sanity)
        run: helm lint "$HELM_CHART"

      - name: Helm upgrade --install
        run: |
          helm upgrade --install "$K8S_RELEASE" "$HELM_CHART" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --values "$HELM_CHART/values.yaml" \
            --values "$HELM_CHART/values-prod.yaml" \
            --set image.tag="${{ steps.tag.outputs.image_tag }}" \
            --wait --timeout 15m

      - name: Verify rollout (cluster-health.sh)
        env:
          PLATFORM_NS: ${{ env.K8S_NAMESPACE }}
          # CHECK_PUBLIC=1 — проверяем https://humanitec.ru/* через ingress
          CHECK_PUBLIC: "1"
        run: bash deploy/scripts/cluster-health.sh
