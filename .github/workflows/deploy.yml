name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (full stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: full
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose-prod.yaml,conf.json"
          target: /opt/agent-lab/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH__JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          SELECTEL_ACCESS_KEY: ${{ secrets.SELECTEL_ACCESS_KEY }}
          SELECTEL_SECRET_KEY: ${{ secrets.SELECTEL_SECRET_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD,AUTH__JWT_SECRET,SELECTEL_ACCESS_KEY,SELECTEL_SECRET_KEY,GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e

            mkdir -p /opt/agent-lab

            printf 'IMAGE=%s\nPOSTGRES_PASSWORD=%s\nAUTH__JWT_SECRET=%s\nSELECTEL_ACCESS_KEY=%s\nSELECTEL_SECRET_KEY=%s\n' \
              "${IMAGE_TAG}" "${POSTGRES_PASSWORD}" "${AUTH__JWT_SECRET}" \
              "${SELECTEL_ACCESS_KEY}" "${SELECTEL_SECRET_KEY}" \
              > /opt/agent-lab/.env

            cd /opt/agent-lab

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            docker compose -f docker-compose-prod.yaml pull

            docker compose -f docker-compose-prod.yaml up -d postgres redis
            sleep 5

            docker compose -f docker-compose-prod.yaml run --rm migrations

            docker compose -f docker-compose-prod.yaml up -d \
              agents frontend crm rag sync \
              worker scheduler rag-worker sync-worker

            docker image prune -f
