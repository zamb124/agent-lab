# Сборка Android AAB и публикация в Google Play.
# Запускается вручную (workflow_dispatch).
#
# Подпись: Play App Signing — локально/в CI используется upload key.
# Секреты репозитория:
#   ANDROID_KEYSTORE_BASE64                    — base64 *.jks upload key
#   ANDROID_KEYSTORE_PASSWORD                  — пароль keystore
#   ANDROID_KEY_ALIAS                          — alias ключа
#   ANDROID_KEY_PASSWORD                       — пароль ключа
#
# Опционально:
#   ANDROID_GOOGLE_SERVICES_JSON_BASE64        — google-services.json для FCM в сборке
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64    — service account JSON Play Developer API
#                                                (Google Play Console → Setup → API access),
#                                                нужен только если upload_to_play=true
name: mobile-android-build

on:
  workflow_dispatch:
    inputs:
      release_track:
        description: "Play track для аплоада"
        required: false
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      upload_to_play:
        description: "Залить AAB в Play Console после сборки (нужен GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64)"
        required: false
        default: false
        type: boolean
      release_status:
        description: "Статус релиза в Play (draft публикует черновик; completed раскатывает)"
        required: false
        default: "draft"
        type: choice
        options:
          - draft
          - inProgress
          - halted
          - completed

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile tooling
        working-directory: mobile
        run: npm ci

      - name: Capacitor sync android
        working-directory: mobile
        run: npx cap sync android

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Секрет ANDROID_KEYSTORE_BASE64 не задан"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Decode google-services.json (optional)
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > mobile/android/app/google-services.json
            echo "google-services.json подготовлен — FCM будет включён в сборку"
          else
            echo "google-services.json не задан — FCM плагин при сборке не активируется"
          fi

      - name: Gradle bundleRelease
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ inputs.release_track }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      # Аплоад в Google Play через Android Publisher API.
      # Service account создаётся в Play Console → Setup → API access; роль "Service Account User"
      # + права в Play Console на release к выбранному track. Содержимое JSON хранится в секрете
      # GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 (base64-encoded).
      - name: Decode Play service account
        if: ${{ inputs.upload_to_play }}
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" ]; then
            echo "::error::Секрет GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 не задан, но upload_to_play=true"
            exit 1
          fi
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d > "$RUNNER_TEMP/play-service-account.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=$RUNNER_TEMP/play-service-account.json" >> "$GITHUB_ENV"

      - name: Upload to Google Play
        if: ${{ inputs.upload_to_play }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.PLAY_SERVICE_ACCOUNT_JSON_PATH }}
          packageName: ru.humanitec.app
          releaseFiles: mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.release_track }}
          status: ${{ inputs.release_status }}
          changesNotSentForReview: false
