name: Build Base GPU Image

# GPU-вариант базового образа (ghcr.io/<owner>/agent-lab-base-gpu) для
# provider-litserve и других ML-сервисов с GIL-only нативными расширениями
# (torchaudio через silero_vad, pyannote-audio и т.п.). Python 3.14 GIL build —
# совместим со stable-ABI .so из upstream pytorch wheels, в отличие от cp314t.
# Главный платформенный base (agent-lab-base) остаётся на 3.14t.
#
# Триггеры:
#   - auto: push в main с изменениями pyproject.toml / uv.lock / Dockerfile.base.gpu
#   - manual: workflow_dispatch
#
# Платформа: linux/amd64 (k8s кластер целиком amd64).

concurrency:
  group: agent-lab-build-base-gpu
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.base.gpu'
      - '.github/workflows/build-base-gpu.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent-lab-base-gpu

jobs:
  build:
    name: Build & Push GPU base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (torch + ML deps занимают ~5GiB)
        run: |
          set -e
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [ -d "/opt/hostedtoolcache" ]; then sudo rm -rf /opt/hostedtoolcache || true; fi
          if [ -d "/usr/local/lib/android" ]; then sudo rm -rf /usr/local/lib/android || true; fi
          if [ -d "/usr/share/dotnet" ]; then sudo rm -rf /usr/share/dotnet || true; fi
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base-gpu
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base.gpu
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=base-gpu
          cache-to: type=gha,scope=base-gpu,mode=max
