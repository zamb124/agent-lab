[project]
site_name = "Humanitec"
site_description = "Платформа для ИИ-агентов, RAG, CRM и автоматизации"
site_url = "https://humanitec.ru/documentation/"
site_author = "Humanitec"
docs_dir = "build/documentation-ru"
site_dir = "documentation-dist"
dev_addr = "127.0.0.1:8000"
use_directory_urls = true

copyright = "Humanitec"

[project.extra]
alternate = [
    { name = "English", link = "/documentation/en/", lang = "en" },
    { name = "Русский", link = "/documentation/", lang = "ru" },
]

[project.theme]
variant = "classic"
language = "ru"

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
