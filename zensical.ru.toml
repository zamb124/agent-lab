[project]
site_name = "Humanitec"
site_description = "Платформа для ИИ-агентов, RAG, NetWorkle и автоматизации"
site_url = "https://humanitec.ru/documentation/"
site_author = "Humanitec"
docs_dir = "build/documentation-ru"
site_dir = "documentation-dist"
dev_addr = "127.0.0.1:8000"
use_directory_urls = true

copyright = "Humanitec"

extra_css = [
  "assets/stylesheets/documentation-header.css",
]

extra_javascript = [
  { path = "assets/javascripts/documentation-shell.js", defer = true },
]

[project.extra]
homepage = "/"
platform_home_title = "На главную"
nav_docs_title = "Документация"
nav_start_here_title = "Начни отсюда"
nav_quickstart_title = "Быстрый старт"
nav_api_title = "API"
nav_instructions_title = "Инструкции"
ask_ai_title = "Ask AI"
ask_ai_aria_label = "Открыть AI-помощника по документации"
llms_title = "LLMs.txt"
alternate = [
    { name = "English", link = "/documentation/en/", lang = "en" },
    { name = "Русский", link = "/documentation/", lang = "ru" },
]

[project.theme]
custom_dir = "docs/theme-overrides"
variant = "modern"
language = "ru"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
  "navigation.footer",
  "navigation.top",
]

[project.theme.font]
text = "Onest"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "octicons/moon-24"
toggle.name = "Переключить на тёмную тему"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "octicons/sun-24"
toggle.name = "Переключить на светлую тему"

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
