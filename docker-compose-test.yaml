name: agentlab-test

services:
  postgres-test:
    platform: "linux/amd64"
    image: pgvector/pgvector:pg17
    container_name: agentlab_postgres_test
    environment:
      POSTGRES_DB: platform_shared
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: admin
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "54322:5432"
    volumes:
      - ./migrations/postgres/init.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_shared"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  redis-test:
    platform: "linux/amd64"
    image: redis:7-alpine
    container_name: agentlab_redis_test
    ports:
      - "63792:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  minio-test:
    platform: "linux/amd64"
    image: minio/minio:latest
    container_name: agentlab_minio_test
    ports:
      - "19002:9000"
      - "19012:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  # OnlyOffice Document Server — те же JWT и URL, что в tests_runner (OFFICE__*).
  onlyoffice-documentserver:
    platform: "linux/amd64"
    image: onlyoffice/documentserver:latest
    container_name: agentlab_onlyoffice_test
    ports:
      - "18088:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=test-onlyoffice-jwt-secret
    volumes:
      - ./deploy/onlyoffice/themes/theme-humanitec-light.json:/var/www/onlyoffice/documentserver/web-apps/apps/common/main/resources/themes/theme-humanitec-light.json:ro
    depends_on:
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - test-net

  provider_litserve:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
      target: default
    container_name: agentlab_provider_litserve_test
    command: ["python", "-m", "apps.provider_litserve.main"]
    ports:
      - "18014:8014"
    volumes:
      - ./conf.json:/app/conf.json:ro
    environment:
      - PROVIDER_LITSERVE__INFRA__BACKEND=placeholder
      - PROVIDER_LITSERVE__INFRA__HOST=0.0.0.0
      - PROVIDER_LITSERVE__INFRA__GATEWAY_PORT=8014
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy-test:4317
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - test-net

  test-a2a-agent:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: apps/test_a2a_sample/Dockerfile
    container_name: agentlab_a2a_test
    ports:
      - "18052:8005"
    environment:
      - API_KEY=test-api-key-12345
      - AGENT_URL=http://test-a2a-agent:8005
      - PORT=8005
      - LLM__OPENAI__API_KEY=${LLM__OPENAI__API_KEY:-sk-test-fake-key-for-testing}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  # TaskIQ воркеры (flows_worker, rag_worker, scheduler, sync_worker, crm_worker,
  # idle_worker) запускаются ТОЛЬКО локальным subprocess из tests/fixtures/workers.py
  # (или изнутри tests_runner). Контейнеры в test-compose «запекают» код в образ
  # и приводят к double-consumer гонке на общей Redis-очереди при изменениях
  # моделей/handler'ов. Канон — один источник правды: текущий рабочий код.

  tests_runner:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
      target: default
    container_name: agentlab_tests_runner
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      test-a2a-agent:
        condition: service_healthy
      provider_litserve:
        condition: service_healthy
      livekit-test:
        condition: service_healthy
      onlyoffice-documentserver:
        condition: service_healthy
      loki-test:
        condition: service_started
      tempo-test:
        condition: service_started
      alloy-test:
        condition: service_started
      grafana-test:
        condition: service_started
    environment:
      - DATABASE__SHARED_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_shared
      - DATABASE__FLOWS_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_agents
      - DATABASE__CRM_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_crm
      - DATABASE__SYNC_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_sync
      - DATABASE__RAG_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_rag
      - DATABASE__OFFICE_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_office
      - DATABASE__TRACING_URL=postgresql+asyncpg://platform_user:admin@postgres-test:5432/platform_tracing
      - DATABASE__REDIS_URL=redis://redis-test:6379/0
      - TASKS__BROKER_URL=redis://redis-test:6379/1
      - TESTING=true
      - AUTH__PERMISSIONS_ENABLED=false
      - AUTH__INTERNAL_SERVICE_KEY=test-internal-service-key
      - AUTH__ADMIN_API_KEY=test-admin-api-key
      - EXTERNAL_TEST_A2A_AGENT_URL=http://test-a2a-agent:8005
      - EXTERNAL_TEST_A2A_AGENT_API_KEY=test-api-key-12345
      - PYTEST_WORKERS=${PYTEST_WORKERS:-4}
      - S3__DEFAULT_BUCKET=test-bucket
      - S3__BUCKETS__TEST_BUCKET__ENDPOINT_URL=http://minio-test:9000
      - CALLS__LIVEKIT_URL=ws://livekit-test:7880
      - CALLS__LIVEKIT_API_KEY=devkey
      - CALLS__LIVEKIT_API_SECRET=secret
      - VOICE__STT__PROVIDER=mock
      - VOICE__STT__MOCK_TRANSCRIPT_TEXT=Тестовая транскрипция docker worker
      - OFFICE__JWT_SECRET=test-onlyoffice-jwt-secret
      - OFFICE__DOCUMENT_SERVER_PUBLIC_URL=http://onlyoffice-documentserver
      - OFFICE__CALLBACK_PUBLIC_BASE_URL=http://testserver
      - PROVIDER_LITSERVE__API__BASE_URL=http://provider_litserve:8014/v1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy-test:4317
    command: ["sh", "-c", "test -d /app/test-results || mkdir -p /app/test-results; test -d /app/htmlcov || mkdir -p /app/htmlcov; chmod -R 777 /app/test-results /app/htmlcov 2>/dev/null || true; python -m pytest tests/ -v -n ${PYTEST_WORKERS} --junitxml=/app/test-results/junit.xml --cov=apps --cov=core --cov-report=term-missing --cov-report=html"]
    restart: "no"
    volumes:
      - ./test-results:/app/test-results:rw
      - ./htmlcov:/app/htmlcov:rw
    networks:
      - test-net

  livekit-test:
    image: livekit/livekit-server:latest
    container_name: agentlab_livekit_test
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        keys:
          devkey: secret
        redis:
          address: redis-test:6379
          db: 2
        rtc:
          tcp_port: 7882
          udp_port: 7881
          use_external_ip: false
    command: --bind 0.0.0.0
    ports:
      - "7890:7880"
      - "7891:7881/udp"
      - "7892:7882/tcp"
    depends_on:
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7880"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - test-net

  livekit-egress-test:
    image: livekit/egress:latest
    container_name: agentlab_livekit_egress_test
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit-test:7880
        redis:
          address: redis-test:6379
          db: 2
        logging:
          level: info
          json: true
        session_limits:
          file_output_max_duration: 1h
    depends_on:
      redis-test:
        condition: service_healthy
      livekit-test:
        condition: service_healthy
    restart: "no"
    networks:
      - test-net

  livekit-cli-test:
    image: livekit/livekit-cli:latest
    container_name: agentlab_livekit_cli_test
    command:
      [
        "--url",
        "ws://livekit-test:7880",
        "--api-key",
        "devkey",
        "--api-secret",
        "secret",
        "room",
        "join",
        "--identity",
        "cli-bootstrap",
        "--publish-demo",
        "cli-bootstrap-room"
      ]
    depends_on:
      livekit-test:
        condition: service_healthy
    restart: "no"
    networks:
      - test-net

  # ============================================
  # Observability (Loki + Tempo + Alloy + Grafana)
  # Порты смещены чтобы не конфликтовать с dev
  # ============================================
  loki-test:
    image: grafana/loki:latest
    container_name: agentlab_loki_test
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./deploy/observability/loki.yaml:/etc/loki/loki.yaml:ro
    ports:
      - "3110:3100"
    networks:
      test-net:
        aliases:
          - loki

  tempo-test:
    image: grafana/tempo:latest
    container_name: agentlab_tempo_test
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3210:3200"
    networks:
      test-net:
        aliases:
          - tempo

  alloy-test:
    image: grafana/alloy:latest
    container_name: agentlab_alloy_test
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    volumes:
      - ./deploy/observability/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4327:4317"
      - "12355:12345"
    depends_on:
      loki-test:
        condition: service_started
      tempo-test:
        condition: service_started
    networks:
      - test-net

  grafana-test:
    image: grafana/grafana:latest
    container_name: agentlab_grafana_test
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3010"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./deploy/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
      - ./deploy/observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/observability/dashboards:/etc/grafana/provisioning/dashboards/platform:ro
      - ./deploy/observability/grafana-alerts:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3010:3000"
    depends_on:
      loki-test:
        condition: service_started
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
