services:
  postgres-test:
    platform: "linux/amd64"
    image: postgres:15
    container_name: platform-postgres-test
    environment:
      POSTGRES_DB: platform_test
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  redis-test:
    platform: "linux/amd64"
    image: redis:7-alpine
    container_name: platform-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  chroma-test:
    platform: "linux/amd64"
    image: chromadb/chroma:latest
    container_name: platform-chroma-test
    ports:
      - "8101:8000"
    volumes:
      - chroma_test_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - IS_PERSISTENT=TRUE
    networks:
      - test-net

  minio-test:
    platform: "linux/amd64"
    image: minio/minio:latest
    container_name: platform-minio-test
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  test-a2a-agent:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: apps/test_a2a_agent/Dockerfile
    container_name: test-a2a-agent
    ports:
      - "8005:8005"
    environment:
      - API_KEY=test-api-key-12345
      - AGENT_URL=http://test-a2a-agent:8005
      - PORT=8005
      - LLM__OPENAI__API_KEY=${LLM__OPENAI__API_KEY:-sk-test-fake-key-for-testing}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  worker-test:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: platform-worker-test
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    environment:
      - DATABASE__URL=postgresql://platform_user:admin@postgres-test:5432/platform_test
      - DATABASE__REDIS_URL=redis://redis-test:6379/0
      - TASKS__BROKER_URL=redis://redis-test:6379/1
      - TESTING=true
      - AUTH__PERMISSIONS_ENABLED=false
    command: ["python", "-m", "taskiq", "worker", "apps.broker.worker:broker", "--workers", "2"]
    restart: "no"
    networks:
      - test-net

  scheduler-test:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: platform-scheduler-test
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    environment:
      - DATABASE__URL=postgresql://platform_user:admin@postgres-test:5432/platform_test
      - DATABASE__REDIS_URL=redis://redis-test:6379/0
      - TASKS__BROKER_URL=redis://redis-test:6379/1
      - TESTING=true
      - AUTH__PERMISSIONS_ENABLED=false
    command: ["python", "-m", "taskiq", "scheduler", "apps.scheduler.scheduler:scheduler"]
    restart: "no"
    networks:
      - test-net

  chroma-worker-test:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
      target: chroma-worker
    container_name: platform-chroma-worker-test
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
      chroma-test:
        condition: service_started
    environment:
      - DATABASE__URL=postgresql://platform_user:admin@postgres-test:5432/platform_test
      - DATABASE__REDIS_URL=redis://redis-test:6379/0
      - TASKS__BROKER_URL=redis://redis-test:6379/1
      - CHROMA_HOST=chroma-test
      - CHROMA_PORT=8000
      - TESTING=true
      - AUTH__PERMISSIONS_ENABLED=false
    command: ["taskiq", "worker", "apps.chroma_worker.worker:broker", "--workers", "1"]
    restart: "no"
    networks:
      - test-net

  tests-runner:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: platform-tests-runner
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
      chroma-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      test-a2a-agent:
        condition: service_healthy
      worker-test:
        condition: service_started
      scheduler-test:
        condition: service_started
      chroma-worker-test:
        condition: service_started
    environment:
      - DATABASE__URL=postgresql://platform_user:admin@postgres-test:5432/platform_test
      - DATABASE__REDIS_URL=redis://redis-test:6379/0
      - TASKS__BROKER_URL=redis://redis-test:6379/1
      - TESTING=true
      - AUTH__PERMISSIONS_ENABLED=false
      - AUTH__INTERNAL_SERVICE_KEY=test-internal-service-key
      - AUTH__ADMIN_API_KEY=test-admin-api-key
      - EXTERNAL_TEST_A2A_AGENT_URL=http://test-a2a-agent:8005
      - EXTERNAL_TEST_A2A_AGENT_API_KEY=test-api-key-12345
      - PYTEST_WORKERS=${PYTEST_WORKERS:-4}
      - S3__DEFAULT_BUCKET=test-bucket
      - S3__BUCKETS__TEST_BUCKET__ENDPOINT_URL=http://minio-test:9000
    command: ["sh", "-c", "test -d /app/test-results || mkdir -p /app/test-results; test -d /app/htmlcov || mkdir -p /app/htmlcov; chmod -R 777 /app/test-results /app/htmlcov 2>/dev/null || true; python -m pytest tests/ -v -n ${PYTEST_WORKERS} --junitxml=/app/test-results/junit.xml --cov=apps --cov=core --cov-report=term-missing --cov-report=html"]
    restart: "no"
    volumes:
      - ./test-results:/app/test-results:rw
      - ./htmlcov:/app/htmlcov:rw
    networks:
      - test-net

networks:
  test-net:
    driver: bridge

volumes:
  chroma_test_data:
    driver: local

