{% if view_mode == "table" %}
  <!-- Компактный бейдж для таблицы -->
  <!-- FROM: wrappers/compact.html -->
  <div class="nested-model-summary">
    <span class="badge badge-info">
      <i class="bi bi-box"></i>
      {{ model_type.title() if model_type else 'Модель' }}
    </span>
    {% if model_id %}
    <button class="btn btn-ghost btn-xs" 
            hx-get="/frontend/models/{{ model_type }}/{{ model_id }}?view=modal" 
            hx-target="#modal-container"
            data-tooltip="Показать в модальном окне">
        <i class="bi bi-eye"></i>
    </button>
    {% endif %}
  </div>
{% else %}
  <!-- Компактная карточка для формы -->
  <div class="compact-model-card">
    <div class="card">
      <div class="card-header p-2">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-box"></i>
          <span class="small">{{ model_type.title() if model_type else 'Модель' }}</span>
        </div>
      </div>
      <div class="card-body p-2">
        <small class="text-muted">Вложенная модель</small>
        {% if model_id %}
        <button class="btn btn-outline-primary btn-sm w-100 mt-2" 
                hx-get="/frontend/models/{{ model_type }}/{{ model_id }}?view=form" 
                hx-target="#content">
            Редактировать
        </button>
        {% endif %}
      </div>
    </div>
  </div>
{% endif %}
