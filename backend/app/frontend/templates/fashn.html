<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Виртуальная примерка</title>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- FASHN Styles -->
    <link rel="stylesheet" href="/static/css/fashn.css">
</head>
<body>
    <div class="container">
        <h1>Виртуальная примерка</h1>
        
        <div class="content">
            <!-- Верхняя строка: Фото + Кнопка + Результат -->
            <div class="photos-row">
                <!-- Левая секция: Фото -->
                <div class="section">
                    <h2>
                        <span class="step-number">1</span>
                        Загрузите свое фото
                    </h2>
                    
                    <div class="photo-container" id="photoContainer">
                        <div id="uploadZone">
                            <i class="bi bi-cloud-upload" style="font-size: 48px; color: #ccc; margin-bottom: 10px;"></i>
                            <p style="color: #666;">Перетащите фото или нажмите</p>
                            <p style="color: #999; font-size: 12px;">JPG, PNG, WEBP</p>
                        </div>
                        <img id="photoPreview" class="photo-preview" style="display: none;">
                        <button id="removePhoto" class="remove-btn" style="display: none;">
                            <i class="bi bi-x"></i>
                        </button>
                        <input type="file" id="photoInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <!-- Центральная секция: Кнопка генерации -->
                <div class="magic-container" id="magicContainer">
                    <button type="button" class="magic-btn" id="generateBtn" disabled>
                        <i class="bi bi-magic"></i>
                    </button>
                </div>

                <!-- Правая секция: Результаты -->
                <div class="section">
                    <h2>
                        <span class="step-number">3</span>
                        Результат примерки
                    </h2>
                    
                    <div class="result-container" id="resultContainer">
                        <div style="text-align: center;">
                            <i class="bi bi-image" style="font-size: 48px; color: #ccc; margin-bottom: 10px; display: block;"></i>
                            <p style="color: #666;">Здесь появится результат</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Нижняя строка: Параметры -->
            <div class="params-row">
                <div style="width: 100%; max-width: 500px;">
                    <h2 style="text-align: center; margin-bottom: 20px;">
                        <span class="step-number">2</span>
                        Укажите параметры
                    </h2>
                    
                    <div class="params">
                        <div class="form-group">
                            <label>Ссылка на товар</label>
                            <div class="url-group">
                                <input type="url" id="productUrl" placeholder="https://thecultt.com/product/...">
                                <button class="parse-btn" id="parseBtn">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="product-info" id="productInfo">
                            <img id="productImage" alt="Товар">
                            <div id="productDetails"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Ваш рост (см)</label>
                            <input type="number" id="height" value="170" min="100" max="250">
                        </div>
                    </div>
                    
                    <div class="error" id="error"></div>
                    <div class="success" id="success"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Скрытые поля -->
    <input type="hidden" id="itemKind" value="bag">
    <input type="hidden" id="placement" value="left_shoulder">

    <!-- Полноэкранный просмотр -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <button class="fullscreen-close" id="fullscreenClose">
            <i class="bi bi-x"></i>
        </button>
        <img class="fullscreen-image" id="fullscreenImage" alt="Результат примерки">
    </div>

    <script src="/static/js/fashn.js"></script>
</body>
</html>
