{% extends "base.html" %}

{% block title %}Agent Builder{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='builder/css/builder.css') }}">
{% endblock %}

{% block content %}
<div class="builder-container" id="builderContainer">
    <!-- Боковая панель -->
    <aside class="builder-sidebar" id="builderSidebar">
        <div class="sidebar-header">
            <h2>Builder</h2>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="icon-chevron-left"></i>
            </button>
        </div>
        
        <div class="sidebar-tabs">
            <button class="tab-button active" data-tab="flows">Flows</button>
            <button class="tab-button" data-tab="agents">Agents</button>
            <button class="tab-button" data-tab="tools">Tools</button>
        </div>
        
        <div class="sidebar-search">
            <input type="text" id="sidebarSearch" placeholder="Поиск..." class="search-input">
            <button class="search-add-btn" id="searchAddBtn" title="Создать новый элемент">
                <i class="bi bi-plus"></i>
            </button>
        </div>
        
        <div class="sidebar-content">
            <!-- Flows Tab -->
            <div class="tab-content active" id="flowsTab">
                <div class="items-list" id="flowsList">
                    <!-- Flows будут загружены через HTMX -->
                </div>
            </div>
            
            <!-- Agents Tab -->
            <div class="tab-content" id="agentsTab">
                <div class="items-list" id="agentsList">
                    <!-- Agents будут загружены через HTMX -->
                </div>
            </div>
            
            <!-- Tools Tab -->
            <div class="tab-content" id="toolsTab">
                <div class="items-list" id="toolsList">
                    <!-- Tools будут загружены через HTMX -->
                </div>
            </div>
        </div>
    </aside>
    
    <!-- Основной канвас -->
    <main class="builder-canvas" id="builderCanvas">
        <div class="canvas-toolbar">
            <div class="toolbar-left">
                <button class="btn btn-secondary btn-sm" id="zoomInBtn">
                    <i class="bi bi-zoom-in"></i>
                </button>
                <button class="btn btn-secondary btn-sm" id="zoomOutBtn">
                    <i class="bi bi-zoom-out"></i>
                </button>
                <button class="btn btn-secondary btn-sm" id="fitToScreenBtn">
                    <i class="bi bi-fullscreen"></i>
                </button>
            </div>
            
            <div class="toolbar-center">
                <span class="current-flow-name" id="currentFlowName">Выберите или создайте Flow</span>
            </div>
            
            <div class="toolbar-right">
                <button class="btn btn-secondary btn-sm" id="themeToggleBtn" title="Переключить тему">
                    <i class="bi bi-moon-stars"></i>
                </button>
                <button class="btn btn-secondary btn-sm" id="clearCanvasBtn" title="Очистить канвас">
                    <i class="bi bi-trash"></i>
                </button>
                <button class="btn btn-success btn-sm" id="saveFlowBtn" disabled>
                    <i class="bi bi-cloud-upload"></i> Сохранить
                </button>
                <button class="btn btn-primary btn-sm" id="runFlowBtn" disabled>
                    <i class="bi bi-play-fill"></i> Запустить
                </button>
            </div>
        </div>
        
        <div class="canvas-container" id="canvasContainer">
            <svg class="canvas-svg" id="canvasSvg">
                <!-- Точечная сетка -->
                <defs>
                    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
                        <circle cx="1.5" cy="1.5" r="1.5" fill="var(--text-muted)" opacity="0.3"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#dot-grid)" />
                
                <!-- Группа для связей -->
                <g class="edges-group" id="edgesGroup"></g>
                
                <!-- Группа для нод -->
                <g class="nodes-group" id="nodesGroup"></g>
            </svg>
            
            <!-- Overlay для HTML нод -->
            <div class="canvas-overlay" id="canvasOverlay"></div>
            
            <!-- Индикатор зума -->
            <div class="zoom-level">100%</div>
        </div>
    </main>
</div>

<!-- Модальные окна -->
<div id="modalContainer"></div>

<!-- Контекстное меню -->
<div class="context-menu" id="contextMenu" style="display: none;">
    <div class="context-menu-item" data-action="edit">
        <i class="bi bi-pencil"></i> Редактировать
    </div>
    <div class="context-menu-item" data-action="duplicate">
        <i class="bi bi-clipboard"></i> Дублировать
    </div>
    <div class="context-menu-item" data-action="delete">
        <i class="bi bi-trash"></i> Удалить
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='builder/js/builder.js') }}"></script>
<script>
    // Инициализация Builder после загрузки HTMX
    function initBuilder() {
        if (typeof htmx === 'undefined') {
            // HTMX еще не загружен, ждем
            setTimeout(initBuilder, 100);
            return;
        }
        
        window.builder = new Builder({
            flowId: {{ flow_id | tojson if flow_id else 'null' }}
        });
        window.builder.init();
    }
    
    document.addEventListener('DOMContentLoaded', initBuilder);
</script>
{% endblock %}
