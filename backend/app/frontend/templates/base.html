<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}Agent Platform{% endblock %}</title>
    
    <!-- Preconnect для быстрой загрузки шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-ws@2.0.2" defer></script>
    
    <!-- Custom CSS (включает все модули) -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-primary" hx-ext="ws" ws-connect="/ws/notifications">
    {% block content %}{% endblock %}

    <!-- Контейнер для уведомлений -->
    <div id="notifications-container"></div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modal-container"></div>

    <!-- Виджет чата (доступен на всех страницах) -->
    {% include 'chat_widget_inline.html' %}

    <!-- Main APP JavaScript -->
    <script src="/static/js/app.js" defer></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
