{% if view_mode == "table" %}
  <td class="field-cell">
    {% if readonly %}
      <span class="badge badge-secondary">{{ value or '-' }}</span>
    {% else %}
      <div class="field-input-wrapper position-relative">
        <input type="number" 
               class="form-control form-control-sm transition-fast" 
               value="{{ value or '' }}"
               name="{{ field_name }}"
               {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
               hx-put="/frontend/models/{{ model_type }}/{{ model_id }}?view={{ view_mode }}"
               hx-ext="json-enc"
               hx-trigger="blur"
               hx-target="closest tr"
               hx-swap="outerHTML"
               hx-indicator=".field-loading-indicator">
        <div class="field-loading-indicator htmx-indicator"></div>
      </div>
    {% endif %}
  </td>
{% else %}
  {% extends "fields/base_field.html" %}

{% block field_type_class %}field-int{% endblock %}

{% block field_input %}
  {% if readonly %}
    <input type="number" 
           id="{{ field_name }}" 
           name="{{ field_name }}" 
           value="{{ value or '' }}" 
           readonly 
           class="form-control"
           {% for attr, val in widget_attrs.items() %}{{ attr }}="{{ val }}"{% endfor %}>
  {% else %}
    <input type="number" 
           id="{{ field_name }}" 
           name="{{ field_name }}" 
           value="{{ value or '' }}" 
           class="form-control"
           {% for attr, val in widget_attrs.items() %}{{ attr }}="{{ val }}"{% endfor %}>
  {% endif %}
{% endblock %}
{% endif %}
