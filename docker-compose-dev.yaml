name: agentlab-dev

services:
  postgres:
    platform: "linux/amd64"
    image: pgvector/pgvector:pg15
    container_name: agentlab_postgres_dev
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: admin
    ports:
      - "54321:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  redis:
    platform: "linux/amd64"
    image: redis:7-alpine
    container_name: agentlab_redis_dev
    command: redis-server --save 60 1 --loglevel notice
    ports:
      - "63791:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  minio:
    platform: "linux/amd64"
    image: minio/minio:latest
    container_name: agentlab_minio_dev
    ports:
      - "19001:9000"
      - "19011:9001"
    volumes:
      - minio_dev_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  # External Cat Agent опционален - требует сборки образа, что замедляет запуск:
