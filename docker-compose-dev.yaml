name: agentlab-dev

services:
  postgres:
    platform: "linux/amd64"
    image: pgvector/pgvector:pg17
    container_name: agentlab_postgres_dev
    environment:
      POSTGRES_DB: platform_shared
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: admin
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "54321:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./migrations/postgres/init.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    command: postgres -c max_connections=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  redis:
    platform: "linux/amd64"
    image: redis:7-alpine
    container_name: agentlab_redis_dev
    command: redis-server --save 60 1 --loglevel notice
    ports:
      - "63791:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  # MinIO в Docker VM; uvicorn с хоста подписывает SigV4 по часам macOS — при дрейфе VM см. make dev-minio-restart
  minio:
    platform: "linux/amd64"
    image: minio/minio:latest
    container_name: agentlab_minio_dev
    ports:
      - "19001:9000"
      - "19011:9001"
    volumes:
      - minio_dev_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-net

  # Chromium CDP для apps/browser (Playwright): хост http://127.0.0.1:9222 → BROWSER__CDP_URL.
  # Ручная проверка: в Chromium открыть chrome://inspect/#devices → Configure → localhost:9222.
  # Доп. флаги: снижают типичные сигналы автоматизации у процесса, поднятого до connect_over_cdp
  chromium-cdp:
    platform: "linux/amd64"
    image: zenika/alpine-chrome:latest
    ports:
      - "9222:9222"
    shm_size: 1g
    command:
      - chromium-browser
      - --no-sandbox
      - --disable-dev-shm-usage
      - --disable-blink-features=AutomationControlled
      - --exclude-switches=enable-automation
      - --window-size=1920,1080
      - --lang=en-US
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9222/json/version >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - dev-net

  # External Cat Agent опционален - требует сборки образа, что замедляет запуск:
  # external-cat-agent-dev:
  #   platform: "linux/amd64"
  #   build:
  #     context: .
  #     dockerfile: apps/flows/agents/external_cat_agent/Dockerfile
  #   container_name: platform-external-cat-agent-dev
  #   ports:
  #     - "8004:8002"
  #   environment:
  #     - API_KEY=dev-cat-api-key
  #     - AGENT_URL=http://external-cat-agent-dev:8002
  #     - PORT=8002
  #     - LLM__OPENAI__API_KEY=${LLM__OPENAI__API_KEY:-sk-test-fake-key-for-testing}
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - dev-net

  # Worker опционален - можно запустить локально для дебага:
  # DATABASE__SHARED_URL=postgresql://platform_user:admin@localhost:54321/platform_shared TASKS__BROKER_URL=redis://localhost:63791/1 uv run python -m taskiq worker apps.flows_worker.worker:worker_app
  # flows_worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: worker
  #   container_name: platform_flows_worker_dev
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - DATABASE__SHARED_URL=postgresql://platform_user:admin@postgres:5432/platform_shared
  #     - DATABASE__REDIS_URL=redis://redis:6379/0
  #     - TASKS__BROKER_URL=redis://redis:6379/1
  #   command: ["uv", "run", "python", "-m", "taskiq", "worker", "apps.flows_worker.worker:worker_app", "--workers", "4"]
  #   restart: unless-stopped
  #   networks:
  #     - dev-net

  # Scheduler опционален - можно запустить локально для дебага:
  # DATABASE__SHARED_URL=postgresql://platform_user:admin@localhost:54321/platform_shared TASKS__BROKER_URL=redis://localhost:63791/1 uv run python -m taskiq scheduler apps.scheduler.scheduler:scheduler
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: scheduler
  #   container_name: platform-scheduler-dev
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - DATABASE__SHARED_URL=postgresql://platform_user:admin@postgres:5432/platform_shared
  #     - DATABASE__REDIS_URL=redis://redis:6379/0
  #     - TASKS__BROKER_URL=redis://redis:6379/1
  #   command: ["python", "-m", "apps.scheduler.run_scheduler"]
  #   restart: unless-stopped
  #   networks:
  #     - dev-net

  # RAGWorker опционален - можно запустить локально для дебага:
  # DATABASE__SHARED_URL=postgresql://platform_user:admin@localhost:54321/platform_shared DATABASE__RAG_URL=postgresql://platform_user:admin@localhost:54321/platform_rag TASKS__BROKER_URL=redis://localhost:63791/1 uv run python scripts/run.py rag_worker
  # rag_worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: rag-worker
  #   container_name: platform_rag_worker_dev
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - DATABASE__SHARED_URL=postgresql://platform_user:admin@postgres:5432/platform_shared
  #     - DATABASE__REDIS_URL=redis://redis:6379/0
  #     - TASKS__BROKER_URL=redis://redis:6379/1
  #   command: ["taskiq", "worker", "apps.rag_worker.worker:worker_app", "--workers", "2"]
  #   restart: unless-stopped
  #   networks:
  #     - dev-net

  # Redis в конфиге обязателен для связки livekit-server + livekit-egress (запись, speech-to-chat).
  livekit:
    image: livekit/livekit-server:latest
    container_name: agentlab_livekit_dev
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        keys:
          devkey: secret
        redis:
          address: redis:6379
          db: 2
        rtc:
          tcp_port: 7882
          udp_port: 7881
          use_external_ip: false
          node_ip: 127.0.0.1
    command: --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "7882:7882/tcp"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7880"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - dev-net

  livekit-egress:
    image: livekit/egress:latest
    container_name: agentlab_livekit_egress_dev
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
          db: 2
        logging:
          level: info
          json: true
        session_limits:
          file_output_max_duration: 1h
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dev-net

  # OnlyOffice Document Server (Developer Edition — иначе Community игнорирует customization.logo в JWT).
  # Тот же JWT_SECRET, что в conf services.office.office.jwt_secret / OFFICE__JWT_SECRET.
  onlyoffice-documentserver:
    platform: "linux/amd64"
    image: onlyoffice/documentserver:latest
    container_name: agentlab_onlyoffice_dev
    ports:
      - "8088:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-dev-onlyoffice-jwt-secret}
    volumes:
      - ./deploy/onlyoffice/themes/theme-humanitec-light.json:/var/www/onlyoffice/documentserver/web-apps/apps/common/main/resources/themes/theme-humanitec-light.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dev-net

  coturn:
    image: coturn/coturn:latest
    container_name: agentlab_coturn_dev
    network_mode: host
    command:
      - "-n"
      - "--log-file=stdout"
      - "--lt-cred-mech"
      - "--realm=agentlab"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:-turnsecret}"
      - "--min-port=49152"
      - "--max-port=65535"

  # ============================================
  # Observability (Loki + Tempo + Alloy + Grafana)
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: agentlab_loki_dev
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./deploy/observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_dev_data:/loki
    ports:
      - "3100:3100"
    networks:
      - dev-net

  tempo:
    image: grafana/tempo:latest
    container_name: agentlab_tempo_dev
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_dev_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - dev-net

  alloy:
    image: grafana/alloy:latest
    container_name: agentlab_alloy_dev
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    volumes:
      - ./deploy/observability/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4317:4317"
      - "12345:12345"
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - dev-net

  grafana:
    image: grafana/grafana:latest
    container_name: agentlab_grafana_dev
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_USERS_ALLOW_ORG_CREATE: "false"
    volumes:
      - ./deploy/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
      - ./deploy/observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/observability/dashboards:/etc/grafana/provisioning/dashboards/platform:ro
      - ./deploy/observability/grafana-alerts:/etc/grafana/provisioning/alerting:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_started
    networks:
      - dev-net

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  minio_dev_data:
    driver: local
  loki_dev_data:
    driver: local
  tempo_dev_data:
    driver: local
  grafana_dev_data:
    driver: local
networks:
  dev-net:
    driver: bridge

