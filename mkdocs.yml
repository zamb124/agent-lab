site_name: Agent Lab
site_description: Документация платформы Agent Lab - создание и управление ИИ-агентами на базе LangGraph
site_url: http://localhost:8001

docs_dir: docs

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: logo.png
  favicon: logo.png
  font:
    text: Inter
    code: JetBrains Mono

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-repo/agent-lab
  generator: false
  homepage: /

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/logo.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - footnotes
  - abbr
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang: 
        - ru
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Главная: Home
            Для пользователей: For Users
            Обзор платформы: Platform Overview
            Начало работы: Getting Started
            Управление ботами: Bots Management
            Платформы: Platforms
            Возможности: Features
            Сценарии использования: Use Cases
            API и интеграции: API & Integrations
            API документация: API Documentation
            Интеграции: Integrations
            Обзор: Overview
            Домены: Domains
            Установка: Setup
            Использование: Usage
            План: Plan
            Для разработчиков: For Developers
            Архитектура: Architecture
            Конфигурация: Configuration
            LLM: LLM
            Разработка: Development
            Фронтенд: Frontend
            Клиенты: Clients
            Функциональность: Features
            Биллинг: Billing
            Платежи: Payments
            Интернационализация: Internationalization
            Переменные: Variables

nav:
  - Главная: index.md

  - Для пользователей:
      - Обзор: user_docs/index.md
      - Обзор платформы: user_docs/overview.md
      - Начало работы: user_docs/getting_started.md
      - Магазин ботов: user_docs/store.md
      - Создание ботов: user_docs/bots_creation.md
      - Управление ботами: user_docs/bots_management.md
      - Платформы: user_docs/platforms.md
      - Возможности: user_docs/features.md
      - Переменные: user_docs/variables.md
      - Биллинг: user_docs/billing.md
      - Визуальный конструктор: user_docs/builder.md
      - Сценарии использования: user_docs/scenarios.md
      - Лучшие практики: user_docs/best_practices.md
      - FAQ: user_docs/faq.md
      - Видео-гайды: user_docs/videos.md
      - Устранение проблем: user_docs/troubleshooting.md

  - API: api_links.md

  - Для разработчиков:
      - Архитектура: architecture.md
      - Агенты: agents.md
      - Конфигурация: configuration.md
      - LLM: llm.md
      - Deployment: deployment.md
      - Разработка:
          - Фронтенд: frontend.md
          - Makefile: makefile.md
          - Клиенты: clients.md
      - Функциональность:
          - Биллинг: billing.md
          - Платежи: payments.md
          - Интернационализация: internationalization.md
          - Переменные: variables.md
          - State & Variables: state_and_variables.md

