site_name: Humanitec
site_description: Документация платформы Humanitec - создание и управление ИИ-агентами
site_url: http://localhost:8001

docs_dir: docs

hooks:
  - mkdocs_hooks.py

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: logo.svg
  favicon: logo.svg
  font:
    text: Fira Sans
    code: JetBrains Mono

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-repo/agent-lab
  generator: false
  homepage: /

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid.min.js
  - javascripts/logo.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - footnotes
  - abbr
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang: 
        - ru
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Главная: Home
            Для пользователей: For Users
            Обзор канала: Channel Overview
            Начало работы: Getting Started
            Управление ботами: Bots Management
            Каналы: Channels
            Возможности: Features
            Сценарии использования: Use Cases
            API и интеграции: API & Integrations
            API документация: API Documentation
            Интеграции: Integrations
            Обзор: Overview
            Домены: Domains
            Установка: Setup
            Использование: Usage
            План: Plan
            Для разработчиков: For Developers
            Архитектура: Architecture
            Конфигурация: Configuration
            LLM: LLM
            Разработка: Development
            Фронтенд: Frontend
            Клиенты: Clients
            Функциональность: Features
            Биллинг: Billing
            Платежи: Payments
            Интернационализация: Internationalization
            Переменные: Variables
            Сценарии (E2E, автогенерация): E2E scenarios (auto)

nav:
  - Главная: index.md

