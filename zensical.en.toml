[project]
site_name = "Humanitec"
site_description = "Platform for AI agents, RAG, NetWorkle, and automation"
site_url = "https://humanitec.ru/documentation/en/"
site_author = "Humanitec"
docs_dir = "build/documentation-en"
site_dir = "build/zensical-en-out"
dev_addr = "127.0.0.1:8000"
use_directory_urls = true

copyright = "Humanitec"

extra_css = [
  "assets/stylesheets/documentation-header.css",
]

extra_javascript = [
  { path = "assets/javascripts/documentation-shell.js", defer = true },
]

[project.extra]
homepage = "/"
platform_home_title = "Home"
nav_docs_title = "Documentation"
nav_start_here_title = "Start here"
nav_quickstart_title = "Quickstart"
nav_api_title = "API Reference"
nav_instructions_title = "Instructions"
ask_ai_title = "Ask AI"
ask_ai_aria_label = "Open documentation AI assistant"
llms_title = "LLMs.txt"
alternate = [
    { name = "English", link = "/documentation/en/", lang = "en" },
    { name = "Русский", link = "/documentation/", lang = "ru" },
]

[project.theme]
custom_dir = "docs/theme-overrides"
variant = "modern"
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
  "navigation.footer",
  "navigation.top",
]

[project.theme.font]
text = "Onest"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "octicons/moon-24"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "octicons/sun-24"
toggle.name = "Switch to light mode"

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
