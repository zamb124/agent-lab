# Конфигурация Alembic
# Единая конфигурация миграций для всех баз данных

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Шаблон для новых файлов миграций
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Часовой пояс для генерации файлов версий
timezone = UTC

# Кодировка вывода
output_encoding = utf-8

[post_write_hooks]
# Форматирование black после генерации миграции
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
