<!doctype html>
<html lang="en">
  <!-- [Head] start -->

  <head>
    @@include('../layouts/head-page-meta.html', {'title': 'Login'}) @@include('../layouts/head-css.html')
  </head>
  <!-- [Head] end -->
  <!-- [Body] Start -->

  <body @@bodySetup>
    @@include('../layouts/loader.html')
    <div class="auth-main" style="background-image: url(../assets/images/authentication/img-auth-bg-5.jpg)">
      <div class="auth-wrapper v5">
        <div class="auth-form">
          <div class="card my-5">
            <div class="card-body">
              <div class="text-center">
                <a href="#"><img src="../assets/images/logo-dark.svg" alt="img" /></a>
              </div>
              <h4 class="text-center f-w-500 mt-4 mb-3">Reset Password</h4>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email" />
              </div>
              <div class="text-center mt-4">
                <button type="button" class="btn btn-primary shadow px-sm-4">Reset Password</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- [ Main Content ] end -->
    @@include('../layouts/footer-js.html') @@include('../layouts/customizer.html')
  </body>
  <!-- [Body] end -->
</html>
