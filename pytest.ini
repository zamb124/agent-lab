[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short --asyncio-mode=auto
markers =
    arch: архитектурные тесты
    unit: юнит тесты
    integration: интеграционные тесты
    frontend: фронтенд тесты (JavaScript через Playwright)
    playwright: тесты использующие Playwright
    xdist_group: группа тестов для последовательного выполнения
