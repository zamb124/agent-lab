[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = -v --tb=short --asyncio-mode=auto
markers =
    arch: архитектурные тесты
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require DB, Redis)
    e2e: End-to-end tests (require full stack)
    slow: Slow tests (can be skipped in CI)
    frontend: фронтенд тесты (JavaScript через Playwright)
    playwright: тесты использующие Playwright
    xdist_group: группа тестов для последовательного выполнения
    real_taskiq: тесты с реальным TaskIQ worker
    timeout: тесты с таймаутом выполнения

[coverage:run]
source = app
omit =
    app/__init__.py
    app/main.py
    */tests/*
    */migrations/*
    */__pycache__/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
show_missing = true
skip_covered = false
